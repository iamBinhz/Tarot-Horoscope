<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="The Mystic Tarot — Free three-card tarot reading with Past, Present, and Future spread. Bilingual English/Vietnamese.">
<meta name="keywords" content="tarot, tarot reading, three card spread, mystic tarot, free tarot, tarot online, bài tarot, đọc bài tarot, trải bài tarot">
<title>✦ The Mystic Tarot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href=".support/tarot-example.css">
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>
<canvas id="cosmos"></canvas>

<!-- Navigation -->
<nav>
  <a class="nav-logo" href="index.html">✦ Celestial Sanctum</a>
  <button class="hamburger" id="hamburger" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="tarot-example.html" class="active">Tarot</a></li>
    <li><a href="natal_chart.html">Astrology</a></li>
    <li><a href="#">Coming Soon</a></li>
  </ul>
</nav>

<button class="lang-toggle" id="langBtn" onclick="toggleLang()" aria-label="Switch language / Đổi ngôn ngữ">🌐 Vietnamese</button>

<div class="wrap">
  <header>
    <div class="ornament" aria-hidden="true">✦ &nbsp; ✦ &nbsp; ✦</div>
    <h1>The Mystic Tarot</h1>
    <p class="subtitle">Three Card Spread &nbsp;·&nbsp; Past &nbsp;·&nbsp; Present &nbsp;·&nbsp; Future</p>
    <div class="moons" aria-hidden="true">🌑 🌒 🌓 🌔 🌕 🌖 🌗 🌘</div>
  </header>

  <div class="divider"><div class="divider-line"></div><span class="divider-sym">✦</span><div class="divider-line"></div></div>

  <div class="q-area">
    <div class="q-label">Contemplate your question</div>
    <input class="q-input" type="text" placeholder="What guidance do you seek?" id="qInput" aria-label="Your question for the tarot reading">
    <div class="q-models" id="questionModels">
      <button class="q-model-btn active" data-model="general" onclick="selectQuestionModel('general')">✦ General</button>
      <button class="q-model-btn" data-model="problem" onclick="selectQuestionModel('problem')">🔍 Problem Analysis</button>
      <button class="q-model-btn" data-model="solution" onclick="selectQuestionModel('solution')">💡 Solution / Action</button>
      <button class="q-model-btn" data-model="crossroads" onclick="selectQuestionModel('crossroads')">⚡ Crossroads</button>
    </div>
  </div>

  <div class="spread-wrapper">
    <div class="spread-lbl">✦ &nbsp; Three Card Spread &nbsp; ✦</div>
    <div class="cards-row" id="cardsRow"></div>
    <p class="instructions" id="instr">Shuffle the deck to begin your reading…</p>
    <div class="controls">
      <button class="btn btn-primary" id="shuffleBtn" onclick="shuffleAndDeal()" aria-label="Shuffle and draw three cards">✦ &nbsp; Shuffle &amp; Draw</button>
      <button class="btn" id="resetBtn" onclick="resetReading()" aria-label="Start a new reading">↺ &nbsp; New Reading</button>
    </div>
  </div>

  <div class="reading-panel" id="readingPanel">
    <div class="divider"><div class="divider-line"></div><span class="divider-sym">✦</span><div class="divider-line"></div></div>
    <div class="reading-title" id="readingTitle">✦ &nbsp; Your Reading &nbsp; ✦</div>
    <div class="card-readings" id="cardReadings"></div>
    <div id="conclusionArea">
      <div class="divider"><div class="divider-line"></div><span class="divider-sym">☽</span><div class="divider-line"></div></div>
      <div class="conclusion-box" id="conclusionBox"></div>
    </div>
  </div>
</div>

<script src=".support/tarot-data.js"></script>
<script src=".support/tarot-interactions.js"></script>
<script src=".support/tarot-question-engine.js"></script>
<script src=".support/tarot-example.js"></script>


</body>
</html>
