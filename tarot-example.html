<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ The Mystic Tarot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Roboto:wght@300;400;500;700&family=Uncial+Antiqua&display=swap" rel="stylesheet">
<style>
:root {
  --void: #050403;
  --deep: #0c0906;
  --surface: #14100a;
  --panel: #1a1410;
  --border: #302418;
  --gold: #c9a84c;
  --gold-bright: #f0c96a;
  --gold-light: #f0d080;
  --gold-dim: #7a6030;
  --ember: #d4622a;
  --ember-dim: rgba(212,98,42,.25);
  --teal: #1e8a8a;
  --teal-bright: #3dbfbf;
  --teal-dim: rgba(61,191,191,.2);
  --parchment: #e8d5a3;
  --parchment-2: #c4aa76;
  --muted: #7a6a4a;
  --text: #ddd0a8;
  --text-dim: #a89070;
  --glow-gold: rgba(201,168,76,.35);
  --glow-teal: rgba(61,191,191,.25);
  --glow-ember: rgba(212,98,42,.3);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--void);
  color: var(--text);
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 17px;
  line-height: 1.75;
  min-height: 100vh;
  overflow-x: hidden;
  cursor: none;
}
/* Grain overlay */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: .4;
  pointer-events: none;
  z-index: 9999;
}
/* Custom cursor */
#cursor {
  position:fixed; width:10px; height:10px;
  background:var(--gold-bright); border-radius:50%;
  pointer-events:none; z-index:10001;
  transform:translate(-50%,-50%);
  box-shadow:0 0 8px 3px var(--glow-gold), 0 0 18px 6px rgba(201,168,76,.12);
  transition:width .15s, height .15s;
}
#cursor-ring {
  position:fixed; width:32px; height:32px;
  border:1px solid rgba(201,168,76,.45);
  border-radius:50%; pointer-events:none; z-index:10000;
  transform:translate(-50%,-50%);
  transition:transform .08s linear, width .2s, height .2s;
}
/* Canvas starfield */
#cosmos { position:fixed; inset:0; z-index:0; pointer-events:none; }
/* Scrollbar */
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:var(--void); }
::-webkit-scrollbar-thumb { background:var(--gold-dim); border-radius:3px; }
.wrap {
  position: relative; z-index: 1;
  max-width: 1100px; margin: 0 auto;
  padding: 7rem 1.5rem 3rem;
  display: flex; flex-direction: column; align-items: center;
}
header { text-align: center; margin-bottom: 1.5rem; }
.ornament { color: var(--gold); font-size: 1.1rem; letter-spacing: .5rem; margin-bottom: .4rem; }
h1 {
  font-family: 'Cinzel Decorative', 'Playfair Display', serif;
  font-size: clamp(1.8rem,5vw,3.2rem);
  color: var(--gold);
  text-shadow: 0 0 20px rgba(201,168,76,.5), 0 0 50px rgba(201,168,76,.2);
  letter-spacing: .08em; line-height: 1.2;
}
.subtitle {
  font-family: 'Cinzel', 'Playfair Display', serif; font-size: .75rem;
  color: var(--text-dim); letter-spacing: .4em;
  text-transform: uppercase; margin-top: .7rem;
}
.moons { text-align:center; font-size:1.1rem; opacity:.5; margin:.5rem 0; letter-spacing:.2rem; }
.divider {
  display:flex; align-items:center; gap:1rem;
  margin:1.2rem 0; width:100%; max-width:600px;
}
.divider-line { flex:1; height:1px; background:linear-gradient(to right,transparent,var(--gold),transparent); }
.divider-sym { color:var(--gold); font-size:.9rem; }
.q-area { text-align:center; margin-bottom:2rem; }
.q-label {
  font-family:'Cinzel','Playfair Display',serif; font-size:.7rem;
  letter-spacing:.3em; color:var(--text-dim);
  text-transform:uppercase; margin-bottom:.5rem;
}
.q-input {
  background:rgba(255,255,255,.04);
  border:1px solid rgba(201,168,76,.3);
  border-radius:4px; color:var(--text);
  font-family:'EB Garamond', Georgia, serif; font-size:1.05rem;
  padding:.6rem 1.2rem; width:min(420px,90vw);
  text-align:center; outline:none; transition:border-color .3s;
}
.q-input::placeholder { color:var(--text-dim); opacity:.7; }
.q-input:focus { border-color:var(--gold); }
.spread-lbl {
  font-family:'Cinzel','Playfair Display',serif; font-size:.72rem;
  letter-spacing:.4em; color:var(--text-dim);
  text-transform:uppercase; text-align:center; margin-bottom:1.5rem;
}
.cards-row {
  display:flex; justify-content:center;
  gap:clamp(.8rem,2.5vw,2rem); flex-wrap:wrap;
}
.card-slot { display:flex; flex-direction:column; align-items:center; gap:.8rem; }
.pos-label {
  font-family:'Cinzel','Playfair Display',serif; font-size:.68rem;
  letter-spacing:.3em; color:var(--teal-bright);
  text-transform:uppercase; opacity:.85;
  text-shadow:0 0 6px var(--glow-teal);
}
.card-wrap {
  width:155px; height:272px;
  perspective:1000px; cursor:none;
}
.card-inner {
  position:relative; width:100%; height:100%;
  transform-style:preserve-3d;
  transition:transform .8s cubic-bezier(.175,.885,.32,1.275);
}
.card-wrap.flipped .card-inner { transform:rotateY(180deg); }
.card-wrap:not(.flipped):hover .card-inner { transform:rotateY(14deg) translateY(-7px); }
.card-face {
  position:absolute; width:100%; height:100%;
  backface-visibility:hidden; border-radius:12px; overflow:hidden;
}
.card-back {
  background:linear-gradient(155deg, var(--surface), var(--panel), var(--surface));
  border:2px solid rgba(201,168,76,.4);
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 8px 35px rgba(0,0,0,.6), 0 0 18px rgba(61,191,191,.12);
}
.back-design {
  width:85%; height:85%;
  border:1px solid rgba(201,168,76,.3);
  border-radius:8px; display:flex;
  align-items:center; justify-content:center;
  background:repeating-linear-gradient(45deg,transparent,transparent 9px,rgba(201,168,76,.05) 9px,rgba(201,168,76,.05) 18px);
}
.back-sym {
  font-size:3.2rem; opacity:.6;
  filter:drop-shadow(0 0 12px rgba(201,168,76,.7));
  animation:float 4s ease-in-out infinite;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.card-front {
  transform:rotateY(180deg);
  border:2px solid rgba(201,168,76,.55);
  box-shadow:0 8px 35px rgba(0,0,0,.6), 0 0 22px rgba(201,168,76,.15);
  display:flex; flex-direction:column;
}
.cf-inner {
  width:100%; height:100%;
  display:flex; flex-direction:column;
  padding:9px; align-items:center;
}
.cf-orn { font-size:.48rem; color:rgba(201,168,76,.7); letter-spacing:.2em; }
.cf-num {
  font-family:'Cinzel','Playfair Display',serif; font-size:.6rem;
  color:rgba(201,168,76,.8); letter-spacing:.12em;
  margin:.15rem 0;
}
.cf-sym {
  flex:1; display:flex; align-items:center; justify-content:center;
  font-size:3.2rem;
  filter:drop-shadow(0 0 12px rgba(255,255,255,.25));
}
.cf-name {
  font-family:'Cinzel','Playfair Display',serif; font-size:.57rem;
  font-weight:600; letter-spacing:.1em;
  color:var(--gold-light); text-align:center;
  text-transform:uppercase; padding:3px 2px;
  line-height:1.4;
}
.cf-kw {
  font-size:.52rem; color:rgba(232,213,183,.6);
  font-style:italic; text-align:center;
  padding:0 4px 3px;
}
.card-wrap.flipped .card-front {
  animation:revealGlow .5s ease-out .4s both;
}
@keyframes revealGlow {
  0%{box-shadow:0 8px 35px rgba(0,0,0,.5), 0 0 50px rgba(201,168,76,.7)}
  100%{box-shadow:0 8px 35px rgba(0,0,0,.5), 0 0 22px rgba(201,168,76,.15)}
}
.placeholder {
  width:155px; height:272px;
  border:1px dashed rgba(61,191,191,.12);
  border-radius:12px; display:flex;
  align-items:center; justify-content:center;
}
.ph-sym { color:rgba(61,191,191,.18); font-size:1.8rem; }
.instructions {
  text-align:center; font-size:.9rem;
  color:var(--text-dim); font-style:italic;
  margin-top:1.5rem; min-height:1.5rem;
  transition:opacity .4s;
}
.controls { display:flex; gap:1rem; margin-top:2rem; flex-wrap:wrap; justify-content:center; }
.btn {
  font-family:'Cinzel','Playfair Display',serif; font-size:.78rem;
  letter-spacing:.28em; text-transform:uppercase;
  padding:.75rem 2.2rem; border:1px solid var(--gold);
  background:transparent; color:var(--gold);
  cursor:none; border-radius:3px;
  transition:all .3s; position:relative; overflow:hidden;
}
.btn::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(201,168,76,.12),transparent);
  opacity:0; transition:opacity .3s;
}
.btn:hover::before { opacity:1; }
.btn:hover { background:rgba(201,168,76,.08); box-shadow:0 0 22px rgba(201,168,76,.3); transform:translateY(-2px); }
.btn:active { transform:translateY(0); }
.btn-primary { background:linear-gradient(135deg,rgba(201,168,76,.12),rgba(61,191,191,.08)); }
.btn-primary:hover { background:linear-gradient(135deg,rgba(201,168,76,.22),rgba(61,191,191,.14)); }
.btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }
.lang-toggle {
  position:fixed; top:72px; right:1.2rem; display:inline-flex; align-items:center; z-index:101;
  font-family:'Cinzel','Playfair Display',serif; font-size:.65rem;
  letter-spacing:.2em; text-transform:uppercase;
  padding:.45rem .9rem; border:1px solid var(--gold);
  background:rgba(5,4,3,.85); color:var(--gold);
  cursor:pointer; border-radius:3px;
  backdrop-filter:blur(6px); transition:all .3s;
}
.lang-toggle:hover { background:rgba(201,168,76,.12); box-shadow:0 0 16px rgba(201,168,76,.3); }

/* Reading panel */
.reading-panel {
  width:100%; max-width:920px;
  margin-top:2.5rem; opacity:0;
  transform:translateY(24px);
  transition:all .7s ease; pointer-events:none;
}
.reading-panel.visible { opacity:1; transform:translateY(0); pointer-events:all; }
.reading-title {
  font-family:'Cinzel Decorative','Playfair Display',serif; font-size:1.05rem;
  color:var(--gold); text-align:center; margin-bottom:1.8rem;
  text-shadow:0 0 20px rgba(201,168,76,.4);
}
.card-readings { display:flex; gap:1.2rem; flex-wrap:wrap; justify-content:center; }
.card-reading {
  flex:1; min-width:220px; max-width:280px;
  background:rgba(20,16,10,.8);
  border:1px solid var(--border);
  border-radius:8px; padding:1.4rem;
  position:relative;
  animation:fadeUp .5s ease both;
}
.card-reading::before {
  content:''; position:absolute;
  top:0; left:0; right:0; height:2px;
  background:linear-gradient(to right,transparent,var(--teal),transparent);
}
.card-reading:hover { border-color:var(--gold-dim); }
@keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
.r-pos {
  font-family:'Cinzel','Playfair Display',serif; font-size:.63rem;
  letter-spacing:.3em; color:var(--teal-bright);
  text-transform:uppercase; margin-bottom:.35rem;
  text-shadow:0 0 5px var(--glow-teal);
}
.r-sym { font-size:1.5rem; margin-bottom:.4rem; }
.r-name { font-family:'Cinzel','Playfair Display',serif; font-size:.95rem; color:var(--gold-light); margin-bottom:.5rem; }
.r-kw { font-size:.8rem; color:var(--gold); font-style:italic; margin-bottom:.65rem; opacity:.85; }
.r-meaning { font-size:.95rem; line-height:1.75; color:var(--text); opacity:.92; }

/* Conclusion */
.conclusion-box {
  max-width:700px; margin:0 auto;
  background:rgba(20,16,10,.8);
  border:1px solid var(--border);
  border-radius:8px; padding:1.8rem 1.6rem;
  position:relative; text-align:center;
}
.conclusion-box::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(to right,transparent,var(--ember),transparent);
}
.conclusion-title {
  font-family:'Cinzel Decorative','Playfair Display',serif;
  font-size:1rem; color:var(--ember); margin-bottom:1rem;
  text-shadow:0 0 14px var(--glow-ember);
}
.conclusion-text {
  font-size:1rem; line-height:1.85; color:var(--text);
  font-style:italic; opacity:.92;
}
.conclusion-advice {
  margin-top:1.2rem; padding-top:1rem;
  border-top:1px solid rgba(201,168,76,.15);
}
.conclusion-advice h4 {
  font-family:'Cinzel',serif; font-size:.7rem;
  letter-spacing:.25em; text-transform:uppercase;
  color:var(--teal-bright); margin-bottom:.6rem;
  text-shadow:0 0 6px var(--glow-teal);
}
.conclusion-advice ul {
  list-style:none; padding:0; display:flex;
  flex-direction:column; gap:.4rem; text-align:left;
  max-width:500px; margin:0 auto;
}
.conclusion-advice li {
  font-size:.92rem; line-height:1.65; color:var(--text);
  padding-left:1.4rem; position:relative;
}
.conclusion-advice li::before {
  content:'✦'; position:absolute; left:0; color:var(--ember); font-size:.7rem; top:.15rem;
}

/* Sparkle */
.sparkle {
  position:absolute; pointer-events:none;
  animation:sparkAnim .9s ease-out forwards;
  z-index:20;
}
@keyframes sparkAnim {
  0%{opacity:1;transform:scale(0) translateY(0)}
  50%{opacity:1;transform:scale(1.6) translateY(-18px)}
  100%{opacity:0;transform:scale(.5) translateY(-48px)}
}

@media(max-width:560px){
  .card-wrap{width:110px;height:193px;}
  .cf-sym{font-size:2.3rem;}
  .cf-name{font-size:.48rem;}
  .back-sym{font-size:2.4rem;}
}
/* ── Navbar ── */
nav {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 100;
  background: rgba(5,4,3,.88);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(201,168,76,0.3);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 2.5rem;
  height: 58px;
}
.nav-logo {
  font-family: 'Cinzel Decorative', serif;
  font-size: 1rem;
  color: var(--gold);
  text-shadow: 0 0 14px rgba(201,168,76,0.5);
  letter-spacing: .08em;
  text-decoration: none;
  white-space: nowrap;
}
.nav-links {
  display: flex; align-items: center;
  gap: 0.2rem; list-style: none;
}
.nav-links a {
  font-family: 'Cinzel', serif;
  font-size: 0.7rem;
  letter-spacing: .3em;
  text-transform: uppercase;
  color: var(--text-dim);
  text-decoration: none;
  padding: .45rem .9rem;
  border-radius: 3px;
  border: 1px solid transparent;
  transition: color .25s, border-color .25s, background .25s;
}
.nav-links a:hover,
.nav-links a.active {
  color: var(--gold-light);
  border-color: rgba(201,168,76,0.3);
  background: rgba(201,168,76,0.07);
}
.hamburger {
  display: none; flex-direction: column; gap: 5px;
  cursor: pointer; padding: .4rem; background: none; border: none;
}
.hamburger span {
  display: block; width: 22px; height: 2px;
  background: var(--gold); border-radius: 2px;
  transition: transform .3s, opacity .3s;
}
@media (max-width: 640px) {
  nav { padding: 0 1.2rem; }
  .nav-links {
    position: fixed; top: 58px; left: 0; right: 0;
    flex-direction: column; align-items: stretch;
    background: rgba(5,4,3,.97);
    border-bottom: 1px solid rgba(201,168,76,0.3);
    padding: .8rem 1.2rem 1rem;
    gap: .1rem;
    transform: translateY(-120%);
    transition: transform .3s;
  }
  .nav-links.open { transform: translateY(0); }
  .nav-links a { text-align: center; padding: .65rem; }
  .hamburger { display: flex; }
}
/* ── Vietnamese font override ── */
body.lang-vi, body.lang-vi h1, body.lang-vi .subtitle,
body.lang-vi .q-label, body.lang-vi .q-input,
body.lang-vi .spread-lbl, body.lang-vi .pos-label,
body.lang-vi .reading-title, body.lang-vi .r-pos,
body.lang-vi .r-name, body.lang-vi .r-kw, body.lang-vi .r-meaning,
body.lang-vi .conclusion-title, body.lang-vi .conclusion-text,
body.lang-vi .conclusion-advice h4, body.lang-vi .conclusion-advice li,
body.lang-vi .instructions, body.lang-vi .btn,
body.lang-vi .lang-toggle, body.lang-vi .nav-links a,
body.lang-vi .cf-name, body.lang-vi .cf-kw {
  font-family: 'Roboto', 'Times New Roman', sans-serif !important;
}

.q-model-btn {
  font-family: 'Cinzel', serif; font-size: .65rem;
  letter-spacing: .15em; text-transform: uppercase;
  padding: .5rem 1rem; border: 1px solid var(--gold-dim);
  background: transparent; color: var(--text-dim);
  cursor: none; border-radius: 3px; transition: all .3s;
}
.q-model-btn:hover { border-color: var(--gold); color: var(--gold); }
.q-model-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,.08); }

.card-wrap.reversed .card-front {
  border-color: rgba(150, 120, 180, .55);
  box-shadow: 0 8px 35px rgba(0,0,0,.6), 0 0 22px rgba(150,120,180,.15);
}
.reversed-badge {
  position: absolute; top: 4px; right: 4px;
  font-size: .5rem; color: rgba(150,120,180,.9);
  background: rgba(150,120,180,.15); padding: .15rem .3rem;
  border-radius: 2px; font-weight: 700; letter-spacing: .05em;
}
.r-reversed-tag {
  font-size: .7rem; color: rgba(150,120,180,.9);
  font-weight: 600; margin-left: .3rem;
}
.r-reversed-meaning {
  margin-top: .6rem; padding: .6rem .8rem;
  background: rgba(150,120,180,.08); border-left: 2px solid rgba(150,120,180,.4);
  border-radius: 0 4px 4px 0; font-size: .82rem; color: rgba(150,120,180,.85);
  line-height: 1.55;
}
.r-position-interp {
  margin-top: .5rem; padding: .5rem 0; font-size: .88rem;
  color: var(--text-dim); line-height: 1.6; font-style: italic;
  border-top: 1px solid rgba(201,168,76,.1);
}
.synth-section { margin-bottom: 1.2rem; }
.synth-section-title {
  font-family: 'Cinzel', serif; font-size: .72rem; letter-spacing: .18em;
  text-transform: uppercase; color: var(--gold); margin-bottom: .5rem;
}
.synth-opening { font-size: .95rem; line-height: 1.65; color: var(--text); margin-bottom: 1rem; }
.synth-thread { font-size: .88rem; line-height: 1.6; color: var(--text-dim); }
.synth-elements { font-size: .85rem; line-height: 1.55; color: var(--text-dim); }
.synth-path { font-size: .88rem; line-height: 1.6; }
.synth-path ol { padding-left: 1.2rem; margin: .4rem 0 0; }
.synth-path li { margin-bottom: .3rem; color: var(--text-dim); }
.synth-badges {
  display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;
  margin-top: 1rem; padding-top: .8rem;
  border-top: 1px solid rgba(201,168,76,.12);
}
.synth-badge {
  font-size: .7rem; letter-spacing: .12em; text-transform: uppercase;
  padding: .35rem .8rem; border: 1px solid rgba(201,168,76,.25);
  border-radius: 3px; color: var(--gold-dim); font-family: 'Cinzel', serif;
}
.synth-badge .badge-icon { margin-right: .3rem; }
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>
<canvas id="cosmos"></canvas>

<!-- Navigation -->
<nav>
  <a class="nav-logo" href="index.html">✦ Celestial Sanctum</a>
  <button class="hamburger" id="hamburger" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="tarot-example.html" class="active">Tarot</a></li>
    <li><a href="natal_chart.html">Astrology</a></li>
    <li><a href="#">Coming Soon</a></li>
  </ul>
</nav>

<button class="lang-toggle" id="langBtn" onclick="toggleLang()">🌐 Vietnamese</button>

<div class="wrap">
  <header>
    <div class="ornament">✦ &nbsp; ✦ &nbsp; ✦</div>
    <h1>The Mystic Tarot</h1>
    <p class="subtitle">Three Card Spread &nbsp;·&nbsp; Past &nbsp;·&nbsp; Present &nbsp;·&nbsp; Future</p>
    <div class="moons">🌑 🌒 🌓 🌔 🌕 🌖 🌗 🌘</div>
  </header>

   meaning:"A door of real-world opportunity opens before you. The Ace of Pentacles is the seed of lasting prosperity — a new financial venture or practical path that, carefully tended, will bear rich fruit."},
  {id:65,name:"Two of Pentacles",arcana:"minor",suit:"Pentacles",num:"2",sym:"⚖️",col:["#0a1a0a","#0f2d0f"],
   kw:["Balance","Adaptability","Juggling"],
   meaning:"Life is asking you to stay nimble. Two of Pentacles calls for flexibility as multiple demands compete for your attention. Enjoy the dance of balance — just don't drop what matters most."},
  {id:66,name:"Three of Pentacles",arcana:"minor",suit:"Pentacles",num:"3",sym:"🏛️",col:["#0a1a0a","#0f2d0f"],
   kw:["Teamwork","Craftsmanship","Collaboration"],
   meaning:"Great work is built together. Three of Pentacles celebrates skilled collaboration and the deep satisfaction of mastery applied to meaningful work. Your contribution is seen and valued."},
  {id:67,name:"Four of Pentacles",arcana:"minor",suit:"Pentacles",num:"4",sym:"🔒",col:["#0a1a0a","#0f2d0f"],
   kw:["Security","Control","Possessiveness"],
   meaning:"Security is wise; hoarding is a trap. Four of Pentacles reflects a desire for stability, but warns against gripping resources so tightly that generosity and growth become impossible."},
  {id:68,name:"Five of Pentacles",arcana:"minor",suit:"Pentacles",num:"5",sym:"❄️",col:["#0a1a0a","#0f2d0f"],
   kw:["Hardship","Isolation","Lack"],
   meaning:"Help is closer than you think. Five of Pentacles speaks of material hardship and the cold of feeling excluded. Look up — the light in the window is real. Reach out and accept support."},
  {id:69,name:"Six of Pentacles",arcana:"minor",suit:"Pentacles",num:"6",sym:"🤲",col:["#0a1a0a","#0f2d0f"],
   kw:["Generosity","Charity","Reciprocity"],
   meaning:"Give and receive with open hands. Six of Pentacles speaks of generous exchange and the balanced flow of resources. Share your abundance freely, and be gracious enough to receive when in need."},
  {id:70,name:"Seven of Pentacles",arcana:"minor",suit:"Pentacles",num:"7",sym:"🌿",col:["#0a1a0a","#0f2d0f"],
   kw:["Patience","Investment","Assessment"],
   meaning:"Step back and evaluate your harvest. Seven of Pentacles is the card of patient investment and honest appraisal. Is your time and energy flowing toward what will truly bear the best fruit?"},
  {id:71,name:"Eight of Pentacles",arcana:"minor",suit:"Pentacles",num:"8",sym:"🔨",col:["#0a1a0a","#0f2d0f"],
   kw:["Craftsmanship","Dedication","Skill-Building"],
   meaning:"Mastery comes through devoted practice. Eight of Pentacles celebrates diligent, focused work and the joy of genuinely developing a skill. Attend to the details — excellence will follow."},
  {id:72,name:"Nine of Pentacles",arcana:"minor",suit:"Pentacles",num:"9",sym:"🦚",col:["#0a1a0a","#0f2d0f"],
   kw:["Abundance","Independence","Refinement"],
   meaning:"Enjoy the fruits of your labor with elegance. Nine of Pentacles speaks of graceful self-sufficiency and the quiet pleasure of material comfort you have built through your own disciplined effort."},
  {id:73,name:"Ten of Pentacles",arcana:"minor",suit:"Pentacles",num:"10",sym:"🏰",col:["#0a1a0a","#0f2d0f"],
   kw:["Legacy","Lasting Wealth","Family"],
   meaning:"You are building something that endures. Ten of Pentacles represents lasting wealth, a family legacy, and the deep satisfaction of creating something of enduring value for generations to come."},
  {id:74,name:"Page of Pentacles",arcana:"minor",suit:"Pentacles",num:"Page",sym:"📚",col:["#0a1a0a","#0f2d0f"],
   kw:["Ambition","Study","Diligence"],
   meaning:"Learn with earnest, grounded dedication. The Page of Pentacles is studious, methodical, and practical. A new opportunity in the real world beckons — approach it with focused, patient attention."},
  {id:75,name:"Knight of Pentacles",arcana:"minor",suit:"Pentacles",num:"Knight",sym:"🐂",col:["#0a1a0a","#0f2d0f"],
   kw:["Reliability","Hard Work","Persistence"],
   meaning:"Slow, steady, and utterly dependable. The Knight of Pentacles moves methodically and honors every commitment. His patient, steadfast approach ensures that every goal he sets is eventually achieved."},
  {id:76,name:"Queen of Pentacles",arcana:"minor",suit:"Pentacles",num:"Queen",sym:"🦌",col:["#0a1a0a","#0f2d0f"],
   kw:["Nurturing","Practicality","Warmth"],
   meaning:"Create abundance with warmth and skill. The Queen of Pentacles blends material mastery with nurturing generosity. She builds a space of real comfort and abundance for herself and everyone she loves."},
  {id:77,name:"King of Pentacles",arcana:"minor",suit:"Pentacles",num:"King",sym:"🏔️",col:["#0a1a0a","#0f2d0f"],
   kw:["Wealth","Stability","Enduring Leadership"],
   meaning:"Build an empire that lasts. The King of Pentacles has achieved mastery in the material world through vision and patience. From his mountain of solid security, he leads and provides with absolute confidence."},
];

// ─── DECK (VIETNAMESE) ────────────────────────────────────────────────────────
const DECK_VI = [
  // MAJOR ARCANA
  {name:"Kẻ Khờ",kw:["Khởi Đầu Mới","Ngây Thơ","Bước Nhảy Đức Tin"],meaning:"Một hành trình mới đang gọi bạn tiến lên. Kẻ Khờ mời bạn dũng cảm bước vào những điều chưa biết với trái tim rộng mở — hãy tin tưởng vào cuộc phiêu lưu, vì con đường sẽ hiện ra dưới chân bạn."},
  {name:"Nhà Ảo Thuật",kw:["Ý Chí","Kỹ Năng","Biểu Hiện"],meaning:"Bạn đã có mọi công cụ cần thiết. Nhà Ảo Thuật tiết lộ sức mạnh bẩm sinh của bạn để định hình thực tại qua ý định tập trung và hành động sáng tạo. Đây là lúc hành động có mục đích."},
  {name:"Nữ Tu Trưởng",kw:["Trực Giác","Huyền Bí","Trí Tuệ Nội Tâm"],meaning:"Hãy nhìn vào bên trong — những câu trả lời bạn tìm kiếm sống dưới bề mặt. Nữ Tu Trưởng bảo vệ tri thức thiêng liêng và nói qua những giấc mơ và bản năng. Hãy tin vào tiếng thì thầm của tiềm thức."},
  {name:"Nữ Hoàng",kw:["Sung Túc","Nuôi Dưỡng","Màu Mỡ"],meaning:"Cuộc sống nở rộ xung quanh bạn. Nữ Hoàng hiện thân sự tăng trưởng, sáng tạo và tình yêu nuôi dưỡng. Hãy để bản thân nhận lại hào phóng như bạn đã cho — sung túc là trạng thái tự nhiên của bạn."},
  {name:"Hoàng Đế",kw:["Quyền Uy","Cấu Trúc","Ổn Định"],meaning:"Xây dựng nền tảng với chủ đích. Hoàng Đế kêu gọi kỷ luật và cấu trúc có mục đích. Lãnh đạo thực sự có nghĩa là tạo ra trật tự phục vụ và bảo vệ — lãnh đạo bằng trí tuệ, không phải bằng vũ lực."},
  {name:"Đại Giáo Sư",kw:["Truyền Thống","Trí Tuệ","Cố Vấn"],meaning:"Tìm kiếm trí tuệ từ những con đường đã được chứng minh. Đại Giáo Sư chỉ đến truyền thống, giảng dạy tâm linh và sự hướng dẫn của những người đã đi trước. Một người cố vấn hoặc cộng đồng có một chìa khóa cho bạn."},
  {name:"Những Người Yêu",kw:["Tình Yêu","Hòa Hợp","Lựa Chọn Ý Nghĩa"],meaning:"Một lựa chọn sâu sắc kêu gọi bạn đi theo trái tim. Những Người Yêu nói về kết nối sâu sắc và sự liên kết của các giá trị. Dù bạn chọn con đường nào, hãy chọn bằng cả tâm hồn."},
  {name:"Cỗ Xe",kw:["Chiến Thắng","Ý Chí","Quyết Tâm"],meaning:"Chiến thắng thuộc về người lái xe với niềm tin. Cỗ Xe kêu gọi bạn kiểm soát những lực lượng đối lập và tự tin tiến về phía mục tiêu. Ý chí của bạn là vũ khí mạnh nhất."},
  {name:"Sức Mạnh",kw:["Dũng Cảm","Từ Bi","Sức Mạnh Nội Tâm"],meaning:"Sức mạnh thực sự là mềm mại. Lá này nói về sự kiên cường nội tâm sinh ra từ lòng từ bi và sự kiên nhẫn, không phải sức mạnh thô. Đối mặt nỗi sợ với sự ân cần yên lặng — bạn mạnh hơn bạn biết."},
  {name:"Ẩn Sĩ",kw:["Cô Đơn","Nội Tâm","Ánh Sáng Nội Tâm"],meaning:"Trí tuệ sống trong sự tĩnh lặng. Ẩn Sĩ kêu gọi bạn hướng vào trong — để rút lui, suy ngẫm và lắng nghe sự thật yên lặng bên dưới tiếng ồn của thế giới. Ánh sáng nội tâm của bạn cũng sẽ dẫn đường cho người khác."},
  {name:"Bánh Xe Vận Mệnh",kw:["Chu Kỳ","Định Mệnh","Bước Ngoặt"],meaning:"Bánh xe quay, như nó đã luôn quay. Một chu kỳ mới đang bắt đầu — một cơ hội được định hình bởi những khuôn mẫu bạn đã thiết lập. Hãy đón nhận dòng chảy của định mệnh và nắm lấy bước ngoặt này."},
  {name:"Công Lý",kw:["Sự Thật","Công Bằng","Nhân Quả"],meaning:"Mỗi hành động đều có tiếng vang. Công Lý đòi hỏi sự trung thực — với bản thân và với người khác. Hãy đưa ra lựa chọn với chính trực và chấp nhận hậu quả của chúng một cách bình thản. Sự thật sẽ chiến thắng."},
  {name:"Người Bị Treo",kw:["Buông Bỏ","Dừng Lại","Góc Nhìn Mới"],meaning:"Buông bỏ, và đột nhiên mọi thứ thay đổi. Người Bị Treo yêu cầu bạn dừng lại và tự nguyện buông bỏ kiểm soát. Trong sự buông bỏ — không phải thất bại — một góc nhìn mới sâu sắc sẽ tự lộ ra."},
  {name:"Tử Thần",kw:["Biến Đổi","Kết Thúc","Tái Sinh"],meaning:"Những gì kết thúc nhường chỗ cho những gì phải bắt đầu. Đừng sợ lá này — nó nói về sự biến đổi mạnh mẽ, sự lột xác cũ. Từ kết thúc này nở ra điều gì đó vĩ đại hơn nhiều."},
  {name:"Điều Độ",kw:["Cân Bằng","Kiên Nhẫn","Dòng Chảy"],meaning:"Tìm con đường trung đạo. Điều Độ rót giữa hai bình — hòa hợp, kiên nhẫn, sự pha trộn ân cần của những điều đối lập. Bình yên được tìm thấy không phải ở cực đoan, mà ở trung tâm ổn định, chảy đều."},
  {name:"Ác Quỷ",kw:["Bóng Tối","Sự Gắn Bó","Giải Phóng"],meaning:"Đối mặt với những xiềng xích bạn đã tự rèn. Ác Quỷ chiếu sáng những khuôn mẫu sợ hãi, nghiện ngập hoặc ảo tưởng giữ bạn bị ràng buộc. Sự thật giải phóng: nhận thức được bẫy đã là bước đầu tiên thoát ra."},
  {name:"Tháp",kw:["Biến Động","Mặc Khải","Thức Tỉnh"],meaning:"Sét đánh, và những gì sai phải đổ. Tháp mang đến biến động đột ngột phá hủy những nền tảng giả tạo. Dù hỗn loạn, sự thanh lọc này là cần thiết — và giải phóng."},
  {name:"Ngôi Sao",kw:["Hy Vọng","Đổi Mới","Niềm Tin"],meaning:"Sau cơn bão, những ngôi sao xuất hiện. Ngôi Sao tỏa sáng với hy vọng thuần khiết và yên lặng. Bạn đang chữa lành. Một ánh sáng dẫn đường bạn — hãy tin tưởng vào nó. Vũ trụ tốt lành, và bạn cũng vậy."},
  {name:"Mặt Trăng",kw:["Ảo Tưởng","Tiềm Thức","Giấc Mơ"],meaning:"Không phải tất cả đều như vẻ ngoài trong ánh sáng bạc. Mặt Trăng bước qua thế giới hoàng hôn của những giấc mơ và bóng tối. Tin vào trực giác sâu nhất, nhưng hãy đặt tên cho những nỗi sợ làm mờ tầm nhìn."},
  {name:"Mặt Trời",kw:["Niềm Vui","Sinh Lực","Thành Công"],meaning:"Hãy để ánh sáng của bạn tỏa sáng không xin lỗi. Mặt Trời tỏa ra niềm vui, sự rõ ràng và sinh lực tuyệt vời. Một thời kỳ hạnh phúc và thành công thực sự đang đến — bước lên và ăn mừng cuộc sống của bạn."},
  {name:"Phán Xét",kw:["Thức Tỉnh","Sứ Mệnh","Tha Thứ"],meaning:"Một tiếng kèn gọi đến bản thân cao nhất của bạn. Phán Xét nói về sự thức tỉnh sâu sắc — khoảnh khắc thanh toán trung thực dẫn đến sự đổi mới. Tha thứ hoàn toàn cho quá khứ; hãy trả lời tiếng gọi thực sự của bạn."},
  {name:"Thế Giới",kw:["Hoàn Thành","Tích Hợp","Thành Tựu"],meaning:"Bạn đã đến nơi. Thế Giới ăn mừng sự toàn vẹn của một chu kỳ hoàn thành — thành tích, tích hợp và sự thỏa mãn sâu sắc của một hành trình được sống trọn vẹn. Một cánh cửa đóng lại; một cánh cửa lớn hơn mở ra."},
  // WANDS
  {name:"Át Gậy",suit:"Gậy",kw:["Cảm Hứng","Tia Sáng Sáng Tạo","Chủ Động"],meaning:"Một tia lửa sáng tạo bùng cháy trên con đường. Át Gậy báo hiệu khởi đầu mới táo bạo — tia cảm hứng, nếu được hành động với lòng dũng cảm, có sức mạnh biến đổi mọi thứ."},
  {name:"Hai Gậy",suit:"Gậy",kw:["Lên Kế Hoạch","Tầm Nhìn","Tương Lai"],meaning:"Bạn đứng ở ngưỡng cửa của khả năng. Hai Gậy kêu gọi bạn lên kế hoạch táo bạo và nhìn về phía chân trời. Tầm nhìn của bạn là sức mạnh — hãy vạch ra con đường bạn định đi."},
  {name:"Ba Gậy",suit:"Gậy",kw:["Mở Rộng","Nhìn Xa","Tiến Bộ"],meaning:"Những con tàu của bạn đang trở về. Những nỗ lực ban đầu đang mang lại quả và mở ra những chân trời mới. Hãy nhìn về phía trước với sự tự tin — những cuộc phiêu lưu của bạn đang tăng đà."},
  {name:"Bốn Gậy",suit:"Gậy",kw:["Ăn Mừng","Hòa Hợp","Nhà"],meaning:"Dừng lại và ăn mừng những gì bạn đã xây dựng. Bốn Gậy mang lại niềm vui, cảm giác thuộc về sâu sắc và sự ấm áp của thành tích chung. Bạn xứng đáng với hạnh phúc này — hãy để mình cảm nhận nó."},
  {name:"Năm Gậy",suit:"Gậy",kw:["Xung Đột","Cạnh Tranh","Thách Thức"],meaning:"Ma sát đang rèn giũa bạn. Năm Gậy mang đến sự cạnh tranh sôi nổi và xung đột sáng tạo. Hãy khai thác năng lượng này một cách khôn ngoan — cuộc đấu tranh đang mài sắc kỹ năng và củng cố ý chí."},
  {name:"Sáu Gậy",suit:"Gậy",kw:["Chiến Thắng","Được Công Nhận","Thành Tích"],meaning:"Bước lên và nhận phần thưởng của bạn. Sáu Gậy báo hiệu sự công nhận công khai và thành công khó giành được. Hãy để danh tiếng thúc đẩy cuộc phiêu lưu tiếp theo — bạn xứng đáng được tỏa sáng."},
  {name:"Bảy Gậy",suit:"Gậy",kw:["Kiên Trì","Bảo Vệ","Niềm Tin"],meaning:"Giữ vững lập trường. Bảy Gậy đòi hỏi bạn bảo vệ vị trí với niềm tin. Những thách thức sẽ kiểm tra ý chí, nhưng vị trí cao của bạn đáng được bảo vệ — đừng rút lui ngay bây giờ."},
  {name:"Tám Gậy",suit:"Gậy",kw:["Hành Động Nhanh","Chuyển Động","Tin Tức"],meaning:"Mọi thứ đang di chuyển nhanh chóng. Tám Gậy mang đến những phát triển nhanh, tin tức thú vị và một xoáy hoạt động. Hãy hành động quyết đoán — dòng chảy đang mạnh và thời điểm đã chín muồi."},
  {name:"Chín Gậy",suit:"Gậy",kw:["Khả Năng Phục Hồi","Kiên Trì","Chịu Đựng"],meaning:"Bạn mệt mỏi sau chiến trận, nhưng gần đích rồi. Chín Gậy nói về sự kiên cường khó giành được. Hãy tập hợp sức mạnh cho một cú đẩy cuối cùng — sự kiên trì bạn đã thể hiện sắp được đền đáp."},
  {name:"Mười Gậy",suit:"Gậy",kw:["Gánh Nặng","Trách Nhiệm","Quá Tải"],meaning:"Bạn đang gánh quá nhiều một mình. Mười Gậy cảnh báo về sự kiệt sức và quá tải. Đã đến lúc đặt xuống một số gánh nặng, ủy thác và nhớ rằng không phải mọi thứ đều là của bạn để gánh."},
  {name:"Tiểu Thư Gậy",suit:"Gậy",kw:["Nhiệt Tình","Khám Phá","Tinh Thần Tự Do"],meaning:"Hãy đón nhận tinh thần phiêu lưu của bạn. Tiểu Thư Gậy hiện thân sự nhiệt tình mới và sự hứng thú của những khám phá mới. Hãy theo đuổi sự tò mò mà không suy nghĩ quá nhiều — thế giới thưởng cho những nhà thám hiểm táo bạo."},
  {name:"Kỵ Sĩ Gậy",suit:"Gậy",kw:["Hành Động","Đam Mê","Phiêu Lưu"],meaning:"Tiến về phía trước với tất cả những gì bạn có. Kỵ Sĩ Gậy được thúc đẩy, táo bạo và không sợ hãi. Hãy khai thác đà lửa này vào hành động quyết đoán — chỉ cần nhắm trước khi nhảy."},
  {name:"Nữ Hoàng Gậy",suit:"Gậy",kw:["Sức Hút","Tự Tin","Quyết Tâm"],meaning:"Hãy sở hữu sức mạnh với vẻ duyên dáng rạng ngời. Nữ Hoàng Gậy lãnh đạo với sự tự tin đam mê và sự độc lập ấm áp, mãnh liệt. Hãy hiện thân sự sáng tạo không sợ hãi — bạn thắp sáng mọi căn phòng bạn bước vào."},
  {name:"Vua Gậy",suit:"Gậy",kw:["Tầm Nhìn","Lãnh Đạo","Thành Thạo"],meaning:"Lãnh đạo với tầm nhìn táo bạo và truyền cảm hứng. Vua Gậy là nhà thị kiến thiên bẩm — cuốn hút, bậc thầy và đầy sức khích lệ. Hãy bước vào quyền uy của mình và đốt cháy thế giới."},
  // CUPS
  {name:"Át Cốc",suit:"Cốc",kw:["Tình Yêu Mới","Từ Bi","Mở Lòng"],meaning:"Trái tim bạn đang mở ra với điều gì đó đẹp đẽ. Át Cốc rót ra những khởi đầu cảm xúc mới — tình yêu, từ bi và kết nối tâm linh. Hãy mở lòng để nhận lấy món quà này với sự kỳ diệu."},
  {name:"Hai Cốc",suit:"Cốc",kw:["Đối Tác","Kết Nối","Hòa Hợp"],meaning:"Một liên minh tâm hồn đang hình thành. Hai Cốc nói về sự nhận biết lẫn nhau sâu sắc và sự đối tác hòa hợp. Điều gì đó hiếm có và đẹp đẽ đang bén rễ giữa hai người — hãy trân trọng nó."},
  {name:"Ba Cốc",suit:"Cốc",kw:["Ăn Mừng","Tình Bạn","Cộng Đồng"],meaning:"Ăn mừng với những người bạn yêu. Ba Cốc mang lại sự đoàn tụ vui vẻ và cộng đồng chân thành. Hãy buông bỏ sự cô lập và tận hưởng sự phong phú của kết nối con người thực sự xung quanh bạn."},
  {name:"Bốn Cốc",suit:"Cốc",kw:["Thờ Ơ","Suy Ngẫm","Đánh Giá Lại"],meaning:"Đừng bỏ lỡ những gì đang được cung cấp. Bốn Cốc nói về sự suy ngẫm nội tâm và sự chán nản nhẹ. Một cơ hội mới đang xuất hiện trước bạn — hãy nhìn lên từ sự suy ngẫm trước khi nó qua đi."},
  {name:"Năm Cốc",suit:"Cốc",kw:["Đau Buồn","Mất Mát","Hối Tiếc"],meaning:"Hãy thương tiếc những gì đã mất, nhưng nhìn vào những gì còn lại. Năm Cốc yêu cầu bạn thừa nhận mất mát thực sự mà không mất đi tầm nhìn về những chiếc cốc vẫn đứng. Sự chữa lành luôn bắt đầu bằng sự thừa nhận trung thực."},
  {name:"Sáu Cốc",suit:"Cốc",kw:["Hoài Niệm","Ngây Thơ","Quá Khứ"],meaning:"Quá khứ trở lại với sự ngọt ngào. Sáu Cốc gợi lên sự ấm áp của những ký ức đẹp và sự ngây thơ thời thơ ấu. Một người hoặc tình huống từ quá khứ trở lại — nó có thể mang theo những món quà chữa lành."},
  {name:"Bảy Cốc",suit:"Cốc",kw:["Lựa Chọn","Tưởng Tượng","Ảo Tưởng"],meaning:"Phân biệt giữa mơ và thực. Bảy Cốc lấp đầy tâm trí bạn với những tầm nhìn và khả năng hấp dẫn. Trí tưởng tượng là món quà, nhưng suy nghĩ ước muốn là cái bẫy — hãy gắn mong muốn vào những gì thực sự là thực."},
  {name:"Tám Cốc",suit:"Cốc",kw:["Buông Bỏ","Tiến Lên","Tìm Kiếm Nhiều Hơn"],meaning:"Đã đến lúc bước đi. Tám Cốc yêu cầu sự dũng cảm yên lặng để rời bỏ những gì không còn làm bạn thỏa mãn. Trái tim biết — điều gì đó có ý nghĩa hơn đang chờ đợi dọc theo con đường."},
  {name:"Chín Cốc",suit:"Cốc",kw:["Mãn Nguyện","Ước Nguyện","Thỏa Mãn"],meaning:"Ước nguyện của bạn được ban. Chín Cốc là lá bài ước nguyện — sự thỏa mãn cảm xúc và sự mãn nguyện sâu sắc khi có những gì bạn thực sự mong muốn. Hãy để mình cảm nhận hạnh phúc này đầy đủ và không mặc cảm."},
  {name:"Mười Cốc",suit:"Cốc",kw:["Phúc Lộc","Gia Đình","Niềm Vui Bền Lâu"],meaning:"Hạnh phúc thực sự là của bạn. Mười Cốc là đỉnh cao của sự thỏa mãn cảm xúc — tình yêu sâu sắc, kết nối hòa hợp và cảm giác vui vẻ và thuộc về bền lâu. Trái tim bạn đã tìm thấy ngôi nhà."},
  {name:"Tiểu Thư Cốc",suit:"Cốc",kw:["Sáng Tạo","Trực Giác","Sứ Điệp"],meaning:"Hãy để trí tưởng tượng dẫn đường. Tiểu Thư Cốc mang tin nhắn của cảm hứng sáng tạo và sự tò mò tình cảm. Hãy cởi mở với những điều bất ngờ — một thông điệp kỳ diệu có thể đang trên đường đến."},
  {name:"Kỵ Sĩ Cốc",suit:"Cốc",kw:["Lãng Mạn","Quyến Rũ","Mơ Mộng"],meaning:"Theo đuổi những gì trái tim bạn mong muốn. Kỵ Sĩ Cốc là người lãng mạn, cuốn hút và hướng đến giấc mơ. Hãy để trái tim dẫn dắt các hành động — sự chân thực của cảm xúc là sức mạnh của bạn."},
  {name:"Nữ Hoàng Cốc",suit:"Cốc",kw:["Từ Bi","Đồng Cảm","Nuôi Dưỡng"],meaning:"Hãy tin vào trái tim nhạy cảm của bạn. Nữ Hoàng Cốc hiện thân trí tuệ cảm xúc sâu sắc và sự đồng cảm chữa lành. Hãy lắng nghe trực giác — sức mạnh nuôi dưỡng của bạn là quý báu và mạnh mẽ."},
  {name:"Vua Cốc",suit:"Cốc",kw:["Bình Tĩnh Cảm Xúc","Kiểm Soát","Từ Bi"],meaning:"Hãy lãnh đạo bằng sự khôn ngoan cảm xúc. Vua Cốc cân bằng trái tim và tâm trí — tâm hồn ổn định, từ bi và chín chắn cảm xúc. Hãy đưa ra quyết định từ nơi điềm tĩnh bên trong."},
  // SWORDS
  {name:"Át Kiếm",suit:"Kiếm",kw:["Sự Rõ Ràng","Sự Thật","Đột Phá"],meaning:"Một làn gió rõ ràng cắt qua sự hỗn loạn. Át Kiếm mang lại sự rõ ràng tinh thần và sự thật — một ý tưởng đột phá hoặc khoảnh khắc hiểu biết sâu sắc mở ra con đường phía trước."},
  {name:"Hai Kiếm",suit:"Kiếm",kw:["Bế Tắc","Quyết Định Khó Khăn","Trung Lập"],meaning:"Không thể tránh khỏi quyết định mãi mãi. Hai Kiếm nói về sự bế tắc và từ chối đối mặt với thực tế. Hãy bỏ bịt mắt — sự thật, dù khó khăn, sẽ giải phóng bạn khỏi sự tê liệt này."},
  {name:"Ba Kiếm",suit:"Kiếm",kw:["Đau Lòng","Đau Khổ","Mất Mát"],meaning:"Nỗi đau đòi hỏi sự thừa nhận. Ba Kiếm mang nỗi buồn, phản bội hoặc mất mát tình cảm sâu sắc. Hãy cho phép mình đau, nhưng đừng ở lại trong nỗi đau — sự chữa lành luôn đến sau sự thừa nhận thực sự."},
  {name:"Bốn Kiếm",suit:"Kiếm",kw:["Nghỉ Ngơi","Phục Hồi","Suy Ngẫm"],meaning:"Cơ thể và tâm trí bạn cần nghỉ ngơi. Bốn Kiếm kêu gọi sự rút lui và phục hồi. Sự tĩnh lặng không phải là lười biếng — đó là sự chuẩn bị khôn ngoan. Hãy nghỉ ngơi để tái tạo năng lượng cho những thách thức sắp tới."},
  {name:"Năm Kiếm",suit:"Kiếm",kw:["Xung Đột","Thất Bại","Mất Mát"],meaning:"Không phải mọi trận chiến đều đáng chiến đấu. Năm Kiếm cảnh báo về xung đột có tổng bằng không và chiến thắng rỗng tuếch. Hãy xem xét cái giá của việc 'chiến thắng' — đôi khi bước đi là chiến lược khôn ngoan nhất."},
  {name:"Sáu Kiếm",suit:"Kiếm",kw:["Chuyển Tiếp","Chữa Lành","Di Chuyển Tiếp"],meaning:"Bạn đang rời bỏ những vùng nước sóng gió. Sáu Kiếm mang sự chuyển tiếp và bước đi từ khó khăn. Hành trình có thể không dễ dàng, nhưng nó đang đưa bạn đến một nơi yên bình và chữa lành hơn."},
  {name:"Bảy Kiếm",suit:"Kiếm",kw:["Lừa Dối","Chiến Lược","Bỏ Trốn"],meaning:"Cẩn thận với sự lừa dối — của người khác và của bản thân. Bảy Kiếm chỉ ra sự xảo quyệt, các góc độ bí mật hoặc hành vi trốn tránh. Hãy tìm kiếm sự trong sáng và đảm bảo các hành động của bạn phù hợp với giá trị."},
  {name:"Tám Kiếm",suit:"Kiếm",kw:["Bị Trói Buộc","Giới Hạn Tinh Thần","Bị Giam Cầm"],meaning:"Nhà tù nằm trong tâm trí. Tám Kiếm nói về những hạn chế tự áp đặt và suy nghĩ bị giam cầm. Băng bịt mắt đó là những niềm tin của bạn — buông bỏ chúng và bạn sẽ thấy con đường luôn ở đó."},
  {name:"Chín Kiếm",suit:"Kiếm",kw:["Lo Âu","Ác Mộng","Lo Lắng"],meaning:"Những suy nghĩ ban đêm không phải là thực tế. Chín Kiếm tiết lộ lo lắng, xấu hổ và nỗi sợ hãi tấn công trong bóng tối. Hãy nhẹ nhàng với bản thân — tâm trí phóng đại rủi ro. Hãy tìm kiếm ánh sáng của ngày."},
  {name:"Mười Kiếm",suit:"Kiếm",kw:["Cú Đánh Cuối","Mất Mát","Kết Thúc"],meaning:"Điều này đã đến giới hạn cuối cùng của nó. Mười Kiếm đánh dấu một kết thúc đau đớn — nhưng đây là chương cuối của giai đoạn khó khăn này. Bình minh đến sau đêm tối nhất. Tái sinh bắt đầu ngay bây giờ."},
  {name:"Tiểu Thư Kiếm",suit:"Kiếm",kw:["Tò Mò","Khéo Léo","Cảnh Giác"],meaning:"Hãy nhạy bén và tò mò. Tiểu Thư Kiếm thách thức bạn quan sát và giao tiếp với sự rõ ràng. Hãy thận trọng, hãy khéo léo và luôn sẵn sàng học hỏi — thông tin mới đang trên đường đến."},
  {name:"Kỵ Sĩ Kiếm",suit:"Kiếm",kw:["Tham Vọng","Trực Tiếp","Liều Lĩnh"],meaning:"Tiến về phía trước với trí tuệ sắc bén và quyết tâm. Kỵ Sĩ Kiếm là người hành động nhanh chóng, thẳng thắn và tham vọng. Hãy giữ sức lực đó nhưng đừng để hối hả bỏ qua sự cẩn thận."},
  {name:"Nữ Hoàng Kiếm",suit:"Kiếm",kw:["Nhận Thức Sắc Bén","Độc Lập","Thẳng Thắn"],meaning:"Hãy nói sự thật của bạn một cách rõ ràng và tự tin. Nữ Hoàng Kiếm lãnh đạo bằng trí tuệ sắc bén, ranh giới rõ ràng và sự giao tiếp thẳng thắn. Sự rõ ràng của cô ấy là lòng từ bi — hãy lấy cảm hứng từ nó."},
  {name:"Vua Kiếm",suit:"Kiếm",kw:["Quyền Uy Tinh Thần","Công Bằng","Sự Thật"],meaning:"Hãy lãnh đạo bằng sự rõ ràng, đạo đức và lý luận logic. Vua Kiếm hiện thân sức mạnh tinh thần và quyền uy trí tuệ. Hãy đưa ra quyết định với sự công bằng và sự rõ ràng — trí tuệ của bạn là tài sản quý giá nhất."},
  // PENTACLES
  {name:"Át Tiền",suit:"Tiền",kw:["Cơ Hội Mới","Thịnh Vượng","Biểu Hiện"],meaning:"Hạt giống của sự thịnh vượng đang được gieo. Át Tiền mang đến cơ hội vật chất, tài chính hoặc sự khởi đầu thực tế. Hãy tiếp nhận nó với sự cẩn thận và chăm chỉ — điều này có tiềm năng phát triển lâu dài."},
  {name:"Hai Tiền",suit:"Tiền",kw:["Cân Bằng","Linh Hoạt","Điều Phối"],meaning:"Cuộc sống đòi hỏi sự cân bằng linh hoạt. Hai Tiền nói về việc tung hứng nhiều trách nhiệm. Hãy duy trì tính linh hoạt và nhớ rằng không phải mọi thứ đều cần sự chú ý ngay lập tức — hãy ưu tiên một cách khôn ngoan."},
  {name:"Ba Tiền",suit:"Tiền",kw:["Làm Việc Nhóm","Kỹ Năng","Cộng Tác"],meaning:"Thành tích vĩ đại được xây dựng cùng nhau. Ba Tiền tôn vinh sự cộng tác, kỹ năng nghề nghiệp và nhóm làm việc tốt. Hãy đánh giá cao đóng góp của người khác và để chuyên môn độc đáo của bạn tỏa sáng."},
  {name:"Bốn Tiền",suit:"Tiền",kw:["Kiểm Soát","Bảo Thủ","Keo Kiệt"],meaning:"Hãy thận trọng với sự keo kiệt. Bốn Tiền cảnh báo về việc ôm khư khư những gì bạn có vì sợ mất mát. Sự an toàn thực sự không đến từ việc giữ chặt — hãy học cách chia sẻ một cách hào phóng."},
  {name:"Năm Tiền",suit:"Tiền",kw:["Nghèo Khó","Khó Khăn","Trừ Loại"],meaning:"Ngay cả trong khó khăn, sự giúp đỡ đang ở đó. Năm Tiền nói về thiếu thốn vật chất hoặc cảm giác bị loại ra ngoài. Hãy tìm kiếm sự hỗ trợ xung quanh bạn — những cánh cửa ấm áp thường mở hơn chúng ta nghĩ."},
  {name:"Sáu Tiền",suit:"Tiền",kw:["Hào Phóng","Cho Nhận","Cân Bằng"],meaning:"Hãy cho đi và nhận lại với ân cần. Sáu Tiền nói về sự hào phóng, lòng từ thiện và sự cân bằng của nguồn lực. Hãy chia sẻ sự phong phú của bạn một cách tự do — những gì bạn cho đi sẽ trở lại nhân lên nhiều lần."},
  {name:"Bảy Tiền",suit:"Tiền",kw:["Đánh Giá","Kiên Nhẫn","Đầu Tư"],meaning:"Hãy đánh giá những gì bạn đã trồng. Bảy Tiền kêu gọi kiểm tra tiến độ và kiên nhẫn. Kết quả sẽ đến — tiếp tục nuôi dưỡng dự án của bạn, đặt câu hỏi những gì thực sự xứng đáng với thời gian và năng lượng của bạn."},
  {name:"Tám Tiền",suit:"Tiền",kw:["Thành Thạo","Chuyên Cần","Cải Thiện Kỹ Năng"],meaning:"Thành thạo đến từ sự tận tụy. Tám Tiền tôn vinh sự chăm chỉ, cải thiện kỹ năng và tinh tế nghề thủ công. Hãy tiếp tục rèn luyện — sự lặp lại chú tâm của bạn đang xây dựng thứ gì đó thực sự xuất sắc."},
  {name:"Chín Tiền",suit:"Tiền",kw:["Sung Túc","Tự Chủ","Thành Công"],meaning:"Bạn đã đạt được điều này qua nỗ lực của bản thân. Chín Tiền tôn vinh sự sung túc vật chất và tinh thần đến từ kỷ luật và kiên nhẫn. Hãy tận hưởng thành quả của bạn — bạn xứng đáng với sự thịnh vượng này."},
  {name:"Mười Tiền",suit:"Tiền",kw:["Di Sản","Sự Sung Túc","Truyền Thống Gia Đình"],meaning:"Sự thịnh vượng kéo dài qua các thế hệ. Mười Tiền đại diện cho di sản lâu dài, sự sung túc vật chất và gia đình. Những nền tảng bạn đang xây dựng hôm nay sẽ hỗ trợ không chỉ bạn mà cả những người thân yêu."},
  {name:"Tiểu Thư Tiền",suit:"Tiền",kw:["Học Hỏi","Tham Vọng","Kế Hoạch Thực Tế"],meaning:"Hãy tiếp cận cuộc sống với sự tập trung chú ý. Tiểu Thư Tiền đang học cách biểu hiện những ước mơ thành thực tế. Hãy chăm học, đặt ra mục tiêu rõ ràng và tin rằng nỗ lực của bạn sẽ mang lại kết quả hữu hình."},
  {name:"Kỵ Sĩ Tiền",suit:"Tiền",kw:["Siêng Năng","Đáng Tin Cậy","Phương Pháp"],meaning:"Sự kiên định là siêu năng lực của bạn. Kỵ Sĩ Tiền là người đáng tin cậy, chăm chỉ và kiên nhẫn — người luôn đến đích dù chậm và ổn định. Hãy tiếp tục bước tiến vững chắc của bạn."},
  {name:"Nữ Hoàng Tiền",suit:"Tiền",kw:["Nuôi Dưỡng","Thực Tiễn","Sung Túc"],meaning:"Hãy tạo ra sự ấm áp và sung túc xung quanh bạn. Nữ Hoàng Tiền là người nuôi dưỡng thực tế, quản lý nguồn lực với ân cần và sự chăm chút tỉ mỉ. Sự chăm sóc chu đáo của cô ấy tạo ra không gian an toàn cho mọi người phát triển."},
  {name:"Vua Tiền",suit:"Tiền",kw:["Thịnh Vượng","Lãnh Đạo","Bảo Mật"],meaning:"Hãy lãnh đạo với sự hào phóng và thực tiễn. Vua Tiền hiện thân sự thành công vật chất, sự ổn định và khả năng cung cấp hào phóng. Chia sẻ sự sung túc của bạn — di sản thực sự của bạn là sự hào phóng bạn thể hiện."},
];

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentLang = 'en';
let T = TRANSLATIONS.en;
const POSITIONS = ["Past","Present","Future"];
let drawnCards = [];
let flippedCount = 0;

let selectedModel = 'general';

function selectQuestionModel(model) {
  selectedModel = model;
  document.querySelectorAll('.q-model-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.model === model);
  });
}

// ─── LANGUAGE ─────────────────────────────────────────────────────────────────
function toggleLang() {
  currentLang = currentLang === 'en' ? 'vi' : 'en';
  T = TRANSLATIONS[currentLang];
  document.body.classList.toggle('lang-vi', currentLang === 'vi');
  applyLang();
}

function applyLang() {
  document.getElementById('langBtn').textContent = T.langBtn;
  document.querySelector('h1').textContent = T.title;
  document.querySelector('.subtitle').textContent = T.subtitle;
  document.querySelector('.q-label').textContent = T.qLabel;
  document.getElementById('qInput').placeholder = T.placeholder;
  document.querySelector('.spread-lbl').textContent = T.spreadLbl;
  document.getElementById('readingTitle').textContent = T.readingTitle;
  const sb = document.getElementById('shuffleBtn');
  if (sb.style.display !== 'none' && !sb.disabled) sb.textContent = T.shuffleTxt;
  const rb = document.getElementById('resetBtn');
  if (rb.style.display !== 'none') rb.textContent = T.resetTxt;
  document.querySelectorAll('.q-model-btn').forEach(btn => {
    const model = btn.dataset.model;
    if (typeof QUESTION_MODELS !== 'undefined' && QUESTION_MODELS[model]) {
      const data = QUESTION_MODELS[model];
      btn.textContent = `${data.icon} ${currentLang === 'vi' ? data.vi : data.en}`;
    }
  });
  const instr = document.getElementById('instr');
  if (instr.textContent) instr.textContent = T.instrInit;
  if (drawnCards.length === 0) {
    buildSlots();
  } else {
    T.positions.forEach((pos, i) => {
      const slot = document.getElementById(`slot${i}`);
      if (slot) slot.querySelector('.pos-label').textContent = pos;
    });
    drawnCards.forEach((card, i) => {
      const cw = document.getElementById(`cw${i}`);
      if (cw && cw.classList.contains('flipped')) {
        renderCardFront(document.getElementById(`cf${i}`), card);
      }
    });
    if (document.getElementById('readingPanel').classList.contains('visible')) {
      showReading();
      generateConclusion();
    }
  }
}

function renderCardFront(cf, card) {
  const d = currentLang === 'vi' ? DECK_VI[card.id] : card;
  const suitDisplay = card.arcana === 'major' ? card.num : (currentLang === 'vi' ? card.suit : d.suit);
  cf.style.background = `linear-gradient(155deg,${card.col[0]} 0%,${card.col[1]} 60%,${card.col[0]} 100%)`;
  const reversedBadge = card.isReversed ? `<div class="reversed-badge">↓ R</div>` : '';
  cf.innerHTML = `
    ${reversedBadge}
    <div class="cf-inner">
      <div class="cf-orn">✦ · ✦</div>
      <div class="cf-num">${suitDisplay}</div>
      <div class="cf-sym">${card.sym}</div>
      <div class="cf-name">${card.name}</div>
      <div class="cf-kw">${d.kw.join(' · ')}</div>
      <div class="cf-orn">✦ · ✦</div>
    </div>`;
  // Apply reversed class to the card-wrap
  const cfId = cf.id; // e.g. "cf0", "cf1", "cf2"
  if (cfId) {
    const idx = cfId.replace('cf', '');
    const cardWrap = document.getElementById(`cw${idx}`);
    if (cardWrap) {
      cardWrap.classList.toggle('reversed', !!card.isReversed);
    }
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  buildSlots();
});

function buildSlots() {
  const row = document.getElementById('cardsRow');
  row.innerHTML = T.positions.map((pos, i) => `
    <div class="card-slot" id="slot${i}">
      <div class="pos-label">${pos}</div>
      <div class="card-wrap" id="cw${i}" onclick="flipCard(${i})" style="display:none">
        <div class="card-inner">
          <div class="card-face card-back">
            <div class="back-design"><span class="back-sym">𓂀</span></div>
          </div>
          <div class="card-face card-front" id="cf${i}"></div>
        </div>
      </div>
      <div class="placeholder" id="ph${i}"><span class="ph-sym">✦</span></div>
    </div>
  `).join('');
}

// ─── SHUFFLE & DEAL ───────────────────────────────────────────────────────────
function shuffleAndDeal() {
  const btn = document.getElementById('shuffleBtn');
  btn.disabled = true;
  btn.textContent = T.shufflingTxt;
  flippedCount = 0;
  document.getElementById('readingPanel').classList.remove('visible');
  document.getElementById('resetBtn').style.display = 'none';

  // Fisher-Yates shuffle
  const deck = [...DECK];
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  drawnCards = deck.slice(0, 3);
  drawnCards = drawnCards.map(card => ({
    ...card,
    isReversed: Math.random() < 0.5,
  }));

  // Populate fronts
  drawnCards.forEach((card, i) => {
    renderCardFront(document.getElementById(`cf${i}`), card);
  });

  // Reveal cards with stagger
  setTimeout(() => {
    POSITIONS.forEach((_, i) => {
      setTimeout(() => {
        const ph = document.getElementById(`ph${i}`);
        const cw = document.getElementById(`cw${i}`);
        ph.style.display = 'none';
        cw.classList.remove('flipped');
        cw.style.cssText = 'display:block;opacity:0;transform:translateY(20px);transition:opacity .5s ease,transform .5s ease';
        requestAnimationFrame(() => requestAnimationFrame(() => {
          cw.style.opacity = '1';
          cw.style.transform = 'translateY(0)';
        }));
      }, i * 220);
    });
    setTimeout(() => {
      btn.style.display = 'none';
      document.getElementById('resetBtn').style.display = 'inline-block';
      document.getElementById('instr').textContent = T.instrClick;
    }, 900);
  }, 500);
}

// ─── FLIP ─────────────────────────────────────────────────────────────────────
function flipCard(idx) {
  const cw = document.getElementById(`cw${idx}`);
  if (cw.classList.contains('flipped')) return;
  cw.classList.add('flipped');
  spawnSparkles(cw);
  flippedCount++;
  const instr = document.getElementById('instr');
  if (flippedCount === 1) instr.textContent = T.instrReveal1;
  else if (flippedCount === 2) instr.textContent = T.instrReveal2;
  else { instr.textContent = ''; setTimeout(showReading, 750); }
}

function spawnSparkles(el) {
  const glyphs = ['✦','✧','⭐','·','✨'];
  el.style.position = 'relative';
  for (let i = 0; i < 9; i++) {
    const sp = document.createElement('span');
    sp.className = 'sparkle';
    sp.textContent = glyphs[Math.floor(Math.random() * glyphs.length)];
    sp.style.cssText = `color:${Math.random()>.5?'#c9a84c':'#f0d080'};font-size:${.7+Math.random()*.6}rem;left:${Math.random()*155}px;top:${Math.random()*272}px;animation-delay:${(Math.random()*.35).toFixed(2)}s;`;
    el.appendChild(sp);
    setTimeout(() => sp.remove(), 1300);
  }
}

// ─── SYNTHESIS HELPERS ────────────────────────────────────────────────────────

function getCardElement(card) {
  if (card.arcana === 'major') return 'spirit';
  return SUIT_ELEMENT[card.suit] || 'spirit';
}

function analyzeElements(cards) {
  const counts = { fire: 0, water: 0, air: 0, earth: 0, spirit: 0 };
  let majorCount = 0;
  cards.forEach(card => {
    const el = getCardElement(card);
    counts[el]++;
    if (card.arcana === 'major') majorCount++;
  });
  const dominant = Object.entries(counts).filter(([k, v]) => v >= 2).map(([k]) => k);
  const missing = ['fire', 'water', 'air', 'earth'].filter(e => counts[e] === 0);
  return { counts, dominant, missing, majorCount };
}

function findInteraction(cardA, cardB) {
  for (const pattern of CARD_INTERACTIONS) {
    if (pattern.condition(cardA, cardB)) return pattern;
  }
  // Fallback: element transition
  const elA = getCardElement(cardA);
  const elB = getCardElement(cardB);
  if (elA !== elB) {
    const key = `${elA}→${elB}`;
    if (ELEMENT_TRANSITIONS[key]) return ELEMENT_TRANSITIONS[key];
  }
  return null;
}

function determineEnergy(cards, analysis) {
  const names = cards.map(c => c.name);
  const transformCards = ['Death', 'The Tower', 'Wheel of Fortune'];
  const healCards = ['The Star', 'Temperance'];
  const reversedCount = cards.filter(c => c.isReversed).length;

  if (names.some(n => transformCards.includes(n))) return 'transformative';
  if (names.some(n => healCards.includes(n)) || analysis.dominant.includes('water')) return 'healing';
  if (reversedCount >= 2 || analysis.dominant.includes('air')) return 'challenging';
  if (analysis.majorCount >= 2) return 'intense';
  return 'harmonious';
}

function determineConfidence(cards, analysis) {
  const futureReversed = cards[2] && cards[2].isReversed;
  const allReversed = cards.every(c => c.isReversed);
  if (allReversed || analysis.dominant.length === 0) return 'low';
  if (analysis.dominant.length >= 1 && !futureReversed) return 'high';
  return 'moderate';
}

function generateActionSteps(futureCard, model, isVi) {
  const steps = [];
  const d = isVi ? DECK_VI[futureCard.id] : futureCard;
  // Step 1: based on future card
  if (futureCard.isReversed && typeof REVERSED_MEANINGS !== 'undefined' && REVERSED_MEANINGS[futureCard.id]) {
    const rev = REVERSED_MEANINGS[futureCard.id];
    steps.push(isVi
      ? `Hãy đối mặt với thử thách của ${futureCard.name} ngược: nhận diện điều đang bị chặn và hành động để giải phóng nó.`
      : `Face the challenge of reversed ${futureCard.name}: identify what is blocked and take action to release it.`);
  } else {
    steps.push(isVi
      ? `Đón nhận năng lượng của ${futureCard.name}: ${d.kw.join(', ')}. Hãy để những phẩm chất này dẫn dắt bước tiếp theo.`
      : `Embrace the energy of ${futureCard.name}: ${d.kw.join(', ')}. Let these qualities guide your next step.`);
  }
  // Step 2: based on question model
  const modelSteps = {
    general: { en: 'Stay open to the message and revisit this reading in a week to see how events have unfolded.', vi: 'Giữ tâm mở với thông điệp và xem lại bài đọc sau một tuần để thấy sự kiện đã diễn biến ra sao.' },
    problem: { en: 'Name the obstacle specifically, then take one concrete action today to address its root cause.', vi: 'Gọi tên chướng ngại cụ thể, sau đó thực hiện một hành động cụ thể hôm nay để xử lý nguyên nhân gốc rễ.' },
    solution: { en: 'Commit to the first step within 24 hours — momentum matters more than perfection right now.', vi: 'Cam kết thực hiện bước đầu tiên trong vòng 24 giờ — động lực quan trọng hơn sự hoàn hảo lúc này.' },
    crossroads: { en: 'Write down both options and their consequences. Sleep on it, then choose with conviction by morning.', vi: 'Viết ra cả hai lựa chọn và hệ quả. Suy ngẫm qua đêm, rồi chọn với sự tin tưởng vào sáng mai.' }
  };
  steps.push(modelSteps[model] ? (isVi ? modelSteps[model].vi : modelSteps[model].en) : (isVi ? 'Tin vào trực giác của bạn.' : 'Trust your intuition.'));
  return steps;
}

// ─── SHOW READING ─────────────────────────────────────────────────────────────
function showReading() {
  const panel = document.getElementById('readingPanel');
  const isVi = currentLang === 'vi';
  const posKeys = ['past', 'present', 'future'];

  document.getElementById('cardReadings').innerHTML = drawnCards.map((card, i) => {
    const d = isVi ? DECK_VI[card.id] : card;
    const posKey = posKeys[i];
    let posInterp = '';

    // Position-specific interpretation
    if (card.arcana === 'major' && typeof MAJOR_POSITION_INTERP !== 'undefined' && MAJOR_POSITION_INTERP[card.id]) {
      const mpi = MAJOR_POSITION_INTERP[card.id][posKey];
      if (mpi) posInterp = isVi ? mpi.vi : mpi.en;
    } else if (typeof POSITION_FRAMES !== 'undefined' && POSITION_FRAMES[posKey]) {
      const frame = POSITION_FRAMES[posKey];
      const prefix = isVi ? frame.prefix_vi : frame.prefix_en;
      posInterp = `${prefix} ${d.meaning}`;
    }

    // Reversed meaning
    let reversedHtml = '';
    if (card.isReversed && typeof REVERSED_MEANINGS !== 'undefined' && REVERSED_MEANINGS[card.id]) {
      const rev = REVERSED_MEANINGS[card.id];
      const revText = isVi ? rev.vi : rev.en;
      const revLabel = isVi ? '↓ Ngược' : '↓ Reversed';
      reversedHtml = `
        <div class="r-reversed-meaning">
          <span class="r-reversed-tag">${revLabel}</span> ${revText}
        </div>`;
    }

    return `
    <div class="card-reading" style="animation-delay:${i * .18}s">
      <div class="r-pos">${T.positions[i]}</div>
      <div class="r-sym">${card.sym}</div>
      <div class="r-name">${card.name}${card.isReversed ? ' <span class="r-reversed-tag">↓ R</span>' : ''}</div>
      <div class="r-kw">${d.kw.join(' · ')}</div>
      <div class="r-meaning">${d.meaning}</div>
      ${posInterp ? `<div class="r-position-interp">${posInterp}</div>` : ''}
      ${reversedHtml}
    </div>`;
  }).join('');
  panel.classList.add('visible');

  generateConclusion();

  setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'start' }), 250);
}

function generateConclusion() {
  const area = document.getElementById('conclusionArea');
  const box = document.getElementById('conclusionBox');
  const isVi = currentLang === 'vi';
  const lk = isVi ? 'vi' : 'en';

  // ── Analysis ──
  const elAnalysis = analyzeElements(drawnCards);
  const energyKey = determineEnergy(drawnCards, elAnalysis);
  const confKey = determineConfidence(drawnCards, elAnalysis);
  const energy = ENERGY_TYPES[energyKey];
  const conf = CONFIDENCE_LEVELS[confKey];

  // ── Opening (question-model aware) ──
  const opening = (typeof QUESTION_MODEL_OPENINGS !== 'undefined' && QUESTION_MODEL_OPENINGS[selectedModel])
    ? QUESTION_MODEL_OPENINGS[selectedModel][lk]
    : (isVi ? 'Các lá bài đã lên tiếng.' : 'The cards have spoken.');

  // ── Thread: card interactions ──
  let threadParts = [];
  // Check pairs: past↔present, present↔future, past↔future
  const pairs = [[0,1],[1,2],[0,2]];
  for (const [a, b] of pairs) {
    const interaction = findInteraction(drawnCards[a], drawnCards[b]);
    if (interaction) threadParts.push(interaction[lk]);
  }
  const threadHtml = threadParts.length > 0
    ? threadParts.map(t => `<p>${t}</p>`).join('')
    : `<p>${isVi ? 'Các lá bài mang năng lượng riêng biệt, tạo nên một bức tranh đa chiều cho hành trình của bạn.' : 'The cards carry distinct energies, creating a multifaceted picture for your journey.'}</p>`;

  // ── Elements ──
  let elemParts = [];
  // Arcana ratio
  if (typeof ARCANA_RATIO_TEXT !== 'undefined' && ARCANA_RATIO_TEXT[elAnalysis.majorCount]) {
    elemParts.push(ARCANA_RATIO_TEXT[elAnalysis.majorCount][lk]);
  }
  // Dominant elements
  for (const el of elAnalysis.dominant) {
    if (typeof ELEMENT_DOMINANT !== 'undefined' && ELEMENT_DOMINANT[el]) {
      elemParts.push(ELEMENT_DOMINANT[el][lk]);
    }
  }
  // Missing elements
  for (const el of elAnalysis.missing) {
    if (typeof ELEMENT_MISSING !== 'undefined' && ELEMENT_MISSING[el]) {
      elemParts.push(ELEMENT_MISSING[el][lk]);
    }
  }
  const elemHtml = elemParts.length > 0
    ? elemParts.map(e => `<p>${e}</p>`).join('')
    : `<p>${isVi ? 'Sự cân bằng nguyên tố trong trải bài này khá đồng đều.' : 'The elemental balance in this spread is relatively even.'}</p>`;

  // ── Action Steps ──
  const steps = generateActionSteps(drawnCards[2], selectedModel, isVi);
  const stepsHtml = `<ol>${steps.map(s => `<li>${s}</li>`).join('')}</ol>`;

  // ── Section labels ──
  const labels = {
    title: isVi ? '☽ Tổng Hợp Bài Đọc ☽' : '☽ Reading Synthesis ☽',
    thread: isVi ? 'Sợi Chỉ Đỏ' : 'The Thread',
    elements: isVi ? 'Phân Tích Nguyên Tố' : 'Element Analysis',
    path: isVi ? 'Con Đường Phía Trước' : 'Path Forward',
    energyLabel: isVi ? 'Năng Lượng' : 'Energy',
    confLabel: isVi ? 'Độ Tin Cậy' : 'Confidence'
  };

  box.innerHTML = `
    <div class="conclusion-title">${labels.title}</div>
    <div class="synth-section">
      <div class="synth-opening">${opening}</div>
    </div>
    <div class="synth-section">
      <div class="synth-section-title">${labels.thread}</div>
      <div class="synth-thread">${threadHtml}</div>
    </div>
    <div class="synth-section">
      <div class="synth-section-title">${labels.elements}</div>
      <div class="synth-elements">${elemHtml}</div>
    </div>
    <div class="synth-section">
      <div class="synth-section-title">${labels.path}</div>
      <div class="synth-path">${stepsHtml}</div>
    </div>
    <div class="synth-badges">
      <div class="synth-badge"><span class="badge-icon">${energy.icon}</span> ${labels.energyLabel}: ${energy[lk]}</div>
      <div class="synth-badge">${labels.confLabel}: ${conf[lk]}</div>
    </div>
  `;
  area.style.display = 'block';
}

// ─── RESET ────────────────────────────────────────────────────────────────────
function resetReading() {
  POSITIONS.forEach((_, i) => {
    const cw = document.getElementById(`cw${i}`);
    cw.classList.remove('flipped');
    cw.style.cssText = 'display:none';
    const ph = document.getElementById(`ph${i}`);
    ph.style.display = 'flex';
  });
  document.getElementById('readingPanel').classList.remove('visible');
  document.getElementById('conclusionArea').style.display = 'none';
  const sb = document.getElementById('shuffleBtn');
  sb.style.display = 'inline-block';
  sb.disabled = false;
  sb.textContent = T.shuffleTxt;
  document.getElementById('resetBtn').style.display = 'none';
  document.getElementById('instr').textContent = T.instrInit;
  flippedCount = 0;
  drawnCards = [];
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─── CUSTOM CURSOR ─────────────────────────────────────────────────────────
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursor-ring');
let mx = 0, my = 0, rx = 0, ry = 0;
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; cursor.style.left = mx+'px'; cursor.style.top = my+'px'; });
(function movRing(){ rx += (mx-rx)*.15; ry += (my-ry)*.15; ring.style.left = rx+'px'; ring.style.top = ry+'px'; requestAnimationFrame(movRing); })();

// ─── CANVAS STARFIELD ──────────────────────────────────────────────────────
(function(){
  const c = document.getElementById('cosmos'), ctx = c.getContext('2d');
  let W, H, stars = [], constellations = [];
  function resize(){ W = c.width = innerWidth; H = c.height = innerHeight; }
  resize(); window.addEventListener('resize', resize);
  for(let i=0;i<280;i++) stars.push({x:Math.random()*2000-500,y:Math.random()*2000-500,r:Math.random()*1.2+.3,a:Math.random()*6.28,s:Math.random()*.0006+.0002});
  for(let i=0;i<12;i++){const pts=[];for(let j=0;j<Math.floor(Math.random()*4+3);j++) pts.push(Math.floor(Math.random()*stars.length));constellations.push(pts);}
  function draw(){
    ctx.clearRect(0,0,W,H);
    const t=performance.now();
    stars.forEach(s=>{
      const flicker=.5+.5*Math.sin(s.a+t*s.s);
      ctx.beginPath();ctx.arc(((s.x%W)+W)%W,((s.y%H)+H)%H,s.r,0,6.28);
      ctx.fillStyle=`rgba(232,213,163,${(.15+flicker*.55).toFixed(2)})`;ctx.fill();
    });
    ctx.strokeStyle='rgba(201,168,76,.04)';ctx.lineWidth=.5;
    constellations.forEach(pts=>{ctx.beginPath();pts.forEach((pi,j)=>{const s=stars[pi];const x=((s.x%W)+W)%W,y=((s.y%H)+H)%H;j===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});ctx.stroke();});
    requestAnimationFrame(draw);
  }
  draw();
})();
