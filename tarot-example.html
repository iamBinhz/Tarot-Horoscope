  {name:"Ba Gậy",suit:"Gậy",kw:["Mở Rộng","Nhìn Xa","Tiến Bộ"],meaning:"Những nỗ lực ban đầu đang cho kết quả thực — khách hàng phản hồi, kỹ năng cải thiện, mối quan hệ sâu sắc hơn — và bước tiếp theo tự nhiên là mở rộng. Three of Wands nói tàu của bạn đang trở về, nhưng bạn cần canh chừng chân trời và chuẩn bị cho những gì đến, không phải nghỉ ngơi trên thành tích đã có. Hãy nghĩ lớn hơn phạm vi hiện tại. Cơ hội phía trước lớn hơn bạn ước tính ban đầu."},
  {name:"Bốn Gậy",suit:"Gậy",kw:["Ăn Mừng","Hòa Hợp","Nhà"],meaning:"Bạn đã đạt được một cột mốc thực sự — dự án hoàn thành, mối quan hệ vững chắc, ngôi nhà được thiết lập, hoặc mục tiêu đạt được — và Four of Wands nói: hãy dừng lại và ăn mừng đúng cách. Bạn có thói quen lao vào thử thách tiếp theo mà không ghi nhận những gì vừa đạt được. Hãy tập hợp những người đã giúp bạn đến đây, đánh dấu dịp này, và để sự ấm áp của thuộc về lấp đầy bạn trước khi tiến lên."},
  {name:"Năm Gậy",suit:"Gậy",kw:["Xung Đột","Cạnh Tranh","Thách Thức"],meaning:"Bạn đang trong tình huống có nhiều tiếng nói, chương trình nghị sự, hoặc ưu tiên cạnh tranh — tranh giành quyền lực nơi làm việc, bất đồng sáng tạo, hoặc nhóm mà ai cũng muốn dẫn đầu và không ai muốn lắng nghe. Five of Wands không nhất thiết là xung đột phá hoại; nó là ma sát giúp mài sắc. Nhưng bạn cần quyết định liệu sự cạnh tranh này đang làm bạn tốt hơn hay chỉ tiêu hao năng lượng. Nếu là cái trước, hãy dấn thân. Nếu là cái sau, hãy rời đi."},
  {name:"Sáu Gậy",suit:"Gậy",kw:["Chiến Thắng","Được Công Nhận","Thành Tích"],meaning:"Điều bạn đã nỗ lực chăm chỉ đang nhận được sự công nhận xứng đáng — thăng chức, lời khen công khai, ra mắt thành công, hoặc bước đột phá cá nhân mà người khác có thể thấy. Six of Wands nói: hãy đón nhận khoảnh khắc này đầy đủ. Đừng hạ thấp thành tích hay né tránh lời khen. Bạn đã giành được điều này qua nỗ lực thực sự. Hãy để sự công nhận tiếp thêm tự tin cho những thử thách khó hơn phía trước, vì chúng sẽ đến."},
  {name:"Bảy Gậy",suit:"Gậy",kw:["Kiên Trì","Bảo Vệ","Niềm Tin"],meaning:"Vị trí, ý tưởng, hoặc ranh giới của bạn đang bị thách thức — bởi đối thủ, người phê bình, người muốn những gì bạn có, hoặc hoàn cảnh đang thử xem bạn có thực sự tin vào điều mình đang làm không. Seven of Wands nói bạn có vị trí cao và lợi thế, nhưng chỉ nếu bạn đứng vững. Đây không phải lúc nghi ngờ bản thân hay chiều theo những người không có ý tốt cho bạn. Hãy bảo vệ những gì bạn đã xây."},
  {name:"Tám Gậy",suit:"Gậy",kw:["Hành Động Nhanh","Chuyển Động","Tin Tức"],meaning:"Sự kiện đang tăng tốc nhanh chóng — tin nhắn đến, kế hoạch khớp lại, di chuyển diễn ra, quyết định được đưa ra nhanh. Eight of Wands báo hiệu giai đoạn chậm đã qua và mọi thứ đang chuyển động với tốc độ. Công việc của bạn không phải làm chậm lại mà là phản ứng nhanh và chính xác. Cửa sổ cơ hội là thật nhưng hẹp. Hãy hành động theo tin tức, trả lời tin nhắn, đặt vé — đà thưởng cho người quyết đoán."},
  {name:"Chín Gậy",suit:"Gậy",kw:["Khả Năng Phục Hồi","Kiên Trì","Chịu Đựng"],meaning:"Bạn kiệt sức, cảnh giác, và tự hỏi liệu nỗ lực đã bỏ ra có bao giờ được đền đáp. Nine of Wands xuất hiện khi bạn chỉ cách bước đột phá một cú đẩy — nhưng bạn đã đẩy quá lâu đến mức không chắc mình có thể làm lại. Bạn có thể. Đây không phải lúc bỏ cuộc. Hãy bảo vệ năng lượng, nghỉ chút, rồi thực hiện nỗ lực cuối cùng. Những gì bạn đã xây qua kiên trì vững chắc hơn bạn nghĩ."},
  {name:"Mười Gậy",suit:"Gậy",kw:["Gánh Nặng","Trách Nhiệm","Quá Tải"],meaning:"Bạn đã nói đồng ý quá nhiều thứ và đang gánh trách nhiệm thuộc về người khác. Ten of Wands là lá bài kiệt sức — xuất hiện không phải vì bạn yếu, mà vì bạn quá giỏi và quá sẵn lòng. Cần phải đặt xuống gì đó. Hãy xác định ba cam kết tiêu hao bạn nhiều nhất và hoặc ủy thác, đàm phán lại, hoặc bỏ chúng hoàn toàn. Bạn không thể làm mọi thứ, và cố gắng đang phá hủy điều quan trọng."},
  {name:"Tiểu Thư Gậy",suit:"Gậy",kw:["Nhiệt Tình","Khám Phá","Tinh Thần Tự Do"],meaning:"Điều gì đó đã thu hút sự chú ý và thắp lên niềm hào hứng — sở thích mới, mối quan tâm bất ngờ, một lời mời khiến năng lượng bạn tăng lên. Page of Wands nói: hãy theo đuổi sự tò mò đó mà không cần biết nó dẫn đến đâu. Không phải mọi thứ đều cần trở thành sự nghiệp hoặc kế hoạch cuộc đời. Đôi khi những khám phá quan trọng nhất bắt đầu như sự khám phá vui tươi. Hãy nói có với điều khiến bạn hào hứng, ngay cả khi nó có vẻ không thực tế."},
  {name:"Kỵ Sĩ Gậy",suit:"Gậy",kw:["Hành Động","Đam Mê","Phiêu Lưu"],meaning:"Bạn đang trong giai đoạn năng lượng dồi dào, tham vọng và động lực tiến lên — sẵn sàng lao vào dự án mới, mối quan hệ, hoặc cuộc phiêu lưu mà không quay lại. Knight of Wands hiện thân hành động đam mê, nhưng điểm yếu của anh là hành động trước khi suy nghĩ. Hãy khai thác đà lửa này vào điều cụ thể. Chọn một mục tiêu, cam kết hoàn toàn, và lao vào. Nhưng trước: dừng lại 30 giây và đảm bảo bạn đang chạy về phía điều gì đó, không phải chạy trốn."},
  {name:"Nữ Hoàng Gậy",suit:"Gậy",kw:["Sức Hút","Tự Tin","Quyết Tâm"],meaning:"Bạn đang được gọi để lãnh đạo với sự ấm áp, tự tin và tầm nhìn sáng tạo — như một quản lý, phụ huynh, người bạn, hoặc đơn giản là người trong phòng thiết lập giai điệu. Queen of Wands không lãnh đạo bằng quyền lực hay sức mạnh; cô ấy lãnh đạo vì mọi người tự nhiên bị thu hút bởi năng lượng của cô ấy. Hãy sở hữu sự hiện diện mà không xin lỗi. Dự án, nhóm, hoặc tình huống cần sự kết hợp đặc biệt của sự táo bạo và trái tim bạn ngay bây giờ."},
  {name:"Vua Gậy",suit:"Gậy",kw:["Tầm Nhìn","Lãnh Đạo","Thành Thạo"],meaning:"Bạn có tầm nhìn, kinh nghiệm và uy quyền để dẫn dắt điều gì đó quan trọng — doanh nghiệp, nỗ lực sáng tạo, nhóm, hoặc hướng đi cuộc đời lớn. King of Wands là nhà lãnh đạo trưởng thành truyền cảm hứng qua tấm gương và sự táo bạo chiến lược. Đây không phải lúc thận trọng hay tìm kiếm đồng thuận. Hãy đưa ra quyết định, truyền đạt rõ ràng, và tin rằng thành tích đã cho bạn quyền lãnh đạo. Người khác đang chờ bạn đứng lên."},
  // CUPS
  {name:"Át Cốc",suit:"Cốc",kw:["Tình Yêu Mới","Từ Bi","Mở Lòng"],meaning:"Một khởi đầu cảm xúc mới đang thực sự có sẵn cho bạn ngay bây giờ — tình yêu mới, lòng trắc ẩn sâu hơn, kênh sáng tạo mở ra, hoặc sự thức tỉnh tâm linh bạn không mong đợi. Ace of Cups không phải về việc theo đuổi cảm xúc; mà là sẵn sàng tiếp nhận chúng. Ai đó hoặc điều gì đó đang trao cho bạn món quà cảm xúc. Hãy mở lòng đủ để đón nhận, ngay cả khi kinh nghiệm quá khứ đã dạy bạn phải bảo vệ nó."},
  {name:"Hai Cốc",suit:"Cốc",kw:["Đối Tác","Kết Nối","Hòa Hợp"],meaning:"Một kết nối thực sự đang hình thành giữa bạn và một người khác — lãng mạn, chuyên nghiệp, hoặc tình bạn sâu sắc — dựa trên sự nhận biết chân thành, không chỉ là tiện lợi hay hấp dẫn. Two of Cups nói mối quan hệ đối tác này có tiềm năng thực sự vì cả hai người đều nhìn thấy và trân trọng nhau. Hãy đầu tư vào mối quan hệ này với sự trung thực và sự hiện diện. Hiếm khi tìm được ai phản ánh giá trị của bạn rõ ràng như vậy."},
  {name:"Ba Cốc",suit:"Cốc",kw:["Ăn Mừng","Tình Bạn","Cộng Đồng"],meaning:"Cuộc sống của bạn cần nhiều kết nối con người chân thành hơn ngay bây giờ — không phải networking, không phải mạng xã hội, mà là niềm vui thực sự được chia sẻ với những người biết và quan tâm đến bạn. Three of Cups xuất hiện khi bạn đã cô lập quá lâu hoặc khi có dịp thực sự cho niềm vui tập thể. Hãy gọi những người bạn bạn định gặp, tham dự buổi gặp mặt, nói có với lời mời. Năng lượng cộng đồng sẽ phục hồi điều gì đó trong bạn mà sự cô đơn không thể."},
  {name:"Bốn Cốc",suit:"Cốc",kw:["Thờ Ơ","Suy Ngẫm","Đánh Giá Lại"],meaning:"Bạn đang cảm thấy chán nản, không hài lòng, hoặc cảm xúc trống rỗng — và một cơ hội hoặc lời đề nghị đang ngay trước mặt mà bạn không thấy vì quá tập trung vào những gì mình không có. Four of Cups nói sự thờ ơ này không phải vĩnh viễn; nó là tín hiệu cần đánh giá lại điều bạn thực sự muốn. Nhưng khi ngồi suy ngẫm, đừng bỏ lỡ chiếc cốc đang được trao. Hãy nhìn lên. Điều gì đó thực sự đang được đặt trước mặt bạn ngay bây giờ."},
  {name:"Năm Cốc",suit:"Cốc",kw:["Đau Buồn","Mất Mát","Hối Tiếc"],meaning:"Bạn đang thương tiếc điều gì đó — mối quan hệ kết thúc, cơ hội vuột mất, phiên bản cuộc sống đã không thành hiện thực. Five of Cups nói nỗi đau của bạn hợp lệ và cần thiết; đừng vội vàng bỏ qua. Nhưng nó cũng chỉ đến hai chiếc cốc vẫn đứng phía sau bạn: các mối quan hệ, nguồn lực và khả năng còn lại. Sau khi đã hoàn toàn tôn trọng mất mát, hãy quay lại. Những gì sống sót qua nỗi đau này mạnh hơn những gì đã mất."},
  {name:"Sáu Cốc",suit:"Cốc",kw:["Hoài Niệm","Ngây Thơ","Quá Khứ"],meaning:"Điều gì đó từ quá khứ đang trở lại — một người bạn cũ liên lạc lại, ký ức thơ ấu được kích hoạt, hoặc tình huống lặp lại khuôn mẫu bạn nhận ra. Six of Cups không đơn giản yêu cầu bạn hoài cảm; mà hỏi liệu việc nhìn lại quá khứ có thể thực sự chữa lành điều gì đó trong hiện tại. Một số cánh cửa đáng để mở lại. Nhưng hãy trung thực về việc nỗi nhớ đang hướng bạn đến tăng trưởng hay kéo bạn khỏi cuộc sống cần sự chú ý của bạn ngay bây giờ."},
  {name:"Bảy Cốc",suit:"Cốc",kw:["Lựa Chọn","Tưởng Tượng","Ảo Tưởng"],meaning:"Bạn đang chìm trong lựa chọn, mộng tưởng, hoặc khả năng — và sự dư thừa những gì bạn có thể làm đang ngăn bạn làm bất cứ điều gì thực sự. Seven of Cups là lá bài của ảo ảnh đẹp và phân tâm thú vị. Không phải tất cả tầm nhìn này đều thật; một số là mong muốn viển vông, số khác là nỗi sợ trá hình. Nhiệm vụ của bạn không phải khám phá mọi khả năng mà là chọn cái phù hợp thực tế và cam kết trước khi cửa sổ đóng lại."},
  {name:"Tám Cốc",suit:"Cốc",kw:["Buông Bỏ","Tiến Lên","Tìm Kiếm Nhiều Hơn"],meaning:"Điều gì đó từng thỏa mãn bạn không còn nữa — mối quan hệ, công việc, nơi sống, hướng sáng tạo — và bạn biết điều đó, dù chưa hoàn toàn thừa nhận. Eight of Cups nói về lòng dũng cảm yên lặng để bước đi khỏi thứ không hỏng nhưng đơn giản không còn đúng. Đây không phải kịch tính hay khủng hoảng; là sự tự nhận thức trưởng thành. Điều gì đó sâu sắc hơn đang gọi bạn. Hãy lắng nghe và bắt đầu di chuyển về phía nó, dù con đường chưa rõ."},
  {name:"Chín Cốc",suit:"Cốc",kw:["Mãn Nguyện","Ước Nguyện","Thỏa Mãn"],meaning:"Điều bạn thực sự ước muốn đang ở đây hoặc rất gần — sự thỏa mãn cảm xúc, cột mốc quan hệ, sự mãn nguyện cá nhân, hoặc mong muốn đang được ban. Nine of Cups nói bạn được phép cảm thấy hài lòng. Đây không phải tự mãn hay ích kỷ; đây là phần thưởng tự nhiên của việc sắp xếp cuộc sống theo điều bạn thực sự trân trọng. Hãy thưởng thức điều này. Để sự hài lòng trọn vẹn. Bạn không cần phải ngay lập tức tìm điều tiếp theo để lo lắng."},
  {name:"Mười Cốc",suit:"Cốc",kw:["Phúc Lộc","Gia Đình","Niềm Vui Bền Lâu"],meaning:"Đây là lá bài của sự thỏa mãn cảm xúc chân thật, bền lâu — không phải khoái cảm thoáng qua, mà là sự mãn nguyện sâu sắc đến từ tình yêu thật, kết nối bền bỉ, và cuộc sống cảm giác như nhà. Ten of Cups có thể chỉ đến sự hòa hợp gia đình, mối quan hệ đã trưởng thành thành điều đẹp đẽ, hoặc cộng đồng thực sự nâng đỡ bạn. Nếu đây mô tả tình huống của bạn, hãy nhận ra đầy đủ và bảo vệ nó. Nếu chưa, hãy biết rằng nó thực sự khả thi."},
  {name:"Tiểu Thư Cốc",suit:"Cốc",kw:["Sáng Tạo","Trực Giác","Sứ Điệp"],meaning:"Một thông điệp nhẹ nhàng, bất ngờ đang đến — không nhất thiết là thư, mà là cảm giác, xung lực sáng tạo, sự trùng hợp, hoặc cú hích cảm xúc từ tiềm thức đáng được chú ý. Page of Cups nói: hãy mềm mại và tiếp nhận ngay bây giờ. Đừng phân tích cảm giác đi hoặc gạt bỏ nó là phi lý. Con cá trong chiếc cốc là thật. Hãy theo đuổi xung lực sáng tạo, phản hồi tín hiệu cảm xúc, và để trí tưởng tượng dẫn đường một lúc."},
  {name:"Kỵ Sĩ Cốc",suit:"Cốc",kw:["Lãng Mạn","Quyến Rũ","Mơ Mộng"],meaning:"Bạn hoặc ai đó trong cuộc sống đang tiếp cận tình huống với sự lãng mạn lý tưởng và cường độ cảm xúc — một lời bày tỏ, đề xuất sáng tạo, cử chỉ chân thành. Knight of Cups phi đến điều trái tim muốn, và sự chân thành đó là sức mạnh lớn nhất. Nhưng chủ nghĩa lý tưởng cũng có thể che mắt trước thực tế. Hãy để trái tim dẫn dắt, nhưng giữ mắt mở. Những cuộc phiêu lưu đẹp nhất vẫn đòi hỏi bạn nhìn xem mình đang bước đi đâu."},
  {name:"Nữ Hoàng Cốc",suit:"Cốc",kw:["Từ Bi","Đồng Cảm","Nuôi Dưỡng"],meaning:"Tình huống đòi hỏi trí tuệ cảm xúc sâu sắc — khả năng giữ không gian cho nỗi đau của người khác mà không chìm đắm, lắng nghe mà không sửa, và tin tưởng trực giác là dữ liệu hợp lệ. Queen of Cups hiện thân sự làm chủ cảm xúc không đến từ kìm nén mà từ tích hợp. Nếu bạn đang mất mình trong cảm xúc người khác, cô ấy nhắc nhở kiểm tra chiếc cốc của chính mình trước. Bạn không thể rót từ cốc trống."},
  {name:"Vua Cốc",suit:"Cốc",kw:["Bình Tĩnh Cảm Xúc","Kiểm Soát","Từ Bi"],meaning:"Tình huống cần bạn là sự bình tĩnh giữa cơn bão — cảm nhận mọi thứ sâu sắc trong khi phản ứng với sự điềm tĩnh, khôn ngoan, và lòng trắc ẩn có chừng mực. King of Cups đã làm chủ nghệ thuật điều chỉnh cảm xúc: anh không kìm nén cảm xúc, anh khai thác chúng. Nếu xung đột đang xoáy quanh bạn, hãy là người giảm leo thang qua sự thấu hiểu chân thành thay vì logic lạnh lùng. Hãy lãnh đạo bằng trái tim, nhưng để trí tuệ giữ bánh lái."},
  // SWORDS
  {name:"Át Kiếm",suit:"Kiếm",kw:["Sự Rõ Ràng","Sự Thật","Đột Phá"],meaning:"Khoảnh khắc rõ ràng tinh thần thực sự đã cắt qua sự nhầm lẫn — bạn đột nhiên thấy sự thật của tình huống, câu trả lời đúng cho quyết định, hoặc bản chất thực của vấn đề bạn đã vật lộn. Ace of Swords không phải cái nhìn nhẹ nhàng; đây là lưỡi cắt sạch, rõ ràng qua sương mù. Hãy hành động ngay trên sự rõ ràng này, khi nó còn tươi. Nói sự thật, đưa ra quyết định, gửi tin nhắn đi. Sức mạnh tinh thần tập trung thế này không kéo dài mãi — sử dụng trước khi nó mờ."},
  {name:"Hai Kiếm",suit:"Kiếm",kw:["Bế Tắc","Quyết Định Khó Khăn","Trung Lập"],meaning:"Bạn đang tránh một quyết định — không phải vì thiếu thông tin, mà vì cả hai lựa chọn đều đòi hỏi hy sinh và bạn hy vọng con đường thứ ba, không đau sẽ xuất hiện. Nó sẽ không đến. Two of Swords nói bịt mắt là tự đặt; bạn đang chọn không nhìn vì nhìn sẽ buộc phải hành động. Hãy bỏ bịt mắt, đối mặt với các lựa chọn một cách trung thực, và quyết định. Tiếp tục né tránh tự nó là một lựa chọn, và thường là tồi tệ nhất."},
  {name:"Ba Kiếm",suit:"Kiếm",kw:["Đau Lòng","Đau Khổ","Mất Mát"],meaning:"Điều gì đó đã làm bạn tổn thương — sự phản bội, sự thật khó chấp nhận, sự từ chối, hoặc mất mát cắt sâu. Three of Swords không tô hồng nỗi đau; nó nói: đúng, điều này đau, và nó phải vậy. Vết thương là thật. Nhưng kìm nén hoặc giả vờ ổn sẽ chỉ đẩy lưỡi kiếm sâu hơn. Hãy để mình cảm nhận toàn bộ sức nặng. Khóc nếu cần, thừa nhận nỗi đau với ai đó bạn tin tưởng, và biết rằng chữa lành thực sự không thể bắt đầu cho đến khi tổn thương được thừa nhận đầy đủ."},
  {name:"Bốn Kiếm",suit:"Kiếm",kw:["Nghỉ Ngơi","Phục Hồi","Suy Ngẫm"],meaning:"Tâm trí và cơ thể bạn đang cạn kiệt và ép buộc thêm sẽ làm mọi thứ tệ hơn. Four of Swords là chỉ dẫn trực tiếp để nghỉ ngơi — không phải phần thưởng sau khi xong, mà là nhu cầu chiến lược ngay bây giờ. Hãy hủy một việc hôm nay. Ngủ nhiều hơn. Rời khỏi màn hình. Vấn đề bạn đang ám ảnh sẽ rõ ràng hơn sau khi phục hồi thực sự. Rút lui chiến lược không phải yếu đuối; đó là điều phân biệt người kiệt sức với người bền bỉ."},
  {name:"Năm Kiếm",suit:"Kiếm",kw:["Xung Đột","Thất Bại","Mất Mát"],meaning:"Bạn đang trong hoặc đang tiến vào xung đột mà chiến thắng có thể nhưng cái giá cao hơn giá trị phần thưởng. Five of Swords hỏi: cuộc chiến này vì nguyên tắc hay vì ego? Nếu bạn đã thắng, hãy chú ý ai bạn đã để bị thương trên chiến trường. Nếu bạn đã thua, xem xét liệu trận chiến này có đáng không. Đôi khi bước đi khôn ngoan nhất là thu gom những thanh kiếm còn lại và rời đi trước khi thiệt hại thêm."},
  {name:"Sáu Kiếm",suit:"Kiếm",kw:["Chuyển Tiếp","Chữa Lành","Di Chuyển Tiếp"],meaning:"Bạn đang rời bỏ tình huống đau đớn — thoát khỏi mối quan hệ, tư duy, công việc, hoặc giai đoạn cuộc đời khó khăn. Six of Swords nói hành trình đến nơi tốt hơn đã bắt đầu, dù chưa cảm thấy nhẹ nhõm. Bạn sẽ mang theo một ít hành lý từ chuyện đã xảy ra, và đó là bình thường. Nhưng vùng nước phía trước êm hơn phía sau. Hãy tiếp tục tiến về phía trước. Đừng quay lại kiểm tra xem cơn bão đã thực sự qua chưa — nó đã qua rồi."},
  {name:"Bảy Kiếm",suit:"Kiếm",kw:["Lừa Dối","Chiến Lược","Bỏ Trốn"],meaning:"Ai đó không hoàn toàn trung thực — và có thể là bạn. Seven of Swords cảnh báo về chương trình nghị sự ẩn, nửa sự thật, hoặc lừa dối chiến lược trong tình huống. Đây có thể là ai đó lấy công của bạn, đối tác giấu thông tin, hoặc xu hướng của chính bạn né tránh đối đầu bằng cách đi vòng vấn đề thay vì đi xuyên qua. Hãy kiểm tra tính trung thực của chính mình trước. Rồi nhìn kỹ ai xung quanh đang nói một đằng làm một nẻo."},
  {name:"Tám Kiếm",suit:"Kiếm",kw:["Bị Trói Buộc","Giới Hạn Tinh Thần","Bị Giam Cầm"],meaning:"Bạn cảm thấy bị mắc kẹt, nhưng cái lồng phần lớn do bạn tự xây — niềm tin giới hạn, giả định về điều gì khả thi, sợ hậu quả có thể không bao giờ xảy ra, hoặc câu chuyện nạn nhân bạn đã kể cho mình quá lâu. Eight of Swords nói bịt mắt và dây thừng đủ lỏng để trốn thoát nếu bạn thực sự cố. Hãy gọi tên niềm tin cụ thể giam giữ bạn. Đặt câu hỏi trung thực. Bạn sẽ thấy phần lớn xiềng xích được làm từ suy nghĩ, không phải sự thật."},
  {name:"Chín Kiếm",suit:"Kiếm",kw:["Lo Âu","Ác Mộng","Lo Lắng"],meaning:"Tâm trí bạn đang bị giày vò bởi kịch bản tệ nhất, cảm giác tội lỗi, xấu hổ, hoặc lo âu tăng cường vào ban đêm khi sự xao nhãng mất dần. Nine of Swords nói: hầu hết những gì đang khiến bạn sợ hãi ngay lúc này là phóng chiếu, không phải thực tế. Nỗi sợ là thật, nhưng thảm họa nó dự đoán thường không phải. Hãy đưa lo lắng ra khỏi đầu lên giấy. Kể cho ai đó nghe điều giữ bạn thức. Tìm kiếm hỗ trợ chuyên nghiệp nếu đã kéo dài quá lâu. Bạn không cô đơn dù cảm giác vậy lúc 3 giờ sáng."},
  {name:"Mười Kiếm",suit:"Kiếm",kw:["Cú Đánh Cuối","Mất Mát","Kết Thúc"],meaning:"Đây là đáy — điều tệ nhất đã xảy ra, hoặc đang xảy ra, và không còn chỗ để xuống nữa. Ten of Swords không giả vờ điều này không đau; nó đau. Nhưng nó cũng mang lời hứa ẩn: phông nền của lá bài này là bình minh. Chương đã kết thúc cần phải kết thúc. Nỗi đau bạn cảm nhận là hơi thở cuối của thứ đã bóp nghẹt bạn. Từ đây, hướng đi duy nhất là lên. Hãy để kết thúc này là dứt khoát, và bắt đầu nhìn về phía bình minh."},
  {name:"Tiểu Thư Kiếm",suit:"Kiếm",kw:["Tò Mò","Khéo Léo","Cảnh Giác"],meaning:"Thông tin mới đang đến — một sự thật, tin nhắn, quan sát sẽ thay đổi cách bạn hiểu tình huống. Page of Swords nói: hãy tỉnh táo, hỏi những câu sắc bén, và đừng chấp nhận giải thích bề mặt. Sự tò mò là tài sản lớn nhất ngay lúc này. Nhưng hãy cẩn thận với cách bạn sử dụng những gì học được; lá này cũng cảnh báo về việc ngồi lê đôi mách hoặc dùng thông tin như vũ khí. Thu thập thông tin một cách khôn ngoan, chia sẻ có trách nhiệm."},
  {name:"Kỵ Sĩ Kiếm",suit:"Kiếm",kw:["Tham Vọng","Trực Tiếp","Liều Lĩnh"],meaning:"Bạn hoặc ai đó xung quanh đang lao về phía mục tiêu với sự tập trung tinh thần mãnh liệt, tốc độ, và quyết tâm — sẵn sàng cắt qua chướng ngại bằng sức mạnh niềm tin. Knight of Swords hiện thân hành động dứt khoát, không rườm rà, được thúc đẩy bởi tin mình đúng. Sức mạnh là sự rõ ràng và tốc độ; rủi ro là di chuyển quá nhanh đến mức đánh giá sai tình huống hoặc gây thương tổn đồng minh mà không nhận ra. Nếu phải lao lên, hãy kiểm tra điểm mù trước."},
  {name:"Nữ Hoàng Kiếm",suit:"Kiếm",kw:["Nhận Thức Sắc Bén","Độc Lập","Thẳng Thắn"],meaning:"Tình huống cần ai đó có thể cắt qua tiếng ồn cảm xúc và nói sự thật không tô vẽ — tử tế nhưng không xin lỗi. Queen of Swords đã giành được sự rõ ràng qua kinh nghiệm cá nhân và nỗi đau; sự thẳng thắn của cô ấy không phải tàn nhẫn, mà là lòng trắc ẩn được tinh luyện bởi trí tuệ. Nếu bạn được yêu cầu cho lời khuyên, giữ ranh giới, hoặc phán xét, hãy khai thác cô ấy: trung thực, rõ ràng, công bằng. Người ta sẽ tôn trọng sự thật ngay cả khi nó nhói, nếu nó đến từ sự quan tâm chân thành."},
  {name:"Vua Kiếm",suit:"Kiếm",kw:["Quyền Uy Tinh Thần","Công Bằng","Sự Thật"],meaning:"Bạn đang được gọi để đưa ra quyết định đòi hỏi tư duy rõ ràng, lý trí và đạo đức — một quyết định lãnh đạo, phán xét đạo đức, hướng chiến lược ảnh hưởng đến người khác. King of Swords ra lệnh qua sức mạnh trí tuệ, không phải cảm xúc. Đây không phải lúc cho tình cảm hay mơ tưởng; đây là lúc cho phân tích trung thực và hành động có nguyên tắc. Hãy nói điều đúng, quyết định điều công bằng, và đứng sau lý luận với uy quyền thầm lặng."},
  // PENTACLES
  {name:"Át Tiền",suit:"Tiền",kw:["Cơ Hội Mới","Thịnh Vượng","Biểu Hiện"],meaning:"Một cơ hội hữu hình đang xuất hiện trong thế giới vật chất — lời mời làm việc, cơ hội tài chính, cơ hội xây dựng điều thực sự và bền lâu. Ace of Pentacles không phải tài lộc bất ngờ; đây là hạt giống đòi hỏi sự chăm sóc kiên nhẫn. Hãy nhặt lên và gieo có chủ đích. Tạo ngân sách, đăng ký khóa học, mở tài khoản tiết kiệm. Điều này có tiềm năng tăng trưởng dài hạn thực sự, nhưng chỉ nếu bạn đối xử với nó bằng sự nghiêm túc và chăm chút xứng đáng từ đầu."},
  {name:"Hai Tiền",suit:"Tiền",kw:["Cân Bằng","Linh Hoạt","Điều Phối"],meaning:"Bạn đang tung hứng nhiều đòi hỏi — công việc và cuộc sống cá nhân, hai cam kết tài chính, nhiều dự án tranh giành cùng thời gian có hạn. Two of Pentacles nói sự cân bằng này bền vững lúc này, nhưng chỉ nếu bạn giữ tính linh hoạt và tiếp tục ưu tiên chủ động. Khoảnh khắc bạn cố cho mọi thứ trọng lượng bằng nhau, gì đó sẽ rơi. Hãy quyết định điều gì quan trọng nhất tuần này, dành năng lượng tốt nhất cho nó, và để phần còn lại vừa đủ. Không phải mọi thứ đều cấp bách như nhau."},
  {name:"Ba Tiền",suit:"Tiền",kw:["Làm Việc Nhóm","Kỹ Năng","Cộng Tác"],meaning:"Dự án bạn đang làm đòi hỏi cộng tác — không phải loại hời hợt chia việc, mà là teamwork thực sự nơi kỹ năng khác nhau kết hợp tạo ra thứ không ai tự mình làm được. Three of Pentacles nói đóng góp của bạn được trân trọng, nhưng của mọi người khác cũng vậy. Hãy bỏ ego trước cửa, hỏi phản hồi, và nhận ra rằng công trình tốt nhất xảy ra khi kiến trúc sư, thợ xây, và người có tầm nhìn đều lắng nghe nhau."},
  {name:"Bốn Tiền",suit:"Tiền",kw:["Kiểm Soát","Bảo Thủ","Keo Kiệt"],meaning:"Bạn đang giữ chặt thứ gì đó quá mức — tiền, vị trí, mối quan hệ, routine, kiểm soát tình huống — vì buông ra cảm giác nguy hiểm. Four of Pentacles nói có sự khác biệt giữa an ninh lành mạnh và tích trữ vì sợ hãi. Hãy tự hỏi trung thực: tôi đang bảo vệ những gì đã xây, hay đang bóp nghẹt nó? Đôi khi thứ bạn nắm chặt nhất là thứ cần không gian để thở. Hãy nới lỏng trước khi nó ngộp."},
  {name:"Năm Tiền",suit:"Tiền",kw:["Nghèo Khó","Khó Khăn","Trừ Loại"],meaning:"Bạn đang trải qua giai đoạn khó khăn vật chất thực sự, lo ngại sức khỏe, hoặc bị loại trừ xã hội — và sự cô lập có lẽ cảm giác tệ hơn chính vấn đề. Five of Pentacles nói: sự giúp đỡ có sẵn, nhưng bạn không nhìn thấy vì xấu hổ hoặc kiêu hãnh khiến bạn nhìn xuống tuyết thay vì nhìn lên cửa sổ sáng. Hãy xin hỗ trợ. Nhận lấy lời đề nghị đã được đưa ra. Bạn không phải chịu đựng một mình, và từ chối giúp đỡ không phải sức mạnh — đó là bướng bỉnh."},
  {name:"Sáu Tiền",suit:"Tiền",kw:["Hào Phóng","Cho Nhận","Cân Bằng"],meaning:"Nguồn lực đang chảy — bạn hoặc đang ở vị trí cho hào phóng, hoặc ở vị trí cần nhận với phẩm giá. Six of Pentacles nói cả hai vai trò đều đáng trọng, nhưng cân bằng quyền lực quan trọng. Nếu bạn đang cho, kiểm tra xem sự hào phóng có ràng buộc không. Nếu đang nhận, hãy chấp nhận với phẩm giá và không xấu hổ. Những trao đổi lành mạnh nhất xảy ra khi cả hai bên cảm thấy được tôn trọng. Chú ý xem mối quan hệ cho và nhận này có cảm giác thực sự công bằng không."},
  {name:"Bảy Tiền",suit:"Tiền",kw:["Đánh Giá","Kiên Nhẫn","Đầu Tư"],meaning:"Bạn đã bỏ công sức nhất quán — trong công việc, mối quan hệ, mục tiêu cá nhân — và bây giờ đang dừng lại tự hỏi liệu tất cả nỗ lực có thực sự được đền đáp. Seven of Pentacles không phải cảnh báo; đây là kiểm tra. Hãy nhìn trung thực vào những gì bạn đã trồng. Đầu tư có sinh quả, hay bạn đang tưới đất chết? Nếu tăng trưởng là thật, hãy kiên nhẫn — thu hoạch cần thời gian. Nếu không, hãy chuyển hướng năng lượng trước khi mùa qua hẳn."},
  {name:"Tám Tiền",suit:"Tiền",kw:["Thành Thạo","Chuyên Cần","Cải Thiện Kỹ Năng"],meaning:"Đây là lá bài 'cúi đầu và làm việc'. Eight of Pentacles xuất hiện khi con đường đến mục tiêu rõ ràng và điều cần không phải thêm kế hoạch hay cảm hứng, mà là sự thực hành tận tâm, tập trung. Hãy xuất hiện mỗi ngày, lặp lại bài tập, tinh chỉnh chi tiết, và tin rằng thành thạo đến qua nỗ lực tích lũy. Đây không phải công việc hào nhoáng — nó là kỷ luật thầm lặng phân biệt người nói về mục tiêu với người thực sự đạt được chúng."},
  {name:"Chín Tiền",suit:"Tiền",kw:["Sung Túc","Tự Chủ","Thành Công"],meaning:"Bạn đã xây dựng điều thật — sự ổn định tài chính, môi trường sống đẹp, bộ kỹ năng cho bạn sự độc lập — và đã đến lúc tận hưởng mà không mặc cảm hay lo âu. Nine of Pentacles tôn vinh sự sung túc tự tạo và sự tự lập thanh tao. Bạn đạt được điều này qua kỷ luật và quyết định khôn ngoan, không phải may mắn. Hãy tận hưởng khu vườn bạn đã vun trồng. Mua ly cà phê ngon, nghỉ buổi chiều, trân trọng sự thoải mái bạn đã tạo ra. Bạn xứng đáng."},

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentLang = 'en';
let T = TRANSLATIONS.en;
const POSITIONS = ["Past","Present","Future"];
let drawnCards = [];
let flippedCount = 0;

let selectedModel = 'general';

function selectQuestionModel(model) {
  selectedModel = model;
  document.querySelectorAll('.q-model-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.model === model);
  });
}

// ─── LANGUAGE ─────────────────────────────────────────────────────────────────
function toggleLang() {
  currentLang = currentLang === 'en' ? 'vi' : 'en';
  T = TRANSLATIONS[currentLang];
  document.body.classList.toggle('lang-vi', currentLang === 'vi');
  applyLang();
}

function applyLang() {
  document.getElementById('langBtn').textContent = T.langBtn;
  document.querySelector('h1').textContent = T.title;
  document.querySelector('.subtitle').textContent = T.subtitle;
  document.querySelector('.q-label').textContent = T.qLabel;
  document.getElementById('qInput').placeholder = T.placeholder;
  document.querySelector('.spread-lbl').textContent = T.spreadLbl;
  document.getElementById('readingTitle').textContent = T.readingTitle;
  const sb = document.getElementById('shuffleBtn');
  if (sb.style.display !== 'none' && !sb.disabled) sb.textContent = T.shuffleTxt;
  const rb = document.getElementById('resetBtn');
  if (rb.style.display !== 'none') rb.textContent = T.resetTxt;
  document.querySelectorAll('.q-model-btn').forEach(btn => {
    const model = btn.dataset.model;
    if (typeof QUESTION_MODELS !== 'undefined' && QUESTION_MODELS[model]) {
      const data = QUESTION_MODELS[model];
      btn.textContent = `${data.icon} ${currentLang === 'vi' ? data.vi : data.en}`;
    }
  });
  const instr = document.getElementById('instr');
  if (instr.textContent) instr.textContent = T.instrInit;
  if (drawnCards.length === 0) {
    buildSlots();
  } else {
    T.positions.forEach((pos, i) => {
      const slot = document.getElementById(`slot${i}`);
      if (slot) slot.querySelector('.pos-label').textContent = pos;
    });
    drawnCards.forEach((card, i) => {
      const cw = document.getElementById(`cw${i}`);
      if (cw && cw.classList.contains('flipped')) {
        renderCardFront(document.getElementById(`cf${i}`), card);
      }
    });
    if (document.getElementById('readingPanel').classList.contains('visible')) {
      showReading();
      generateConclusion();
    }
  }
}

function renderCardFront(cf, card) {
  const d = currentLang === 'vi' ? DECK_VI[card.id] : card;
  const suitDisplay = card.arcana === 'major' ? card.num : (currentLang === 'vi' ? card.suit : d.suit);
  cf.style.background = `linear-gradient(155deg,${card.col[0]} 0%,${card.col[1]} 60%,${card.col[0]} 100%)`;
  const reversedBadge = card.isReversed ? `<div class="reversed-badge">↓ R</div>` : '';
  cf.innerHTML = `
    ${reversedBadge}
    <div class="cf-inner">
      <div class="cf-orn">✦ · ✦</div>
      <div class="cf-num">${suitDisplay}</div>
      <div class="cf-sym">${card.sym}</div>
      <div class="cf-name">${card.name}</div>
      <div class="cf-kw">${d.kw.join(' · ')}</div>
      <div class="cf-orn">✦ · ✦</div>
    </div>`;
  // Apply reversed class to the card-wrap
  const cfId = cf.id; // e.g. "cf0", "cf1", "cf2"
  if (cfId) {
    const idx = cfId.replace('cf', '');
    const cardWrap = document.getElementById(`cw${idx}`);
    if (cardWrap) {
      cardWrap.classList.toggle('reversed', !!card.isReversed);
    }
  }
}

  row.innerHTML = T.positions.map((pos, i) => `
    <div class="card-slot" id="slot${i}">
      <div class="pos-label">${pos}</div>

          <div class="card-face card-back">
            <div class="back-design"><span class="back-sym">𓂀</span></div>
          </div>
          <div class="card-face card-front" id="cf${i}"></div>
        </div>
      </div>
      <div class="placeholder" id="ph${i}"><span class="ph-sym">✦</span></div>
    </div>
  `).join('');
}

// ─── SHUFFLE & DEAL ───────────────────────────────────────────────────────────
function shuffleAndDeal() {
  const btn = document.getElementById('shuffleBtn');
  btn.disabled = true;
  btn.textContent = T.shufflingTxt;
  flippedCount = 0;
  document.getElementById('readingPanel').classList.remove('visible');
  document.getElementById('resetBtn').style.display = 'none';

  // Fisher-Yates shuffle
  const deck = [...DECK];
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  drawnCards = deck.slice(0, 3);
  drawnCards = drawnCards.map(card => ({
    ...card,
    isReversed: Math.random() < 0.5,
  }));

  // Populate fronts
  drawnCards.forEach((card, i) => {
    renderCardFront(document.getElementById(`cf${i}`), card);
  });

  // Reveal cards with stagger
  setTimeout(() => {
    POSITIONS.forEach((_, i) => {
      setTimeout(() => {
        const ph = document.getElementById(`ph${i}`);
        const cw = document.getElementById(`cw${i}`);
        ph.style.display = 'none';
        cw.classList.remove('flipped');
        cw.style.cssText = 'display:block;opacity:0;transform:translateY(20px);transition:opacity .5s ease,transform .5s ease';
        requestAnimationFrame(() => requestAnimationFrame(() => {
          cw.style.opacity = '1';
          cw.style.transform = 'translateY(0)';
        }));
      }, i * 220);
    });
    setTimeout(() => {
      btn.style.display = 'none';
      document.getElementById('resetBtn').style.display = 'inline-block';
      document.getElementById('instr').textContent = T.instrClick;
    }, 900);
  }, 500);
}

// ─── FLIP ─────────────────────────────────────────────────────────────────────
function flipCard(idx) {
  const cw = document.getElementById(`cw${idx}`);
  if (cw.classList.contains('flipped')) return;
  cw.classList.add('flipped');
  spawnSparkles(cw);
  flippedCount++;
  const instr = document.getElementById('instr');
  if (flippedCount === 1) instr.textContent = T.instrReveal1;
  else if (flippedCount === 2) instr.textContent = T.instrReveal2;
  else { instr.textContent = ''; setTimeout(showReading, 750); }
}

function spawnSparkles(el) {
  const glyphs = ['✦','✧','⭐','·','✨'];
  el.style.position = 'relative';
  for (let i = 0; i < 9; i++) {
    const sp = document.createElement('span');
    sp.className = 'sparkle';
    sp.textContent = glyphs[Math.floor(Math.random() * glyphs.length)];
    sp.style.cssText = `color:${Math.random()>.5?'#c9a84c':'#f0d080'};font-size:${.7+Math.random()*.6}rem;left:${Math.random()*155}px;top:${Math.random()*272}px;animation-delay:${(Math.random()*.35).toFixed(2)}s;`;
    el.appendChild(sp);
    setTimeout(() => sp.remove(), 1300);
  }
}

// ─── SYNTHESIS HELPERS ────────────────────────────────────────────────────────

function extractBrief(text) {
  if (!text) return '';
  const dot = text.indexOf('.');
  return dot > 0 ? text.substring(0, dot + 1) : text;
}

function getCardElement(card) {
  if (card.arcana === 'major') return 'spirit';
  return SUIT_ELEMENT[card.suit] || 'spirit';
}

function analyzeElements(cards) {
  const counts = { fire: 0, water: 0, air: 0, earth: 0, spirit: 0 };
  let majorCount = 0;
  cards.forEach(card => {
    const el = getCardElement(card);
    counts[el]++;
    if (card.arcana === 'major') majorCount++;
  });
  const dominant = Object.entries(counts).filter(([k, v]) => v >= 2).map(([k]) => k);
  const missing = ['fire', 'water', 'air', 'earth'].filter(e => counts[e] === 0);
  return { counts, dominant, missing, majorCount };
}

function analyzeElementFlow(cards) {
  const elements = cards.map(c => getCardElement(c));
  const conflicts = [];
  if (typeof ELEMENT_CONFLICT_PAIRS !== 'undefined') {
    for (let i = 0; i < elements.length - 1; i++) {
      if (ELEMENT_CONFLICT_PAIRS[elements[i]] === elements[i + 1]) {
        conflicts.push([i, i + 1]);
      }
    }
  }
  // Look up 3-element arc narrative
  const arcKey = elements.join(',');
  let arcNarrative = null;
  if (typeof ELEMENT_FLOW_ANALYSIS !== 'undefined' && ELEMENT_FLOW_ANALYSIS.arcs && ELEMENT_FLOW_ANALYSIS.arcs[arcKey]) {
    arcNarrative = ELEMENT_FLOW_ANALYSIS.arcs[arcKey];
  }
  // Look up conflict narratives
  const conflictNarratives = [];
  if (typeof ELEMENT_FLOW_ANALYSIS !== 'undefined' && ELEMENT_FLOW_ANALYSIS.conflicts) {
    for (const [i, j] of conflicts) {
      const ck = `${elements[i]},${elements[j]}`;
      if (ELEMENT_FLOW_ANALYSIS.conflicts[ck]) {
        conflictNarratives.push(ELEMENT_FLOW_ANALYSIS.conflicts[ck]);
      }
    }
  }
  return { elements, conflicts, arcNarrative, conflictNarratives };
}

function findInteraction(cardA, cardB) {
  for (const pattern of CARD_INTERACTIONS) {
    if (pattern.condition(cardA, cardB)) {
      // Some patterns use getText(a,b) for dynamic text instead of static en/vi
      if (pattern.getText) {
        const text = pattern.getText(cardA, cardB);
        return { en: text.en, vi: text.vi };
      }
      return pattern;
    }
  }
  // Fallback: element transition
  const elA = getCardElement(cardA);
  const elB = getCardElement(cardB);
  if (elA !== elB) {
    const key = `${elA}→${elB}`;
    if (ELEMENT_TRANSITIONS[key]) return ELEMENT_TRANSITIONS[key];
  }
  return null;
}

function determineEnergy(cards, analysis) {
  const names = cards.map(c => c.name);
  const transformCards = ['Death', 'The Tower', 'Wheel of Fortune'];
  const healCards = ['The Star', 'Temperance'];
  const reversedCount = cards.filter(c => c.isReversed).length;

  if (names.some(n => transformCards.includes(n))) return 'transformative';
  if (names.some(n => healCards.includes(n)) || analysis.dominant.includes('water')) return 'healing';
  if (reversedCount >= 2 || analysis.dominant.includes('air')) return 'challenging';
  if (analysis.majorCount >= 2) return 'intense';
  return 'harmonious';
}

function determineConfidence(cards, analysis) {
  const futureReversed = cards[2] && cards[2].isReversed;
  const allReversed = cards.every(c => c.isReversed);
  const reversedCount = cards.filter(c => c.isReversed).length;
  const hasReasons = typeof CONFIDENCE_REASONS !== 'undefined';
  const lk = currentLang === 'vi' ? 'vi' : 'en';
  const reasons = [];

  if (allReversed) {
    if (hasReasons) reasons.push(CONFIDENCE_REASONS.all_reversed[lk]);
    return { key: 'low', reasons };
  }
  if (analysis.dominant.length === 0) {
    if (hasReasons) reasons.push(CONFIDENCE_REASONS.no_dominant[lk]);
    if (futureReversed && hasReasons) reasons.push(CONFIDENCE_REASONS.future_reversed[lk]);
    return { key: 'low', reasons };
  }

  // Check for high
  if (analysis.dominant.length >= 1 && !futureReversed) {
    if (reversedCount === 0 && hasReasons) reasons.push(CONFIDENCE_REASONS.aligned_upright[lk]);
    if (analysis.dominant.length >= 1 && hasReasons) reasons.push(CONFIDENCE_REASONS.dominant_clear[lk]);
    if (!futureReversed && hasReasons) reasons.push(CONFIDENCE_REASONS.future_upright[lk]);
    return { key: 'high', reasons };
  }

  // Moderate
  if (reversedCount >= 1 && hasReasons) reasons.push(CONFIDENCE_REASONS.mixed_reversals[lk]);
  if (futureReversed && hasReasons) reasons.push(CONFIDENCE_REASONS.future_reversed[lk]);
  const uniqueElements = new Set(cards.map(c => getCardElement(c)));
  if (uniqueElements.size >= 3 && hasReasons) reasons.push(CONFIDENCE_REASONS.scattered_elements[lk]);
  return { key: 'moderate', reasons };
}

function determineReadingTone(cards, analysis, energyKey) {
  const reversedCount = cards.filter(c => c.isReversed).length;
  const names = cards.map(c => c.name);
  const transformCards = ['Death', 'The Tower', 'Wheel of Fortune', 'Judgement'];
  const contemplativeCards = ['The Hermit', 'The High Priestess', 'The Hanged Man', 'The Moon'];

  // Transformative: transformation cards present
  if (names.some(n => transformCards.includes(n))) return 'transformative';
  // Cautionary: 2+ reversals or challenging energy
  if (reversedCount >= 2 || energyKey === 'challenging') return 'cautionary';
  // Contemplative: introspective cards or water-dominant
  if (names.some(n => contemplativeCards.includes(n)) || (analysis.dominant.length === 1 && analysis.dominant[0] === 'water')) return 'contemplative';
  // Optimistic: default positive
  return 'optimistic';
}

function generateActionSteps(cards, model, isVi) {
  const steps = [];
  const lk = isVi ? 'vi' : 'en';
  const [pastCard, presentCard, futureCard] = cards;
  const hasTemplates = typeof CARD_ACTION_TEMPLATES !== 'undefined';

  // Step 1: Past lesson
  if (hasTemplates && CARD_ACTION_TEMPLATES[pastCard.id]) {
    steps.push(`<strong>${pastCard.name}:</strong> ${CARD_ACTION_TEMPLATES[pastCard.id].past_lesson[lk]}`);
  } else {
    const d = isVi ? DECK_VI[pastCard.id] : pastCard;
    steps.push(isVi
      ? `<strong>${pastCard.name}:</strong> Suy ngẫm về bài học từ năng lượng ${d.kw.join(', ')} — điều này đã định hình bạn.`
      : `<strong>${pastCard.name}:</strong> Reflect on the lesson from the energy of ${d.kw.join(', ')} — this shaped who you are.`);
  }

  // Step 2: Present action
  if (hasTemplates && CARD_ACTION_TEMPLATES[presentCard.id]) {
    steps.push(`<strong>${presentCard.name}:</strong> ${CARD_ACTION_TEMPLATES[presentCard.id].present_action[lk]}`);
  } else {
    const d = isVi ? DECK_VI[presentCard.id] : presentCard;
    steps.push(isVi
      ? `<strong>${presentCard.name}:</strong> Hành động ngay với năng lượng ${d.kw.join(', ')} — đây là thời điểm then chốt.`
      : `<strong>${presentCard.name}:</strong> Act now with the energy of ${d.kw.join(', ')} — this is the pivotal moment.`);
  }

  // Step 3: Future preparation
  if (hasTemplates && CARD_ACTION_TEMPLATES[futureCard.id]) {
    steps.push(`<strong>${futureCard.name}:</strong> ${CARD_ACTION_TEMPLATES[futureCard.id].future_prep[lk]}`);
  } else {
    const d = isVi ? DECK_VI[futureCard.id] : futureCard;
    steps.push(isVi
      ? `<strong>${futureCard.name}:</strong> Chuẩn bị đón nhận ${d.kw.join(', ')} — tương lai đang hình thành.`
      : `<strong>${futureCard.name}:</strong> Prepare to embrace ${d.kw.join(', ')} — the future is taking shape.`);
  }

  // Step 4: Question-model-specific advice
  const modelSteps = {
    general: { en: 'Revisit this reading in a week — notice which steps you took and how events unfolded.', vi: 'Xem lại bài đọc sau một tuần — nhận ra bước nào bạn đã thực hiện và sự kiện đã diễn biến ra sao.' },
    problem: { en: 'Name the root cause of the problem specifically and take one concrete action to address it today.', vi: 'Gọi tên nguyên nhân gốc rễ của vấn đề cụ thể và thực hiện một hành động cụ thể để giải quyết hôm nay.' },
    solution: { en: 'Commit to the first step within 24 hours — momentum matters more than perfection right now.', vi: 'Cam kết thực hiện bước đầu tiên trong vòng 24 giờ — động lực quan trọng hơn sự hoàn hảo lúc này.' },
    crossroads: { en: 'Write down both options and their full consequences, then commit to one by tomorrow morning.', vi: 'Viết ra cả hai lựa chọn và hệ quả đầy đủ, rồi cam kết một lựa chọn trước sáng mai.' }
  };
  steps.push(modelSteps[model] ? (isVi ? modelSteps[model].vi : modelSteps[model].en) : (isVi ? 'Tin vào trực giác của bạn.' : 'Trust your intuition.'));
  return steps;
}

function generateStory(cards, isVi) {
  if (typeof NARRATIVE_TEMPLATES === 'undefined') return '';
  const lk = isVi ? 'vi' : 'en';
  const NT = NARRATIVE_TEMPLATES;
  const posNames = ['past', 'present', 'future'];
  const ELEMENT_NAMES_LOCAL = { fire: isVi ? 'Lửa' : 'Fire', water: isVi ? 'Nước' : 'Water', air: isVi ? 'Gió' : 'Air', earth: isVi ? 'Đất' : 'Earth', spirit: isVi ? 'Tinh Thần' : 'Spirit' };
  const elements = cards.map(c => getCardElement(c));
  const parts = [];

  function getCardType(card) {
    if (card.arcana === 'major') return card.isReversed ? 'major_reversed' : 'major';
    if (['King','Queen','Knight','Page'].includes(card.num)) return card.isReversed ? 'court_reversed' : 'court';
    return card.isReversed ? 'minor_reversed' : 'minor';
  }

  function fillTemplate(tpl, card, isVi) {
    if (!tpl) return '';
    const d = isVi ? DECK_VI[card.id] : card;
    let text = tpl[lk] || '';
    text = text.replace(/\{name\}/g, card.name);
    text = text.replace(/\{kw\}/g, d.kw.slice(0, 2).join(', '));
    // Reversed brief
    if (text.includes('{rev}')) {
      let rev = '';
      if (typeof REVERSED_MEANINGS !== 'undefined' && REVERSED_MEANINGS[card.id]) {
        rev = extractBrief(REVERSED_MEANINGS[card.id][lk]);
      }
      text = text.replace(/\{rev\}/g, rev || (isVi ? 'năng lượng bị chặn' : 'blocked energy'));
    }
    return text;
  }

  // Past sentence
  const pastType = getCardType(cards[0]);
  if (NT.past && NT.past[pastType]) {
    parts.push(fillTemplate(NT.past[pastType], cards[0], isVi));
  }

  // Transition 1: past → present
  if (NT.transition_1) {
    if (elements[0] === elements[1] && NT.transition_1.same_element) {
      let t = NT.transition_1.same_element[lk] || '';
      t = t.replace(/\{element\}/g, ELEMENT_NAMES_LOCAL[elements[0]] || elements[0]);
      parts.push(t);
    } else if (typeof ELEMENT_CONFLICT_PAIRS !== 'undefined' && ELEMENT_CONFLICT_PAIRS[elements[0]] === elements[1] && NT.transition_1.conflict) {
      let t = NT.transition_1.conflict[lk] || '';
      t = t.replace(/\{el1\}/g, ELEMENT_NAMES_LOCAL[elements[0]] || elements[0]);
      t = t.replace(/\{el2\}/g, ELEMENT_NAMES_LOCAL[elements[1]] || elements[1]);
      // Add conflict text
      let ct = '';
      if (typeof ELEMENT_FLOW_ANALYSIS !== 'undefined' && ELEMENT_FLOW_ANALYSIS.conflicts) {
        const ck = `${elements[0]},${elements[1]}`;
        if (ELEMENT_FLOW_ANALYSIS.conflicts[ck]) ct = extractBrief(ELEMENT_FLOW_ANALYSIS.conflicts[ck][lk]);
      }
      t = t.replace(/\{conflict_text\}/g, ct);
      parts.push(t);
    } else if (NT.transition_1.shift) {
      let t = NT.transition_1.shift[lk] || '';
      t = t.replace(/\{el1\}/g, ELEMENT_NAMES_LOCAL[elements[0]] || elements[0]);
      t = t.replace(/\{el2\}/g, ELEMENT_NAMES_LOCAL[elements[1]] || elements[1]);
      parts.push(t);
    }
  }

  // Present sentence
  const presentType = getCardType(cards[1]);
  if (NT.present && NT.present[presentType]) {
    parts.push(fillTemplate(NT.present[presentType], cards[1], isVi));
  }

  // Transition 2: present → future
  if (NT.transition_2) {
    if (elements[1] === elements[2] && NT.transition_2.same_element) {
      let t = NT.transition_2.same_element[lk] || '';
      t = t.replace(/\{element\}/g, ELEMENT_NAMES_LOCAL[elements[1]] || elements[1]);
      parts.push(t);
    } else if (typeof ELEMENT_CONFLICT_PAIRS !== 'undefined' && ELEMENT_CONFLICT_PAIRS[elements[1]] === elements[2] && NT.transition_2.conflict) {
      let t = NT.transition_2.conflict[lk] || '';
      t = t.replace(/\{el1\}/g, ELEMENT_NAMES_LOCAL[elements[1]] || elements[1]);
      t = t.replace(/\{el2\}/g, ELEMENT_NAMES_LOCAL[elements[2]] || elements[2]);
      let ct = '';
      if (typeof ELEMENT_FLOW_ANALYSIS !== 'undefined' && ELEMENT_FLOW_ANALYSIS.conflicts) {
        const ck = `${elements[1]},${elements[2]}`;
        if (ELEMENT_FLOW_ANALYSIS.conflicts[ck]) ct = extractBrief(ELEMENT_FLOW_ANALYSIS.conflicts[ck][lk]);
      }
      t = t.replace(/\{conflict_text\}/g, ct);
      parts.push(t);
    } else if (NT.transition_2.shift) {
      let t = NT.transition_2.shift[lk] || '';
      t = t.replace(/\{el1\}/g, ELEMENT_NAMES_LOCAL[elements[1]] || elements[1]);
      t = t.replace(/\{el2\}/g, ELEMENT_NAMES_LOCAL[elements[2]] || elements[2]);
      parts.push(t);
    }
  }

  // Future sentence
  const futureType = getCardType(cards[2]);
  if (NT.future && NT.future[futureType]) {
    parts.push(fillTemplate(NT.future[futureType], cards[2], isVi));
  }

  return parts.filter(p => p).map(p => `<p>${p}</p>`).join('');
}

// ─── SHOW READING ─────────────────────────────────────────────────────────────
function showReading() {
  const panel = document.getElementById('readingPanel');
  const isVi = currentLang === 'vi';
  const posKeys = ['past', 'present', 'future'];

  document.getElementById('cardReadings').innerHTML = drawnCards.map((card, i) => {
    const d = isVi ? DECK_VI[card.id] : card;
    const posKey = posKeys[i];
    let posInterp = '';

    // Position-specific interpretation
    if (card.arcana === 'major' && typeof MAJOR_POSITION_INTERP !== 'undefined' && MAJOR_POSITION_INTERP[card.id]) {
      const mpi = MAJOR_POSITION_INTERP[card.id][posKey];
      if (mpi) posInterp = isVi ? mpi.vi : mpi.en;
    } else if (typeof MINOR_POSITION_INTERP !== 'undefined' && MINOR_POSITION_INTERP[card.id]) {
      const mpi = MINOR_POSITION_INTERP[card.id][posKey];
      if (mpi) posInterp = isVi ? mpi.vi : mpi.en;
    } else if (typeof POSITION_FRAMES !== 'undefined' && POSITION_FRAMES[posKey]) {
      const frame = POSITION_FRAMES[posKey];
      const prefix = isVi ? frame.prefix_vi : frame.prefix_en;
      posInterp = `${prefix} ${d.meaning}`;
    }

    // Reversed meaning
    let reversedHtml = '';
    if (card.isReversed && typeof REVERSED_MEANINGS !== 'undefined' && REVERSED_MEANINGS[card.id]) {
      const rev = REVERSED_MEANINGS[card.id];
      const revText = isVi ? rev.vi : rev.en;
      const revLabel = isVi ? '↓ Ngược' : '↓ Reversed';
      reversedHtml = `
        <div class="r-reversed-meaning">
          <span class="r-reversed-tag">${revLabel}</span> ${revText}
        </div>`;
    }

    return `
    <div class="card-reading" style="animation-delay:${i * .18}s">
      <div class="r-pos">${T.positions[i]}</div>
      <div class="r-sym">${card.sym}</div>
      <div class="r-name">${card.name}${card.isReversed ? ' <span class="r-reversed-tag">↓ R</span>' : ''}</div>
      <div class="r-kw">${d.kw.join(' · ')}</div>
      <div class="r-meaning">${d.meaning}</div>
      ${posInterp ? `<div class="r-position-interp">${posInterp}</div>` : ''}
      ${reversedHtml}
      ${(() => {
        if (typeof REFLECTION_QUESTIONS === 'undefined' || !REFLECTION_QUESTIONS[card.id]) return '';
        const qs = REFLECTION_QUESTIONS[card.id][isVi ? 'vi' : 'en'];
        if (!qs || qs.length === 0) return '';
        const refLabel = isVi ? '❓ Suy Ngẫm' : '❓ Reflect';
        return `<div class="r-reflection">
          <div class="r-reflection-label">${refLabel}</div>
          ${qs.map(q => `<div class="r-reflection-q">• ${q}</div>`).join('')}
        </div>`;
      })()}
    </div>`;
  }).join('');
  panel.classList.add('visible');

  generateConclusion();

  setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'start' }), 250);
}

function generateConclusion() {
  const area = document.getElementById('conclusionArea');
  const box = document.getElementById('conclusionBox');
  const isVi = currentLang === 'vi';
  const lk = isVi ? 'vi' : 'en';

  // ── Analysis ──
  const elAnalysis = analyzeElements(drawnCards);
  const flow = analyzeElementFlow(drawnCards);
  const energyKey = determineEnergy(drawnCards, elAnalysis);
  const confResult = determineConfidence(drawnCards, elAnalysis);
  const confKey = confResult.key;
  const confReasons = confResult.reasons || [];
  const energy = ENERGY_TYPES[energyKey];
  const conf = CONFIDENCE_LEVELS[confKey];
  const toneKey = (typeof READING_TONES !== 'undefined') ? determineReadingTone(drawnCards, elAnalysis, energyKey) : null;
  const tone = toneKey && READING_TONES[toneKey] ? READING_TONES[toneKey] : null;

  // ── Opening (question-model aware) ──
  const opening = (typeof QUESTION_MODEL_OPENINGS !== 'undefined' && QUESTION_MODEL_OPENINGS[selectedModel])
    ? QUESTION_MODEL_OPENINGS[selectedModel][lk]
    : (isVi ? 'Các lá bài đã lên tiếng.' : 'The cards have spoken.');

  // ── The Story (narrative arc) ──
  const storyHtml = generateStory(drawnCards, isVi);

  // ── Thread: card interactions (with integrated reversed context) ──
  let threadParts = [];
  const pairs = [[0,1],[1,2],[0,2]];
  for (const [a, b] of pairs) {
    const interaction = findInteraction(drawnCards[a], drawnCards[b]);
    if (interaction && interaction[lk] && !threadParts.includes(interaction[lk])) {
      let text = interaction[lk];
      // Integrate reversed context inline
      const reversedNotes = [];
      for (const idx of [a, b]) {
        if (drawnCards[idx].isReversed && typeof REVERSED_MEANINGS !== 'undefined' && REVERSED_MEANINGS[drawnCards[idx].id]) {
          const revBrief = extractBrief(REVERSED_MEANINGS[drawnCards[idx].id][lk]);
          if (revBrief) {
            reversedNotes.push(isVi
              ? `${drawnCards[idx].name} ngược: ${revBrief}`
              : `${drawnCards[idx].name} reversed: ${revBrief}`);
          }
        }
      }
      if (reversedNotes.length > 0) {
        text += ' <em>(' + reversedNotes.join(' | ') + ')</em>';
      }
      threadParts.push(text);
    }
  }
  const threadHtml = threadParts.length > 0
    ? threadParts.map(t => `<p>${t}</p>`).join('')
    : `<p>${isVi ? 'Các lá bài mang năng lượng riêng biệt, tạo nên một bức tranh đa chiều cho hành trình của bạn.' : 'The cards carry distinct energies, creating a multifaceted picture for your journey.'}</p>`;

  // ── Elements (with flow analysis) ──
  let elemParts = [];
  // Arcana ratio
  if (typeof ARCANA_RATIO_TEXT !== 'undefined' && ARCANA_RATIO_TEXT[elAnalysis.majorCount]) {
    elemParts.push(ARCANA_RATIO_TEXT[elAnalysis.majorCount][lk]);
  }
  // Dominant elements
  for (const el of elAnalysis.dominant) {
    if (typeof ELEMENT_DOMINANT !== 'undefined' && ELEMENT_DOMINANT[el]) {
      elemParts.push(ELEMENT_DOMINANT[el][lk]);
    }
  }
  // Missing elements
  for (const el of elAnalysis.missing) {
    if (typeof ELEMENT_MISSING !== 'undefined' && ELEMENT_MISSING[el]) {
      elemParts.push(ELEMENT_MISSING[el][lk]);
    }
  }
  // Element flow arc
  if (flow.arcNarrative) {
    elemParts.push(flow.arcNarrative[lk]);
  }
  // Element conflicts
  for (const cn of flow.conflictNarratives) {
    if (cn[lk] && !elemParts.includes(cn[lk])) {
      elemParts.push(cn[lk]);
    }
  }
  const elemHtml = elemParts.length > 0
    ? elemParts.map(e => `<p>${e}</p>`).join('')
    : `<p>${isVi ? 'Sự cân bằng nguyên tố trong trải bài này khá đồng đều.' : 'The elemental balance in this spread is relatively even.'}</p>`;

  // ── Action Steps ──
  const steps = generateActionSteps(drawnCards, selectedModel, isVi);
  const stepsHtml = `<ol>${steps.map(s => `<li>${s}</li>`).join('')}</ol>`;

  // ── Section labels ──
  const labels = {
    title: isVi ? '☽ Tổng Hợp Bài Đọc ☽' : '☽ Reading Synthesis ☽',
    story: isVi ? 'Câu Chuyện' : 'The Story',
    thread: isVi ? 'Sợi Chỉ Đỏ' : 'The Thread',
    elements: isVi ? 'Phân Tích Nguyên Tố' : 'Element Analysis',
    path: isVi ? 'Con Đường Phía Trước' : 'Path Forward',
    energyLabel: isVi ? 'Năng Lượng' : 'Energy',
    confLabel: isVi ? 'Độ Tin Cậy' : 'Confidence',
    toneLabel: isVi ? 'Giọng Đọc' : 'Reading Tone'
  };

  box.innerHTML = `
    <div class="conclusion-title">${labels.title}</div>
    <div class="synth-section">
      <div class="synth-opening">${opening}</div>
    </div>
    ${storyHtml ? `<div class="synth-section">
      <div class="synth-section-title">${labels.story}</div>
      <div class="synth-story">${storyHtml}</div>
    </div>` : ''}
    <div class="synth-section">
      <div class="synth-section-title">${labels.thread}</div>
      <div class="synth-thread">${threadHtml}</div>
    </div>
    <div class="synth-section">
      <div class="synth-section-title">${labels.elements}</div>
      <div class="synth-elements">${elemHtml}</div>
    </div>
    <div class="synth-section">
      <div class="synth-section-title">${labels.path}</div>
      <div class="synth-path">${stepsHtml}</div>
    </div>
    <div class="synth-badges-expanded">
      <div class="synth-badge-card">
        <div class="badge-header"><span class="badge-icon">${energy.icon}</span> ${labels.energyLabel}: ${energy[lk]}</div>
        ${energy.desc ? `<div class="badge-desc">${energy.desc[lk]}</div>` : ''}
      </div>
      <div class="synth-badge-card">
        <div class="badge-header">${labels.confLabel}: ${conf[lk]}</div>
        ${conf.reasons ? `<div class="badge-desc">${conf.reasons[lk]}</div>` : ''}
        ${confReasons.length > 0 ? `<ul class="badge-reasons">${confReasons.map(r => `<li>${r}</li>`).join('')}</ul>` : ''}
      </div>
      ${tone ? `<div class="synth-badge-card">
        <div class="badge-header"><span class="badge-icon">${tone.icon}</span> ${labels.toneLabel}: ${tone[lk]}</div>
        ${tone.desc ? `<div class="badge-desc">${tone.desc[lk]}</div>` : ''}
      </div>` : ''}
    </div>
  `;
  area.style.display = 'block';
}

// ─── RESET ────────────────────────────────────────────────────────────────────
function resetReading() {
  POSITIONS.forEach((_, i) => {
    const cw = document.getElementById(`cw${i}`);
    cw.classList.remove('flipped');
    cw.style.cssText = 'display:none';
    const ph = document.getElementById(`ph${i}`);
    ph.style.display = 'flex';
  });
  document.getElementById('readingPanel').classList.remove('visible');
  document.getElementById('conclusionArea').style.display = 'none';
  const sb = document.getElementById('shuffleBtn');
  sb.style.display = 'inline-block';
  sb.disabled = false;
  sb.textContent = T.shuffleTxt;
  document.getElementById('resetBtn').style.display = 'none';
  document.getElementById('instr').textContent = T.instrInit;
  flippedCount = 0;
  drawnCards = [];
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─── CUSTOM CURSOR ─────────────────────────────────────────────────────────
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursor-ring');
let mx = 0, my = 0, rx = 0, ry = 0;
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; cursor.style.left = mx+'px'; cursor.style.top = my+'px'; });
(function movRing(){ rx += (mx-rx)*.15; ry += (my-ry)*.15; ring.style.left = rx+'px'; ring.style.top = ry+'px'; requestAnimationFrame(movRing); })();

// ─── CANVAS STARFIELD ──────────────────────────────────────────────────────
(function(){
  const c = document.getElementById('cosmos'), ctx = c.getContext('2d');
  let W, H, stars = [], constellations = [];
  function resize(){ W = c.width = innerWidth; H = c.height = innerHeight; }
  resize(); window.addEventListener('resize', resize);
  for(let i=0;i<280;i++) stars.push({x:Math.random()*2000-500,y:Math.random()*2000-500,r:Math.random()*1.2+.3,a:Math.random()*6.28,s:Math.random()*.0006+.0002});
  for(let i=0;i<12;i++){const pts=[];for(let j=0;j<Math.floor(Math.random()*4+3);j++) pts.push(Math.floor(Math.random()*stars.length));constellations.push(pts);}
  function draw(){
    ctx.clearRect(0,0,W,H);
    const t=performance.now();
    stars.forEach(s=>{
      const flicker=.5+.5*Math.sin(s.a+t*s.s);
      ctx.beginPath();ctx.arc(((s.x%W)+W)%W,((s.y%H)+H)%H,s.r,0,6.28);
      ctx.fillStyle=`rgba(232,213,163,${(.15+flicker*.55).toFixed(2)})`;ctx.fill();
    });
    ctx.strokeStyle='rgba(201,168,76,.04)';ctx.lineWidth=.5;
    constellations.forEach(pts=>{ctx.beginPath();pts.forEach((pi,j)=>{const s=stars[pi];const x=((s.x%W)+W)%W,y=((s.y%H)+H)%H;j===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});ctx.stroke();});
    requestAnimationFrame(draw);
  }
  draw();
})();
