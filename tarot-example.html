<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ The Mystic Tarot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Roboto:wght@300;400;500;700&family=Uncial+Antiqua&display=swap" rel="stylesheet">
<style>
:root {
  --void: #050403;
  --deep: #0c0906;
  --surface: #14100a;
  --panel: #1a1410;
  --border: #302418;
  --gold: #c9a84c;
  --gold-bright: #f0c96a;
  --gold-light: #f0d080;
  --gold-dim: #7a6030;
  --ember: #d4622a;
  --ember-dim: rgba(212,98,42,.25);
  --teal: #1e8a8a;
  --teal-bright: #3dbfbf;
  --teal-dim: rgba(61,191,191,.2);
  --parchment: #e8d5a3;
  --parchment-2: #c4aa76;
  --muted: #7a6a4a;
  --text: #ddd0a8;
  --text-dim: #a89070;
  --glow-gold: rgba(201,168,76,.35);
  --glow-teal: rgba(61,191,191,.25);
  --glow-ember: rgba(212,98,42,.3);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--void);
  color: var(--text);
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 17px;
  line-height: 1.75;
  min-height: 100vh;
  overflow-x: hidden;
  cursor: none;
}
/* Grain overlay */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: .4;
  pointer-events: none;
  z-index: 9999;
}
/* Custom cursor */
#cursor {
  position:fixed; width:10px; height:10px;
  background:var(--gold-bright); border-radius:50%;
  pointer-events:none; z-index:10001;
  transform:translate(-50%,-50%);
  box-shadow:0 0 8px 3px var(--glow-gold), 0 0 18px 6px rgba(201,168,76,.12);
  transition:width .15s, height .15s;
}
#cursor-ring {
  position:fixed; width:32px; height:32px;
  border:1px solid rgba(201,168,76,.45);
  border-radius:50%; pointer-events:none; z-index:10000;
  transform:translate(-50%,-50%);
  transition:transform .08s linear, width .2s, height .2s;
}
/* Canvas starfield */
#cosmos { position:fixed; inset:0; z-index:0; pointer-events:none; }
/* Scrollbar */
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:var(--void); }
::-webkit-scrollbar-thumb { background:var(--gold-dim); border-radius:3px; }
.wrap {
  position: relative; z-index: 1;
  max-width: 1100px; margin: 0 auto;
  padding: 7rem 1.5rem 3rem;
  display: flex; flex-direction: column; align-items: center;
}
header { text-align: center; margin-bottom: 1.5rem; }
.ornament { color: var(--gold); font-size: 1.1rem; letter-spacing: .5rem; margin-bottom: .4rem; }
h1 {
  font-family: 'Cinzel Decorative', 'Playfair Display', serif;
  font-size: clamp(1.8rem,5vw,3.2rem);
  color: var(--gold);
  text-shadow: 0 0 20px rgba(201,168,76,.5), 0 0 50px rgba(201,168,76,.2);
  letter-spacing: .08em; line-height: 1.2;
}
.subtitle {
  font-family: 'Cinzel', 'Playfair Display', serif; font-size: .75rem;
  color: var(--text-dim); letter-spacing: .4em;
  text-transform: uppercase; margin-top: .7rem;
}
.moons { text-align:center; font-size:1.1rem; opacity:.5; margin:.5rem 0; letter-spacing:.2rem; }
.divider {
  display:flex; align-items:center; gap:1rem;
  margin:1.2rem 0; width:100%; max-width:600px;
}
.divider-line { flex:1; height:1px; background:linear-gradient(to right,transparent,var(--gold),transparent); }
.divider-sym { color:var(--gold); font-size:.9rem; }
.q-area { text-align:center; margin-bottom:2rem; }
.q-label {
  font-family:'Cinzel','Playfair Display',serif; font-size:.7rem;
  letter-spacing:.3em; color:var(--text-dim);
  text-transform:uppercase; margin-bottom:.5rem;
}
.q-input {
  background:rgba(255,255,255,.04);
  border:1px solid rgba(201,168,76,.3);
  border-radius:4px; color:var(--text);
  font-family:'EB Garamond', Georgia, serif; font-size:1.05rem;
  padding:.6rem 1.2rem; width:min(420px,90vw);
  text-align:center; outline:none; transition:border-color .3s;
}
.q-input::placeholder { color:var(--text-dim); opacity:.7; }
.q-input:focus { border-color:var(--gold); }
.spread-lbl {
  font-family:'Cinzel','Playfair Display',serif; font-size:.72rem;
  letter-spacing:.4em; color:var(--text-dim);
  text-transform:uppercase; text-align:center; margin-bottom:1.5rem;
}
.cards-row {
  display:flex; justify-content:center;
  gap:clamp(.8rem,2.5vw,2rem); flex-wrap:wrap;
}
.card-slot { display:flex; flex-direction:column; align-items:center; gap:.8rem; }
.pos-label {
  font-family:'Cinzel','Playfair Display',serif; font-size:.68rem;
  letter-spacing:.3em; color:var(--teal-bright);
  text-transform:uppercase; opacity:.85;
  text-shadow:0 0 6px var(--glow-teal);
}
.card-wrap {
  width:155px; height:272px;
  perspective:1000px; cursor:none;
}
.card-inner {
  position:relative; width:100%; height:100%;
  transform-style:preserve-3d;
  transition:transform .8s cubic-bezier(.175,.885,.32,1.275);
}
.card-wrap.flipped .card-inner { transform:rotateY(180deg); }
.card-wrap:not(.flipped):hover .card-inner { transform:rotateY(14deg) translateY(-7px); }
.card-face {
  position:absolute; width:100%; height:100%;
  backface-visibility:hidden; border-radius:12px; overflow:hidden;
}
.card-back {
  background:linear-gradient(155deg, var(--surface), var(--panel), var(--surface));
  border:2px solid rgba(201,168,76,.4);
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 8px 35px rgba(0,0,0,.6), 0 0 18px rgba(61,191,191,.12);
}
.back-design {
  width:85%; height:85%;
  border:1px solid rgba(201,168,76,.3);
  border-radius:8px; display:flex;
  align-items:center; justify-content:center;
  background:repeating-linear-gradient(45deg,transparent,transparent 9px,rgba(201,168,76,.05) 9px,rgba(201,168,76,.05) 18px);
}
.back-sym {
  font-size:3.2rem; opacity:.6;
  filter:drop-shadow(0 0 12px rgba(201,168,76,.7));
  animation:float 4s ease-in-out infinite;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.card-front {
  transform:rotateY(180deg);
  border:2px solid rgba(201,168,76,.55);
  box-shadow:0 8px 35px rgba(0,0,0,.6), 0 0 22px rgba(201,168,76,.15);
  display:flex; flex-direction:column;
}
.cf-inner {
  width:100%; height:100%;
  display:flex; flex-direction:column;
  padding:9px; align-items:center;
}
.cf-orn { font-size:.48rem; color:rgba(201,168,76,.7); letter-spacing:.2em; }
.cf-num {
  font-family:'Cinzel','Playfair Display',serif; font-size:.6rem;
  color:rgba(201,168,76,.8); letter-spacing:.12em;
  margin:.15rem 0;
}
.cf-sym {
  flex:1; display:flex; align-items:center; justify-content:center;
  font-size:3.2rem;
  filter:drop-shadow(0 0 12px rgba(255,255,255,.25));
}
.cf-name {
  font-family:'Cinzel','Playfair Display',serif; font-size:.57rem;
  font-weight:600; letter-spacing:.1em;
  color:var(--gold-light); text-align:center;
  text-transform:uppercase; padding:3px 2px;
  line-height:1.4;
}
.cf-kw {
  font-size:.52rem; color:rgba(232,213,183,.6);
  font-style:italic; text-align:center;
  padding:0 4px 3px;
}
.card-wrap.flipped .card-front {
  animation:revealGlow .5s ease-out .4s both;
}
@keyframes revealGlow {
  0%{box-shadow:0 8px 35px rgba(0,0,0,.5), 0 0 50px rgba(201,168,76,.7)}
  100%{box-shadow:0 8px 35px rgba(0,0,0,.5), 0 0 22px rgba(201,168,76,.15)}
}
.placeholder {
  width:155px; height:272px;
  border:1px dashed rgba(61,191,191,.12);
  border-radius:12px; display:flex;
  align-items:center; justify-content:center;
}
.ph-sym { color:rgba(61,191,191,.18); font-size:1.8rem; }
.instructions {
  text-align:center; font-size:.9rem;
  color:var(--text-dim); font-style:italic;
  margin-top:1.5rem; min-height:1.5rem;
  transition:opacity .4s;
}
.controls { display:flex; gap:1rem; margin-top:2rem; flex-wrap:wrap; justify-content:center; }
.btn {
  font-family:'Cinzel','Playfair Display',serif; font-size:.78rem;
  letter-spacing:.28em; text-transform:uppercase;
  padding:.75rem 2.2rem; border:1px solid var(--gold);
  background:transparent; color:var(--gold);
  cursor:none; border-radius:3px;
  transition:all .3s; position:relative; overflow:hidden;
}
.btn::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(201,168,76,.12),transparent);
  opacity:0; transition:opacity .3s;
}
.btn:hover::before { opacity:1; }
.btn:hover { background:rgba(201,168,76,.08); box-shadow:0 0 22px rgba(201,168,76,.3); transform:translateY(-2px); }
.btn:active { transform:translateY(0); }
.btn-primary { background:linear-gradient(135deg,rgba(201,168,76,.12),rgba(61,191,191,.08)); }
.btn-primary:hover { background:linear-gradient(135deg,rgba(201,168,76,.22),rgba(61,191,191,.14)); }
.btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }
.lang-toggle {
  position:fixed; top:72px; right:1.2rem; display:inline-flex; align-items:center; z-index:101;
  font-family:'Cinzel','Playfair Display',serif; font-size:.65rem;
  letter-spacing:.2em; text-transform:uppercase;
  padding:.45rem .9rem; border:1px solid var(--gold);
  background:rgba(5,4,3,.85); color:var(--gold);
  cursor:pointer; border-radius:3px;
  backdrop-filter:blur(6px); transition:all .3s;
}
.lang-toggle:hover { background:rgba(201,168,76,.12); box-shadow:0 0 16px rgba(201,168,76,.3); }

/* Reading panel */
.reading-panel {
  width:100%; max-width:920px;
  margin-top:2.5rem; opacity:0;
  transform:translateY(24px);
  transition:all .7s ease; pointer-events:none;
}
.reading-panel.visible { opacity:1; transform:translateY(0); pointer-events:all; }
.reading-title {
  font-family:'Cinzel Decorative','Playfair Display',serif; font-size:1.05rem;
  color:var(--gold); text-align:center; margin-bottom:1.8rem;
  text-shadow:0 0 20px rgba(201,168,76,.4);
}
.card-readings { display:flex; gap:1.2rem; flex-wrap:wrap; justify-content:center; }
.card-reading {
  flex:1; min-width:220px; max-width:280px;
  background:rgba(20,16,10,.8);
  border:1px solid var(--border);
  border-radius:8px; padding:1.4rem;
  position:relative;
  animation:fadeUp .5s ease both;
}
.card-reading::before {
  content:''; position:absolute;
  top:0; left:0; right:0; height:2px;
  background:linear-gradient(to right,transparent,var(--teal),transparent);
}
.card-reading:hover { border-color:var(--gold-dim); }
@keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
.r-pos {
  font-family:'Cinzel','Playfair Display',serif; font-size:.63rem;
  letter-spacing:.3em; color:var(--teal-bright);
  text-transform:uppercase; margin-bottom:.35rem;
  text-shadow:0 0 5px var(--glow-teal);
}
.r-sym { font-size:1.5rem; margin-bottom:.4rem; }
.r-name { font-family:'Cinzel','Playfair Display',serif; font-size:.95rem; color:var(--gold-light); margin-bottom:.5rem; }
.r-kw { font-size:.8rem; color:var(--gold); font-style:italic; margin-bottom:.65rem; opacity:.85; }
.r-meaning { font-size:.95rem; line-height:1.75; color:var(--text); opacity:.92; }

/* Conclusion */
.conclusion-box {
  max-width:700px; margin:0 auto;
  background:rgba(20,16,10,.8);
  border:1px solid var(--border);
  border-radius:8px; padding:1.8rem 1.6rem;
  position:relative; text-align:center;
}
.conclusion-box::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(to right,transparent,var(--ember),transparent);
}
.conclusion-title {
  font-family:'Cinzel Decorative','Playfair Display',serif;
  font-size:1rem; color:var(--ember); margin-bottom:1rem;
  text-shadow:0 0 14px var(--glow-ember);
}
.conclusion-text {
  font-size:1rem; line-height:1.85; color:var(--text);
  font-style:italic; opacity:.92;
}
.conclusion-advice {
  margin-top:1.2rem; padding-top:1rem;
  border-top:1px solid rgba(201,168,76,.15);
}
.conclusion-advice h4 {
  font-family:'Cinzel',serif; font-size:.7rem;
  letter-spacing:.25em; text-transform:uppercase;
  color:var(--teal-bright); margin-bottom:.6rem;
  text-shadow:0 0 6px var(--glow-teal);
}
.conclusion-advice ul {
  list-style:none; padding:0; display:flex;
  flex-direction:column; gap:.4rem; text-align:left;
  max-width:500px; margin:0 auto;
}
.conclusion-advice li {
  font-size:.92rem; line-height:1.65; color:var(--text);
  padding-left:1.4rem; position:relative;
}
.conclusion-advice li::before {
  content:'✦'; position:absolute; left:0; color:var(--ember); font-size:.7rem; top:.15rem;
}

/* Sparkle */
.sparkle {
  position:absolute; pointer-events:none;
  animation:sparkAnim .9s ease-out forwards;
  z-index:20;
}
@keyframes sparkAnim {
  0%{opacity:1;transform:scale(0) translateY(0)}
  50%{opacity:1;transform:scale(1.6) translateY(-18px)}
  100%{opacity:0;transform:scale(.5) translateY(-48px)}
}

@media(max-width:560px){
  .card-wrap{width:110px;height:193px;}
  .cf-sym{font-size:2.3rem;}
  .cf-name{font-size:.48rem;}
  .back-sym{font-size:2.4rem;}
}
/* ── Navbar ── */
nav {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 100;
  background: rgba(5,4,3,.88);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(201,168,76,0.3);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 2.5rem;
  height: 58px;
}
.nav-logo {
  font-family: 'Cinzel Decorative', serif;
  font-size: 1rem;
  color: var(--gold);
  text-shadow: 0 0 14px rgba(201,168,76,0.5);
  letter-spacing: .08em;
  text-decoration: none;
  white-space: nowrap;
}
.nav-links {
  display: flex; align-items: center;
  gap: 0.2rem; list-style: none;
}
.nav-links a {
  font-family: 'Cinzel', serif;
  font-size: 0.7rem;
  letter-spacing: .3em;
  text-transform: uppercase;
  color: var(--text-dim);
  text-decoration: none;
  padding: .45rem .9rem;
  border-radius: 3px;
  border: 1px solid transparent;
  transition: color .25s, border-color .25s, background .25s;
}
.nav-links a:hover,
.nav-links a.active {
  color: var(--gold-light);
  border-color: rgba(201,168,76,0.3);
  background: rgba(201,168,76,0.07);
}
.hamburger {
  display: none; flex-direction: column; gap: 5px;
  cursor: pointer; padding: .4rem; background: none; border: none;
}
.hamburger span {
  display: block; width: 22px; height: 2px;
  background: var(--gold); border-radius: 2px;
  transition: transform .3s, opacity .3s;
}
@media (max-width: 640px) {
  nav { padding: 0 1.2rem; }
  .nav-links {
    position: fixed; top: 58px; left: 0; right: 0;
    flex-direction: column; align-items: stretch;
    background: rgba(5,4,3,.97);
    border-bottom: 1px solid rgba(201,168,76,0.3);
    padding: .8rem 1.2rem 1rem;
    gap: .1rem;
    transform: translateY(-120%);
    transition: transform .3s;
  }
  .nav-links.open { transform: translateY(0); }
  .nav-links a { text-align: center; padding: .65rem; }
  .hamburger { display: flex; }
}
/* ── Vietnamese font override ── */
body.lang-vi, body.lang-vi h1, body.lang-vi .subtitle,
body.lang-vi .q-label, body.lang-vi .q-input,
body.lang-vi .spread-lbl, body.lang-vi .pos-label,
body.lang-vi .reading-title, body.lang-vi .r-pos,
body.lang-vi .r-name, body.lang-vi .r-kw, body.lang-vi .r-meaning,
body.lang-vi .conclusion-title, body.lang-vi .conclusion-text,
body.lang-vi .conclusion-advice h4, body.lang-vi .conclusion-advice li,
body.lang-vi .instructions, body.lang-vi .btn,
body.lang-vi .lang-toggle, body.lang-vi .nav-links a,
body.lang-vi .cf-name, body.lang-vi .cf-kw {
  font-family: 'Roboto', 'Times New Roman', sans-serif !important;
}

.q-model-btn {
  font-family: 'Cinzel', serif; font-size: .65rem;
  letter-spacing: .15em; text-transform: uppercase;
  padding: .5rem 1rem; border: 1px solid var(--gold-dim);
  background: transparent; color: var(--text-dim);
  cursor: none; border-radius: 3px; transition: all .3s;
}
.q-model-btn:hover { border-color: var(--gold); color: var(--gold); }
.q-model-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,.08); }

.card-wrap.reversed .card-front {
  border-color: rgba(150, 120, 180, .55);
  box-shadow: 0 8px 35px rgba(0,0,0,.6), 0 0 22px rgba(150,120,180,.15);
}
.reversed-badge {
  position: absolute; top: 4px; right: 4px;
  font-size: .5rem; color: rgba(150,120,180,.9);
  background: rgba(150,120,180,.15); padding: .15rem .3rem;
  border-radius: 2px; font-weight: 700; letter-spacing: .05em;
}
.r-reversed-tag {
  font-size: .7rem; color: rgba(150,120,180,.9);
  font-weight: 600; margin-left: .3rem;
}
.r-reversed-meaning {
  margin-top: .6rem; padding: .6rem .8rem;
  background: rgba(150,120,180,.08); border-left: 2px solid rgba(150,120,180,.4);
  border-radius: 0 4px 4px 0; font-size: .82rem; color: rgba(150,120,180,.85);
  line-height: 1.55;
}
.r-position-interp {
  margin-top: .5rem; padding: .5rem 0; font-size: .88rem;
  color: var(--text-dim); line-height: 1.6; font-style: italic;
  border-top: 1px solid rgba(201,168,76,.1);
}
.r-reflection {
  margin-top: .8rem; padding: .7rem .8rem;
  background: rgba(100,200,200,.05);
  border-left: 2px solid rgba(100,200,200,.3);
  border-radius: 0 4px 4px 0;
}
.r-reflection-label {
  font-family: 'Cinzel', 'Playfair Display', serif;
  font-size: .66rem; letter-spacing: .18em; text-transform: uppercase;
  color: var(--teal-bright, rgba(100,200,200,.85));
  margin-bottom: .35rem;
}
.r-reflection-q {
  font-size: .82rem; line-height: 1.6;
  color: var(--text, #ddd); opacity: .88;
  margin-bottom: .25rem; padding-left: .2rem;
}
.synth-section { margin-bottom: 1.2rem; }
.synth-section-title {
  font-family: 'Cinzel', serif; font-size: .72rem; letter-spacing: .18em;
  text-transform: uppercase; color: var(--gold); margin-bottom: .5rem;
}
.synth-opening { font-size: .95rem; line-height: 1.65; color: var(--text); margin-bottom: 1rem; }
.synth-thread { font-size: .88rem; line-height: 1.6; color: var(--text-dim); }
.synth-elements { font-size: .85rem; line-height: 1.55; color: var(--text-dim); }
.synth-path { font-size: .88rem; line-height: 1.6; }
.synth-path ol { padding-left: 1.2rem; margin: .4rem 0 0; }
.synth-path li { margin-bottom: .3rem; color: var(--text-dim); }
.synth-story { font-size: .9rem; line-height: 1.75; color: var(--text); font-style: italic; border-left: 2px solid rgba(201,168,76,.25); padding-left: 1rem; margin: .5rem 0; }
.synth-story p { margin: 0 0 .4rem; }
.synth-badges-expanded {
  display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;
  margin-top: 1rem; padding-top: .8rem;
  border-top: 1px solid rgba(201,168,76,.12);
}
.synth-badge-card {
  flex: 1 1 220px; max-width: 320px;
  padding: .6rem .9rem; border: 1px solid rgba(201,168,76,.25);
  border-radius: 5px; background: rgba(201,168,76,.04);
}
.synth-badge-card .badge-header {
  font-size: .7rem; letter-spacing: .12em; text-transform: uppercase;
  color: var(--gold-dim); font-family: 'Cinzel', serif;
  margin-bottom: .3rem;
}
.synth-badge-card .badge-header .badge-icon { margin-right: .3rem; }
.synth-badge-card .badge-desc {
  font-size: .78rem; color: var(--text-dim); line-height: 1.5;
  margin-bottom: .25rem;
}
.synth-badge-card .badge-reasons {

<script>
// ─── DECK DATA (78 cards) ────────────────────────────────────────────────────
const DECK = [
  // MAJOR ARCANA
  {id:0,name:"The Fool",arcana:"major",suit:null,num:"0",sym:"🌟",col:["#140630","#2d1575"],
   kw:["New Beginnings","Innocence","Leap of Faith"],
   meaning:"You are standing at the edge of something completely new — a job, a relationship, a creative project, or a life direction that has no guarantees. The Fool appears when overthinking has become your biggest obstacle. This card is not about being reckless; it is about recognizing that the only way to learn what lies ahead is to start walking. Take the first step this week, even if you cannot see the second one yet."},
  {id:1,name:"The Magician",arcana:"major",suit:null,num:"I",sym:"🪄",col:["#1a0a3d","#3d1a75"],
   kw:["Willpower","Skill","Manifestation"],
   meaning:"You already have every skill, resource, and connection you need to make something real happen — but you may be waiting for permission or 'the right moment.' The Magician says the right moment is now. Stop researching and start building. Focus your scattered energy into one clear intention and act on it today, not tomorrow."},
  {id:2,name:"The High Priestess",arcana:"major",suit:null,num:"II",sym:"🌙",col:["#0a1a3d","#1a2d75"],
   kw:["Intuition","Mystery","Inner Knowing"],
   meaning:"Something important is happening beneath the surface that you cannot yet see clearly — a hidden dynamic in a relationship, a decision that has not fully formed, or information being deliberately withheld. The High Priestess tells you that logic alone will not crack this one. Pay attention to what your gut, your dreams, and your quiet moments are telling you. The answer is already inside you; stop drowning it out with noise."},
  {id:3,name:"The Empress",arcana:"major",suit:null,num:"III",sym:"🌿",col:["#0d2a0d","#1a4d1a"],
   kw:["Abundance","Nurturing","Fertility"],
   meaning:"You are in a season where things want to grow — creative projects, relationships, business ideas, even your physical health. The Empress appears when you have been giving too much without receiving, or pushing too hard without allowing things to develop naturally. Stop forcing outcomes. Nurture what is already planted, take care of your body, and trust that abundance follows patience and self-care."},
  {id:4,name:"The Emperor",arcana:"major",suit:null,num:"IV",sym:"👑",col:["#3d1a0a","#6b2f0f"],
   kw:["Authority","Structure","Stability"],
   meaning:"Your situation needs structure, not more inspiration. The Emperor appears when chaos has lasted too long — unfinished projects, blurred boundaries, or a lack of clear direction. It is time to build systems: set deadlines, establish rules for yourself, organize your finances, and create the framework that turns your ideas into reality. Discipline is not the enemy of creativity — it is what makes creativity productive."},
  {id:5,name:"The Hierophant",arcana:"major",suit:null,num:"V",sym:"🔑",col:["#1a0a3d","#3a1a70"],
   kw:["Tradition","Wisdom","Mentorship"],
   meaning:"You are trying to figure something out alone when proven guidance already exists — a teacher, a tradition, a method that others have used successfully. The Hierophant does not demand blind obedience to rules; it asks whether you are learning from those who walked this path before reinventing the wheel. Find a mentor, take the course, study the tradition. What you need has already been mapped by someone else."},
  {id:6,name:"The Lovers",arcana:"major",suit:null,num:"VI",sym:"♥",col:["#3d0a1a","#6b0f2f"],
   kw:["Love","Harmony","Meaningful Choice"],
   meaning:"A real choice stands in front of you — not between good and bad, but between two genuinely appealing paths that require different sacrifices. This could be a relationship decision, a career fork, or a values conflict. The Lovers card does not tell you which to choose; it tells you that the choice must come from your deepest values, not from fear, convenience, or other people's expectations. Choose what aligns with who you are becoming, not who you used to be."},
  {id:7,name:"The Chariot",arcana:"major",suit:null,num:"VII",sym:"⚡",col:["#1a1a0a","#3d3a0f"],
   kw:["Victory","Willpower","Drive"],
   meaning:"You are dealing with opposing forces — conflicting priorities, internal struggle between what you want and what is expected, or external resistance to your direction. The Chariot says that victory is absolutely possible, but it requires you to grab the reins and steer with focused determination right now. Stop negotiating with your doubts. Commit fully, push through the resistance, and do not look back until you have crossed the finish line."},
  {id:8,name:"Strength",arcana:"major",suit:null,num:"VIII",sym:"🦁",col:["#3d2a0a","#6b4a0f"],
   kw:["Courage","Compassion","Inner Power"],
   meaning:"The challenge you face right now cannot be solved by forcing your way through — aggression, ultimatums, or sheer willpower will make it worse. Strength appears when you need quiet courage and gentle persistence: the patience to sit with discomfort, the compassion to manage a difficult person without escalating, or the self-control to resist an impulse that feels urgent but is actually destructive. Your soft power is your real power here."},
  {id:9,name:"The Hermit",arcana:"major",suit:null,num:"IX",sym:"🕯️",col:["#0a1a1a","#0f3535"],
   kw:["Solitude","Introspection","Inner Light"],
   meaning:"You have been seeking answers from other people — advice, validation, someone else's opinion — when the clarity you need can only come from solitude and self-reflection. The Hermit calls you to step back from the noise, cancel the unnecessary commitments, and spend real time alone with your thoughts. The answer is not in another conversation; it is in the silence you have been avoiding. Journal, walk, meditate — the insight will come."},
  {id:10,name:"Wheel of Fortune",arcana:"major",suit:null,num:"X",sym:"☸️",col:["#1a0a3d","#3a2070"],
   kw:["Cycles","Fate","Turning Point"],
   meaning:"Circumstances are shifting in ways you cannot fully control — a job change, a relationship transition, an unexpected opportunity or setback. The Wheel of Fortune reminds you that all cycles turn: what is up comes down, and what is down comes up. If things are going well, prepare for the next phase. If things are difficult, know that the tide is already turning. Your job is not to stop the wheel — it is to ride it skilfully."},
  {id:11,name:"Justice",arcana:"major",suit:null,num:"XI",sym:"⚖️",col:["#1a0a0a","#3d0f0f"],
   kw:["Truth","Fairness","Cause & Effect"],
   meaning:"A situation in your life is demanding honest accountability — either you need to own your role in what happened, or someone else needs to answer for theirs. Justice does not play favourites. If you have been cutting corners, avoiding a difficult conversation, or hoping a problem will just go away, this card says: face it directly and fairly. Make the decision you would be proud to explain to anyone. The truth will come out regardless."},
  {id:12,name:"The Hanged Man",arcana:"major",suit:null,num:"XII",sym:"🌊",col:["#0a1a3d","#0f2d6b"],
   kw:["Surrender","Pause","New Perspective"],
   meaning:"You are trying to push through a situation where pushing is the wrong approach. The Hanged Man appears when your current perspective is the actual obstacle — not the circumstances themselves. Stop strategising and allow yourself to see the problem from an entirely different angle. Instead of asking 'How do I win?', ask 'What am I refusing to see?' The pause you resist is exactly the pause you need."},
  {id:13,name:"Death",arcana:"major",suit:null,num:"XIII",sym:"🦋",col:["#0e0e0e","#1e1e1e"],
   kw:["Transformation","Endings","Rebirth"],
   meaning:"Something in your life has run its course — a relationship dynamic, a job role, a self-image, a habit, or an entire phase of life. Death does not mean physical loss; it means that clinging to what is already ending is causing you more pain than letting go will. Name the thing you know is over but have not yet released. The sooner you grieve it honestly and move through, the sooner the new chapter begins. What comes next will be better than what you are holding onto."},
  {id:14,name:"Temperance",arcana:"major",suit:null,num:"XIV",sym:"✨",col:["#0a1a3d","#1a3a6b"],
   kw:["Balance","Patience","Flow"],
   meaning:"You are oscillating between extremes — overworking then crashing, giving everything then withdrawing completely, or toggling between two options without committing to either. Temperance says: stop swinging and find the middle. This is not about compromise or settling; it is about integration. Blend the opposing forces in your life into something sustainable. The answer is not A or B — it is a thoughtful combination of both, applied with patience."},
  {id:15,name:"The Devil",arcana:"major",suit:null,num:"XV",sym:"🔗",col:["#1a0800","#3d1400"],
   kw:["Shadow","Attachment","Liberation"],
   meaning:"There is a pattern, attachment, or habit in your life that you know is not serving you — but you keep returning to it because it feels familiar, pleasurable, or safe. The Devil does not represent evil; it represents the chains you have forged for yourself through repetition and avoidance. Name the specific thing that keeps you stuck: the toxic relationship you keep re-entering, the spending habit you justify, the coping mechanism you have outgrown. Awareness is the key that unlocks the chain."},
  {id:16,name:"The Tower",arcana:"major",suit:null,num:"XVI",sym:"⚡",col:["#2a0a0a","#5a0f0f"],
   kw:["Upheaval","Revelation","Awakening"],
   meaning:"Something you believed was stable — a relationship, a career, a belief about yourself, a financial plan — is being shaken or has already collapsed. The Tower is not punishment; it is revelation. The structure that fell was built on assumptions that were no longer true. Your job now is not to rebuild the same thing; it is to stand in the rubble, see clearly what was false, and build something real in its place. The ground under you is actually more solid now than before."},
  {id:17,name:"The Star",arcana:"major",suit:null,num:"XVII",sym:"⭐",col:["#0a0a2a","#0f0f5a"],
   kw:["Hope","Renewal","Faith"],
   meaning:"You have been through something genuinely difficult — a loss, a failure, or a period of deep uncertainty — and The Star appears to tell you that the worst is behind you. This is not naive optimism; it is the quiet certainty that healing is underway. You may not feel fully recovered yet, but the process is real. Let yourself hope again. Take one small step toward what you want, and notice how the universe actually does meet you halfway when you move with sincerity."},
  {id:18,name:"The Moon",arcana:"major",suit:null,num:"XVIII",sym:"🌕",col:["#0a0a1a","#0f0f2d"],
   kw:["Illusion","The Unconscious","Dreams"],
   meaning:"You are not seeing a situation clearly — fear, projection, or wishful thinking is distorting your perception. The Moon warns that someone (possibly you) is not being entirely honest, or that an important piece of information is hidden. Do not make irreversible decisions right now. Instead, pay close attention to your dreams, your gut reactions, and the things people are not saying. Clarity will come, but it requires patience and a willingness to look at uncomfortable truths."},
  {id:19,name:"The Sun",arcana:"major",suit:null,num:"XIX",sym:"☀️",col:["#2a1800","#5a3800"],
   kw:["Joy","Vitality","Success"],
   meaning:"This is a genuinely good moment — not because problems have magically disappeared, but because you have the clarity, energy, and confidence to handle whatever comes. The Sun appears when it is time to stop second-guessing yourself and enjoy what you have built. Share your success openly, express your joy without guilt, and let your enthusiasm inspire the people around you. Happiness is not something you need to earn permission for — claim it."},
  {id:20,name:"Judgement",arcana:"major",suit:null,num:"XX",sym:"🎺",col:["#1a0a2a","#3d1a5a"],
   kw:["Awakening","Calling","Absolution"],
   meaning:"A part of your life is asking for an honest review — not to punish yourself, but to clearly see what worked, what did not, and what you are being called to do next. Judgement appears at turning points: career pivots, relationship milestones, or moments when you realise you have been living someone else's version of your life. Forgive what needs forgiving (especially yourself), learn the lesson fully, and answer the call that has been growing louder. You know what it is."},
  {id:21,name:"The World",arcana:"major",suit:null,num:"XXI",sym:"🌍",col:["#0a1a0a","#1a3d1a"],
   kw:["Completion","Integration","Achievement"],
   meaning:"A significant chapter of your life is reaching its natural conclusion — a project completed, a goal achieved, a phase of growth fully integrated. The World does not just celebrate the destination; it honours every step of the journey that brought you here. Before you rush to the next thing, pause and truly acknowledge what you have accomplished. Let this sense of wholeness fill you. Then, when you are ready, step through the door into the next great cycle with everything you have learned."},

  // WANDS (Fire · Action · Ambition)
  {id:22,name:"Ace of Wands",arcana:"minor",suit:"Wands",num:"Ace",sym:"🔥",col:["#2a0800","#5c1600"],
   kw:["Inspiration","Creative Spark","Initiative"],
   meaning:"A genuine creative opportunity has appeared — a business idea, a project, a passion that excites you in a way nothing has recently. The Ace of Wands is not a vague feeling of inspiration; it is a specific spark asking you to act on it now, before the momentum fades. Write it down, tell someone, take the first concrete step today. This seed has real fire in it — but only if you plant it while it is alive."},
  {id:23,name:"Two of Wands",arcana:"minor",suit:"Wands",num:"2",sym:"🗺️",col:["#2a0800","#5c1600"],
   kw:["Planning","Vision","Future"],
   meaning:"You have the initial spark and the first piece of the plan — but you are standing at the threshold instead of walking through it. The Two of Wands shows you holding the world in your hands, looking at the horizon, but not yet moving toward it. This is the card of strategic planning, not passive daydreaming. Make your plan specific: set dates, name the milestones, and decide what you are willing to sacrifice to get there."},
  {id:24,name:"Three of Wands",arcana:"minor",suit:"Wands",num:"3",sym:"⛵",col:["#2a0800","#5c1600"],
   kw:["Expansion","Foresight","Progress"],
   meaning:"Your early efforts are beginning to show real results — clients responding, skills improving, relationships deepening — and the natural next step is expansion. The Three of Wands says your ships are indeed coming in, but you need to be watching the horizon and preparing for what arrives, not resting on what you have already done. Think bigger than your current scope. The opportunity ahead is larger than you initially estimated."},
  {id:25,name:"Four of Wands",arcana:"minor",suit:"Wands",num:"4",sym:"🎉",col:["#2a0800","#5c1600"],
   kw:["Celebration","Harmony","Home"],
   meaning:"You have reached a genuine milestone — a project completed, a relationship solidified, a home established, or a goal achieved — and the Four of Wands says: stop and celebrate it properly. You have a habit of rushing to the next challenge without acknowledging what you just accomplished. Gather the people who helped you get here, mark the occasion, and let the warmth of belonging fill you before you move on."},
  {id:26,name:"Five of Wands",arcana:"minor",suit:"Wands",num:"5",sym:"⚔️",col:["#2a0800","#5c1600"],
   kw:["Conflict","Competition","Challenge"],
   meaning:"You are in a situation with multiple competing voices, agendas, or priorities — a workplace power struggle, creative disagreements, or a group where everyone wants to lead and nobody wants to listen. The Five of Wands is not necessarily destructive conflict; it is the friction that sharpens. But you need to decide whether this competition is making you better or just draining your energy. If it is the former, lean in. If the latter, step out."},
  {id:27,name:"Six of Wands",arcana:"minor",suit:"Wands",num:"6",sym:"🏆",col:["#2a0800","#5c1600"],
   kw:["Victory","Recognition","Triumph"],
   meaning:"Something you have worked hard on is receiving the recognition it deserves — a promotion, public praise, a successful launch, or a personal breakthrough that others can see. The Six of Wands says: accept this moment fully. Do not downplay your achievement or deflect the compliment. You earned this through real effort. Let the recognition fuel your confidence for the harder challenges still ahead, because they are coming."},
  {id:28,name:"Seven of Wands",arcana:"minor",suit:"Wands",num:"7",sym:"🛡️",col:["#2a0800","#5c1600"],
   kw:["Perseverance","Defense","Conviction"],
   meaning:"Your position, idea, or boundary is being challenged — by competitors, critics, people who want what you have, or circumstances that are testing whether you really believe in what you are doing. The Seven of Wands says you have the high ground and the advantage, but only if you stand firm. This is not the moment to second-guess yourself or accommodate people who do not have your best interests at heart. Defend what you have built."},
  {id:29,name:"Eight of Wands",arcana:"minor",suit:"Wands",num:"8",sym:"💫",col:["#2a0800","#5c1600"],
   kw:["Swift Action","Movement","News"],
   meaning:"Events are accelerating rapidly — messages arriving, plans coming together, travel happening, decisions being made fast. The Eight of Wands signals that the slow period is over and everything is now moving at speed. Your job is not to slow things down but to respond quickly and accurately. The window of opportunity is real but narrow. Act on the news, reply to the message, book the ticket — momentum rewards the decisive."},
  {id:30,name:"Nine of Wands",arcana:"minor",suit:"Wands",num:"9",sym:"🌅",col:["#2a0800","#5c1600"],
   kw:["Resilience","Persistence","Endurance"],
   meaning:"You are exhausted, wary, and wondering if the effort you have poured into this is ever going to pay off. The Nine of Wands appears when you are one push away from the breakthrough — but you have been pushing for so long that you are not sure you can do it again. You can. This is not the time to quit. Protect your energy, rest briefly, then make that final effort. What you have built through persistence is more solid than you realize."},
  {id:31,name:"Ten of Wands",arcana:"minor",suit:"Wands",num:"10",sym:"🎒",col:["#2a0800","#5c1600"],
   kw:["Burden","Responsibility","Overextension"],
   meaning:"You have said yes to too many things and are now carrying responsibilities that belong to other people. The Ten of Wands is the card of burnout — and it appears not because you are weak, but because you have been too capable and too willing. Something has to be put down. Identify the three commitments that drain you most and either delegate them, renegotiate them, or drop them entirely. You cannot do everything, and trying to is destroying what matters."},
  {id:32,name:"Page of Wands",arcana:"minor",suit:"Wands",num:"Page",sym:"🌱",col:["#2a0800","#5c1600"],
   kw:["Enthusiasm","Discovery","Free Spirit"],
   meaning:"Something has caught your attention and lit a spark of excitement — a new hobby, an unexpected interest, a message or invitation that makes your energy rise. The Page of Wands says: follow that curiosity without needing to know where it leads. Not everything needs to become a career or a life plan. Sometimes the most important discoveries begin as playful exploration. Say yes to the thing that excites you, even if it seems impractical."},
  {id:33,name:"Knight of Wands",arcana:"minor",suit:"Wands",num:"Knight",sym:"🏇",col:["#2a0800","#5c1600"],
   kw:["Action","Passion","Adventure"],
   meaning:"You are in a phase of intense energy, ambition, and forward drive — ready to charge into a new project, relationship, or adventure without looking back. The Knight of Wands embodies passionate action, but his weakness is acting before thinking. Channel this fiery momentum into something specific. Pick one target, commit fully, and charge. But first: pause for 30 seconds and make sure you are running toward something, not away from something."},
  {id:34,name:"Queen of Wands",arcana:"minor",suit:"Wands",num:"Queen",sym:"🦊",col:["#2a0800","#5c1600"],
   kw:["Charisma","Confidence","Determination"],
   meaning:"You are being called to lead with warmth, confidence, and creative vision — as a manager, a parent, a friend, or simply the person in the room who sets the tone. The Queen of Wands does not lead by authority or force; she leads because people are naturally drawn to her energy. Own your presence without apologizing for it. Set the standard by living it. The project, team, or situation needs your particular blend of boldness and heart right now."},
  {id:35,name:"King of Wands",arcana:"minor",suit:"Wands",num:"King",sym:"🦅",col:["#2a0800","#5c1600"],
   kw:["Vision","Leadership","Mastery"],
   meaning:"You have the vision, the experience, and the authority to lead something significant — a business, a creative endeavour, a team, or a major life direction. The King of Wands is the mature leader who inspires through example and strategic boldness. This is not the time for caution or consensus-seeking. Make the decision, communicate it clearly, and trust that your track record has earned you the right to lead. Others are waiting for you to step up."},

  // CUPS (Water · Emotion · Relationships)
  {id:36,name:"Ace of Cups",arcana:"minor",suit:"Cups",num:"Ace",sym:"💧",col:["#0a0a2a","#0f1a5c"],
   kw:["New Love","Compassion","Emotional Opening"],
   meaning:"An emotional new beginning is genuinely available to you right now — new love, a deepening of compassion, a creative channel opening, or a spiritual awakening you were not expecting. The Ace of Cups is not about chasing feelings; it is about being willing to receive them. Something or someone is offering you an emotional gift. Open your heart enough to let it in, even if past experience has taught you to guard it."},
  {id:37,name:"Two of Cups",arcana:"minor",suit:"Cups",num:"2",sym:"🤝",col:["#0a0a2a","#0f1a5c"],
   kw:["Partnership","Connection","Harmony"],
   meaning:"A real connection is forming between you and another person — romantic, professional, or deeply platonic — and it is based on genuine mutual recognition, not just convenience or attraction. The Two of Cups says this partnership has authentic potential because both people see and value each other. Invest in this relationship with honesty and presence. It is rare to find someone who mirrors your values this clearly."},
  {id:38,name:"Three of Cups",arcana:"minor",suit:"Cups",num:"3",sym:"🥂",col:["#0a0a2a","#0f1a5c"],
   kw:["Celebration","Friendship","Community"],
   meaning:"Your life needs more genuine human connection right now — not networking, not social media, but real celebration and shared joy with people who know and care about you. The Three of Cups appears when you have been isolated too long or when a real occasion for collective joy exists. Call the friends you have been meaning to see, attend the gathering, say yes to the invitation. The energy of community will restore something in you that solitude cannot."},
  {id:39,name:"Four of Cups",arcana:"minor",suit:"Cups",num:"4",sym:"🌧️",col:["#0a0a2a","#0f1a5c"],
   kw:["Apathy","Contemplation","Reevaluation"],
   meaning:"You are feeling bored, dissatisfied, or emotionally flat — and an opportunity or offer is right in front of you that you are not seeing because you are too focused on what you do not have. The Four of Cups says this apathy is not a permanent condition; it is a signal that you need to reevaluate what you actually want. But while you sit and contemplate, do not miss the cup being offered. Look up. Something real is being placed before you right now."},
  {id:40,name:"Five of Cups",arcana:"minor",suit:"Cups",num:"5",sym:"😔",col:["#0a0a2a","#0f1a5c"],
   kw:["Grief","Loss","Regret"],
   meaning:"You are grieving something — a relationship that ended, an opportunity that slipped away, a version of your life that did not materialise. The Five of Cups says your grief is valid and necessary; do not rush past it. But it is also pointing to the two cups still standing behind you: the relationships, resources, and possibilities that remain. After you have fully honoured the loss, turn around. What survives this grief is stronger than what was lost."},
  {id:41,name:"Six of Cups",arcana:"minor",suit:"Cups",num:"6",sym:"🌸",col:["#0a0a2a","#0f1a5c"],
   kw:["Nostalgia","Innocence","The Past"],
   meaning:"Something from your past is resurfacing — an old friend reaching out, a childhood memory triggered, or a situation that echoes a pattern you recognise. The Six of Cups is not simply asking you to be sentimental; it is asking whether revisiting the past can genuinely heal something in your present. Some doors are worth reopening. But be honest about whether your nostalgia is guiding you toward growth or pulling you away from the life that needs your attention now."},
  {id:42,name:"Seven of Cups",arcana:"minor",suit:"Cups",num:"7",sym:"🌌",col:["#0a0a2a","#0f1a5c"],
   kw:["Choices","Fantasy","Illusion"],
   meaning:"You are drowning in options, fantasies, or possibilities — and the sheer abundance of what you could do is preventing you from doing anything real. The Seven of Cups is the card of beautiful illusions and interesting distractions. Not all of these visions are real; some are wishful thinking, others are fear in disguise. Your task is not to explore every possibility but to pick the one that matches reality and commit to it before the window closes."},
  {id:43,name:"Eight of Cups",arcana:"minor",suit:"Cups",num:"8",sym:"🚶",col:["#0a0a2a","#0f1a5c"],
   kw:["Letting Go","Moving On","Seeking More"],
   meaning:"Something that used to satisfy you no longer does — a relationship, a job, a living situation, a creative direction — and you know it, even if you have not admitted it fully. The Eight of Cups is about the quiet courage to walk away from something that is not broken but is simply no longer right. This is not drama or crisis; it is mature self-awareness. Something deeper is calling you. Listen to it and start moving toward it, even if the path is not yet clear."},
  {id:44,name:"Nine of Cups",arcana:"minor",suit:"Cups",num:"9",sym:"😊",col:["#0a0a2a","#0f1a5c"],
   kw:["Contentment","Wishes","Satisfaction"],
   meaning:"Something you genuinely wished for is here or very close — emotional fulfillment, a relationship milestone, personal contentment, or a desire that is being granted. The Nine of Cups says you are allowed to feel satisfied. This is not complacency or selfishness; it is the natural reward of aligning your life with what you truly value. Savour this. Let the satisfaction be complete. You do not need to immediately find the next thing to worry about."},
  {id:45,name:"Ten of Cups",arcana:"minor",suit:"Cups",num:"10",sym:"🏠",col:["#0a0a2a","#0f1a5c"],
   kw:["Bliss","Family","Lasting Joy"],
   meaning:"This is the card of genuine, lasting emotional fulfillment — not a fleeting high, but the deep contentment that comes from love that is real, connection that endures, and a life that feels like home. The Ten of Cups may point to family harmony, a relationship that has matured into something beautiful, or a community that truly holds you. If this describes your situation, recognise it fully and protect it fiercely. If it does not yet, know that it is genuinely possible."},
  {id:46,name:"Page of Cups",arcana:"minor",suit:"Cups",num:"Page",sym:"🐟",col:["#0a0a2a","#0f1a5c"],
   kw:["Intuition","Sensitivity","Messages"],
   meaning:"A gentle, unexpected message is arriving — not necessarily a literal letter, but a feeling, a creative impulse, a synchronicity, or an emotional nudge from your subconscious that deserves your attention. The Page of Cups says: be soft and receptive right now. Do not analyse the feeling away or dismiss it as irrational. The fish in the cup is real. Follow the creative urge, respond to the emotional signal, and let your imagination lead for a while."},
  {id:47,name:"Knight of Cups",arcana:"minor",suit:"Cups",num:"Knight",sym:"🐎",col:["#0a0a2a","#0f1a5c"],
   kw:["Romance","Idealism","Heartfelt Quest"],
   meaning:"You or someone in your life is approaching a situation with romantic idealism and emotional intensity — a confession of feelings, a creative proposal, a heartfelt gesture. The Knight of Cups rides toward what his heart wants, and that sincerity is his greatest strength. But idealism can also blind you to practical realities. Let the heart lead, but keep your eyes open. The most beautiful quests still require you to look where you are stepping."},
  {id:48,name:"Queen of Cups",arcana:"minor",suit:"Cups",num:"Queen",sym:"🌊",col:["#0a0a2a","#0f1a5c"],
   kw:["Compassion","Empathy","Nurturing Wisdom"],
   meaning:"The situation calls for deep emotional intelligence — the ability to hold space for someone else's pain without drowning in it, to listen without fixing, and to trust your intuition as valid data. The Queen of Cups embodies emotional mastery that does not come from suppression but from integration. If you are losing yourself in other people's emotions, she reminds you to check your own cup first. You cannot pour from empty."},
  {id:49,name:"King of Cups",arcana:"minor",suit:"Cups",num:"King",sym:"🔱",col:["#0a0a2a","#0f1a5c"],
   kw:["Emotional Mastery","Wisdom","Diplomacy"],
   meaning:"A situation requires you to be the calm in the storm — to feel everything deeply while responding with composure, wisdom, and measured compassion. The King of Cups has mastered the art of emotional regulation: he does not suppress his feelings, he channels them. If conflict is swirling around you, be the person who de-escalates through genuine understanding rather than cold logic. Lead with your heart, but let your wisdom hold the rudder."},

  // SWORDS (Air · Mind · Truth)
  {id:50,name:"Ace of Swords",arcana:"minor",suit:"Swords",num:"Ace",sym:"🗡️",col:["#101020","#1a1a30"],
   kw:["Clarity","Truth","Breakthrough"],
   meaning:"A moment of genuine mental clarity has cut through the confusion — you suddenly see the truth of a situation, the right answer to a decision, or the real nature of a problem you have been struggling with. The Ace of Swords is not gentle insight; it is a sharp, clean break in the fog. Act on this clarity now, while it is fresh. Speak the truth, make the decision, send the message. Mental power this focused does not last forever — use it before it blurs."},
  {id:51,name:"Two of Swords",arcana:"minor",suit:"Swords",num:"2",sym:"🤐",col:["#101020","#1a1a30"],
   kw:["Stalemate","Avoidance","Decision"],
   meaning:"You are avoiding a decision — not because you lack the information, but because both options involve sacrifice and you are hoping a third, painless path will appear. It will not. The Two of Swords says the blindfold is self-imposed; you are choosing not to see because seeing would force you to act. Remove the blindfold, face the options honestly, and choose. Continued avoidance is itself a choice, and usually the worst one."},
  {id:52,name:"Three of Swords",arcana:"minor",suit:"Swords",num:"3",sym:"💔",col:["#101020","#1a1a30"],
   kw:["Heartbreak","Sorrow","Grief"],
   meaning:"Something has hurt you — a betrayal, a difficult truth, a rejection, or a loss that cuts deep. The Three of Swords does not sugarcoat pain; it says: yes, this hurts, and it is supposed to. The wound is real. But suppressing it or pretending you are fine will only drive the blade deeper. Let yourself feel the full weight of this. Cry if you need to, admit the pain to someone you trust, and know that genuine healing cannot begin until the hurt is fully acknowledged."},
  {id:53,name:"Four of Swords",arcana:"minor",suit:"Swords",num:"4",sym:"🛌",col:["#101020","#1a1a30"],
   kw:["Rest","Recovery","Contemplation"],
   meaning:"Your mind and body are running on empty and pushing harder will make everything worse. The Four of Swords is a direct instruction to rest — not as a reward for finishing, but as a strategic necessity right now. Cancel one thing today. Sleep more. Step away from the screen. The problem you are fixated on will be clearer after genuine recovery. Strategic withdrawal is not weakness; it is the thing that separates people who burn out from people who sustain."},
  {id:54,name:"Five of Swords",arcana:"minor",suit:"Swords",num:"5",sym:"💬",col:["#101020","#1a1a30"],
   kw:["Conflict","Hollow Victory","Ego"],
   meaning:"You are in or approaching a conflict where winning is possible but the cost of winning is higher than the value of the prize. The Five of Swords asks: is this fight about principle, or is it about ego? If you have already won, notice who you have left wounded on the field. If you have lost, consider whether this battle was worth fighting at all. Sometimes the wisest move is to gather your remaining swords and walk away before more damage is done."},
  {id:55,name:"Six of Swords",arcana:"minor",suit:"Swords",num:"6",sym:"⛵",col:["#101020","#1a1a30"],
   kw:["Transition","Healing","Moving On"],
   meaning:"You are leaving a painful situation behind — moving on from a relationship, a mindset, a job, or a phase of life that has been difficult. The Six of Swords says the journey toward something better has already begun, even if it does not feel like relief yet. You will carry some baggage from what happened, and that is normal. But the waters ahead are calmer than the waters behind. Keep moving forward. Do not go back to check if the storm has really passed — it has."},
  {id:56,name:"Seven of Swords",arcana:"minor",suit:"Swords",num:"7",sym:"🎭",col:["#101020","#1a1a30"],
   kw:["Strategy","Cunning","Deception"],
   meaning:"Someone is not being fully honest — and it might be you. The Seven of Swords warns of hidden agendas, half-truths, or strategic deception in your situation. This could be someone taking credit for your work, a partner withholding information, or your own tendency to avoid confrontation by working around problems instead of through them. Check your own integrity first. Then look carefully at who around you is saying one thing and doing another."},
  {id:57,name:"Eight of Swords",arcana:"minor",suit:"Swords",num:"8",sym:"🙈",col:["#101020","#1a1a30"],
   kw:["Restriction","Self-Imprisonment","Victim Mentality"],
   meaning:"You feel trapped, but the cage is largely of your own construction — limiting beliefs, assumptions about what is possible, fear of consequences that may never materialise, or a victim story you have been telling yourself for too long. The Eight of Swords says the blindfold and the ropes are loose enough to escape if you actually try. Name the specific belief holding you prisoner. Question it honestly. You will find that most of your chains are made of thought, not fact."},
  {id:58,name:"Nine of Swords",arcana:"minor",suit:"Swords",num:"9",sym:"😰",col:["#101020","#1a1a30"],
   kw:["Anxiety","Nightmares","Worry"],
   meaning:"Your mind is tormented by worst-case scenarios, guilt, shame, or anxiety that intensifies at night when distractions fade. The Nine of Swords says: most of what is terrifying you right now is projection, not reality. The fear is real, but the catastrophe it predicts usually is not. Get the worry out of your head and onto paper. Tell someone what is keeping you awake. Seek professional support if this has been going on too long. You are not alone in this, even if it feels that way at 3am."},
  {id:59,name:"Ten of Swords",arcana:"minor",suit:"Swords",num:"10",sym:"🌅",col:["#101020","#1a1a30"],
   kw:["Painful Ending","Finality","Rock Bottom"],
   meaning:"This is rock bottom — the worst has happened, or is happening, and there is no more downward left to go. The Ten of Swords does not pretend this is not painful; it is. But it also carries a hidden promise: the background of this card is a sunrise. The chapter that ended needed to end. The pain you feel is the final exhale of something that has been suffocating you. From here, the only direction is up. Let this ending be final, and begin to look toward the dawn."},
  {id:60,name:"Page of Swords",arcana:"minor",suit:"Swords",num:"Page",sym:"📜",col:["#101020","#1a1a30"],
   kw:["Curiosity","Vigilance","Sharp Mind"],
   meaning:"New information is coming your way — a fact, a message, an observation that will change how you understand a situation. The Page of Swords says: stay alert, ask sharp questions, and do not accept surface explanations. Your curiosity is your greatest asset right now. But be careful with how you use what you learn; this card also warns against gossip or using information as a weapon. Gather intelligence wisely, share it responsibly."},
  {id:61,name:"Knight of Swords",arcana:"minor",suit:"Swords",num:"Knight",sym:"⚔️",col:["#101020","#1a1a30"],
   kw:["Ambition","Speed","Assertiveness"],
   meaning:"You or someone around you is charging toward a goal with intense mental focus, speed, and determination — ready to cut through obstacles with force of conviction. The Knight of Swords embodies decisive, no-nonsense action driven by belief in being right. His strength is his clarity and speed; his risk is moving so fast that he misjudges the situation or wounds allies without noticing. Charge if you must, but check your blind spots first."},
  {id:62,name:"Queen of Swords",arcana:"minor",suit:"Swords",num:"Queen",sym:"🗡️",col:["#101020","#1a1a30"],
   kw:["Sharp Clarity","Independence","Honesty"],
   meaning:"A situation needs someone who can cut through emotional noise and speak the unvarnished truth — kindly but without apology. The Queen of Swords has earned her clarity through personal experience and pain; her directness is not cruelty, it is compassion refined by wisdom. If you are being asked to give advice, hold a boundary, or make a judgment call, channel her: be honest, be clear, be fair. People will respect the truth even when it stings, if it comes from genuine care."},
  {id:63,name:"King of Swords",arcana:"minor",suit:"Swords",num:"King",sym:"👁️",col:["#101020","#1a1a30"],
   kw:["Intellect","Authority","Ethical Judgment"],
   meaning:"You are being called to make a decision that requires clear, rational thinking and ethical integrity — a leadership call, a moral judgment, a strategic direction that will affect others. The King of Swords commands through the power of his mind, not his emotions. This is not the time for sentimentality or wishful thinking; it is the time for honest analysis and principled action. Say what is true, decide what is fair, and stand behind your reasoning with quiet authority."},

  // PENTACLES (Earth · Material · Practical)
  {id:64,name:"Ace of Pentacles",arcana:"minor",suit:"Pentacles",num:"Ace",sym:"🌱",col:["#0a1a0a","#0f2d0f"],
   kw:["Opportunity","Prosperity","New Path"],
   meaning:"A tangible opportunity is appearing in your material world — a job offer, a financial opening, a chance to build something real and lasting. The Ace of Pentacles is not a windfall; it is a seed that requires patient cultivation. Pick it up and plant it deliberately. Create the budget, sign up for the training, start the savings account. This has genuine long-term growth potential, but only if you treat it with the seriousness and care it deserves from the very beginning."},
  {id:65,name:"Two of Pentacles",arcana:"minor",suit:"Pentacles",num:"2",sym:"⚖️",col:["#0a1a0a","#0f2d0f"],
   kw:["Balance","Adaptability","Juggling"],
   meaning:"You are juggling multiple demands — work and personal life, two financial commitments, several projects competing for the same limited time. The Two of Pentacles says this balancing act is sustainable right now, but only if you stay flexible and keep prioritising actively. The moment you try to give everything equal weight, something will drop. Decide what matters most this week, give it your best energy, and let the rest be good enough. Not everything is equally urgent."},
  {id:66,name:"Three of Pentacles",arcana:"minor",suit:"Pentacles",num:"3",sym:"🏛️",col:["#0a1a0a","#0f2d0f"],
   kw:["Teamwork","Craftsmanship","Collaboration"],
   meaning:"The project you are working on requires collaboration — not the superficial kind where people just divide tasks, but genuine teamwork where different skills combine to create something none of you could make alone. The Three of Pentacles says your contribution is valued, but so is everyone else's. Check your ego at the door, ask for feedback, and recognise that the best work happens when the architect, the builder, and the visionary are all listening to each other."},
  {id:67,name:"Four of Pentacles",arcana:"minor",suit:"Pentacles",num:"4",sym:"🔒",col:["#0a1a0a","#0f2d0f"],
   kw:["Security","Control","Possessiveness"],
   meaning:"You are holding onto something too tightly — money, a position, a relationship, a routine, control over a situation — because letting go feels dangerous. The Four of Pentacles says there is a difference between healthy security and fearful hoarding. Ask yourself honestly: am I protecting what I have built, or am I strangling it? Sometimes the thing you grip hardest is the thing that needs room to breathe. Loosen your hold before it suffocates."},
  {id:68,name:"Five of Pentacles",arcana:"minor",suit:"Pentacles",num:"5",sym:"❄️",col:["#0a1a0a","#0f2d0f"],
   kw:["Hardship","Isolation","Lack"],
   meaning:"You are going through a period of genuine material difficulty, health concern, or social exclusion — and the isolation of it may feel worse than the problem itself. The Five of Pentacles says: help is available, but you are not seeing it because shame or pride has you looking down at the snow instead of up at the lit window. Ask for support. Accept the offer that has been extended. You do not have to suffer through this alone, and refusing help is not strength — it is stubbornness."},
  {id:69,name:"Six of Pentacles",arcana:"minor",suit:"Pentacles",num:"6",sym:"🤲",col:["#0a1a0a","#0f2d0f"],
   kw:["Generosity","Charity","Reciprocity"],
   meaning:"Resources are flowing — you are either in a position to give generously or in a position where you need to receive graciously. The Six of Pentacles says both roles are honourable, but the balance of power matters. If you are giving, check whether your generosity has strings attached. If you are receiving, accept with dignity and without shame. The healthiest exchanges happen when both parties feel respected. Pay attention to whether this relationship of giving and receiving feels genuinely mutual."},
  {id:70,name:"Seven of Pentacles",arcana:"minor",suit:"Pentacles",num:"7",sym:"🌿",col:["#0a1a0a","#0f2d0f"],
   kw:["Patience","Investment","Assessment"],
   meaning:"You have been putting in consistent effort — at work, in a relationship, on a personal goal — and now you are pausing to wonder whether all that effort is actually going to pay off. The Seven of Pentacles is not a warning; it is a check-in. Look honestly at what you have grown so far. Is the investment bearing fruit, or are you watering dead soil? If the growth is real, be patient — harvest takes time. If it is not, redirect your energy before the season passes entirely."},
  {id:71,name:"Eight of Pentacles",arcana:"minor",suit:"Pentacles",num:"8",sym:"🔨",col:["#0a1a0a","#0f2d0f"],
   kw:["Craftsmanship","Dedication","Skill-Building"],
   meaning:"This is your 'heads down and work' card. The Eight of Pentacles appears when the path to your goal is clear and what is needed is not more planning or inspiration, but dedicated, focused practice. Show up every day, do the repetitions, refine the details, and trust that mastery comes through accumulated effort. This is not glamorous work — it is the quiet discipline that separates people who talk about their goals from people who actually achieve them."},
  {id:72,name:"Nine of Pentacles",arcana:"minor",suit:"Pentacles",num:"9",sym:"🦚",col:["#0a1a0a","#0f2d0f"],
   kw:["Abundance","Independence","Refinement"],
   meaning:"You have built something real — financial stability, a beautiful living environment, a skill set that gives you independence — and it is time to enjoy it without guilt or anxiety. The Nine of Pentacles celebrates self-made abundance and elegant self-sufficiency. You earned this through discipline and smart decisions, not luck. Enjoy the garden you have cultivated. Buy the good coffee, take the afternoon off, appreciate the comfort you have created. You deserve to savour it."},
  {id:73,name:"Ten of Pentacles",arcana:"minor",suit:"Pentacles",num:"10",sym:"🏰",col:["#0a1a0a","#0f2d0f"],
   kw:["Legacy","Lasting Wealth","Family"],
   meaning:"You are building or inheriting something that extends beyond yourself — a family legacy, a business that will outlast you, financial security that serves your entire household, or a body of work that will endure. The Ten of Pentacles is not just about money; it is about creating structures of lasting value. Think about what you want to leave behind. The decisions you make now about where to invest your resources will echo through generations."},
  {id:74,name:"Page of Pentacles",arcana:"minor",suit:"Pentacles",num:"Page",sym:"📚",col:["#0a1a0a","#0f2d0f"],
   kw:["Ambition","Study","Diligence"],
   meaning:"A practical opportunity to learn something new has arrived — a course, an internship, a mentorship, or simply a subject that fascinates you and could eventually become a source of income or expertise. The Page of Pentacles says: take this seriously. Approach it with the diligence and patience it deserves. This is the beginning of something that could become genuinely valuable, but only if you commit to the slow, unglamorous process of actually learning the craft."},
  {id:75,name:"Knight of Pentacles",arcana:"minor",suit:"Pentacles",num:"Knight",sym:"🐂",col:["#0a1a0a","#0f2d0f"],
   kw:["Reliability","Hard Work","Persistence"],
   meaning:"The situation does not need brilliance or speed right now — it needs reliability, thoroughness, and the stubborn determination to finish what you started. The Knight of Pentacles moves slowly but completes everything he touches. If you are frustrated by your pace, stop comparing yourself to faster movers. Your methodical approach will outlast their sprints. Show up every day, do the work properly, and trust that consistency compounds. The tortoise really does win this race."},
  {id:76,name:"Queen of Pentacles",arcana:"minor",suit:"Pentacles",num:"Queen",sym:"🦌",col:["#0a1a0a","#0f2d0f"],
   kw:["Nurturing","Practicality","Warmth"],
   meaning:"You are being called to create real, tangible comfort — not just for yourself, but for the people who depend on you. The Queen of Pentacles manages practical life with warmth and competence: she pays the bills, cooks the meal, maintains the home, and ensures everyone is cared for without making a spectacle of it. If life feels chaotic, channel her energy. Focus on the practical basics first — food, rest, clean space, financial order — and watch how emotional calm follows material stability."},
  {id:77,name:"King of Pentacles",arcana:"minor",suit:"Pentacles",num:"King",sym:"🏔️",col:["#0a1a0a","#0f2d0f"],
   kw:["Wealth","Stability","Enduring Leadership"],
   meaning:"You have (or are building) the kind of material success that comes from years of disciplined work, smart investment, and practical wisdom. The King of Pentacles leads from a foundation of genuine abundance — not flash, but substance. If you are making a major financial decision, this card says: think long-term, be conservative with risk, and choose the option that builds lasting security over quick gains. Your empire should be built on stone, not sand."},
];

// ─── DECK (VIETNAMESE) ────────────────────────────────────────────────────────
const DECK_VI = [
  // MAJOR ARCANA
  {name:"Kẻ Khờ",kw:["Khởi Đầu Mới","Ngây Thơ","Bước Nhảy Đức Tin"],meaning:"Bạn đang đứng trước một điều hoàn toàn mới — công việc, mối quan hệ, dự án sáng tạo, hoặc hướng đi cuộc đời không có gì đảm bảo. The Fool xuất hiện khi suy nghĩ quá nhiều đã trở thành chướng ngại lớn nhất của bạn. Lá này không nói về sự liều lĩnh; mà là nhận ra rằng cách duy nhất để biết điều gì ở phía trước là bắt đầu bước đi. Hãy thực hiện bước đầu tiên trong tuần này, ngay cả khi bạn chưa thấy bước thứ hai."},
  {name:"Nhà Ảo Thuật",kw:["Ý Chí","Kỹ Năng","Biểu Hiện"],meaning:"Bạn đã có đủ kỹ năng, nguồn lực và các mối quan hệ cần thiết để biến điều gì đó thành hiện thực — nhưng có lẽ bạn đang chờ sự cho phép hoặc 'thời điểm hoàn hảo.' The Magician nói rằng thời điểm đúng là ngay bây giờ. Hãy ngừng tìm hiểu thêm và bắt đầu xây dựng. Tập trung năng lượng phân tán vào một ý định rõ ràng và hành động ngay hôm nay, không phải ngày mai."},
  {name:"Nữ Tu Trưởng",kw:["Trực Giác","Huyền Bí","Trí Tuệ Nội Tâm"],meaning:"Có điều gì đó quan trọng đang xảy ra bên dưới bề mặt mà bạn chưa thể nhìn rõ — một động lực ẩn trong mối quan hệ, một quyết định chưa hoàn toàn hình thành, hoặc thông tin đang bị cố tình giấu. The High Priestess nói rằng logic không đủ để giải mã vấn đề này. Hãy chú ý đến những gì trực giác, giấc mơ và những khoảnh khắc yên lặng đang nói với bạn. Câu trả lời đã có sẵn bên trong bạn rồi; hãy ngừng nhấn chìm nó trong tiếng ồn."},
  {name:"Nữ Hoàng",kw:["Sung Túc","Nuôi Dưỡng","Màu Mỡ"],meaning:"Bạn đang ở trong mùa mà mọi thứ muốn phát triển — dự án sáng tạo, mối quan hệ, ý tưởng kinh doanh, thậm chí cả sức khỏe thể chất. The Empress xuất hiện khi bạn đã cho quá nhiều mà không nhận lại, hoặc ép buộc quá mạnh mà không để mọi thứ phát triển tự nhiên. Hãy ngừng ép buộc kết quả. Chăm sóc những gì đã được gieo, chăm sóc cơ thể, và tin rằng sự sung túc đến sau sự kiên nhẫn và tự chăm sóc bản thân."},
  {name:"Hoàng Đế",kw:["Quyền Uy","Cấu Trúc","Ổn Định"],meaning:"Tình huống của bạn cần cấu trúc, không phải thêm cảm hứng. The Emperor xuất hiện khi sự hỗn loạn đã kéo dài quá lâu — dự án dở dang, ranh giới mờ nhạt, hoặc thiếu định hướng rõ ràng. Đã đến lúc xây dựng hệ thống: đặt deadline, thiết lập kỷ luật cho bản thân, sắp xếp tài chính, và tạo khung biến ý tưởng thành thực tế. Kỷ luật không phải kẻ thù của sáng tạo — nó là thứ khiến sáng tạo trở nên hiệu quả."},
  {name:"Đại Giáo Sư",kw:["Truyền Thống","Trí Tuệ","Cố Vấn"],meaning:"Bạn đang cố tự mình tìm ra mọi thứ trong khi hướng dẫn đã được chứng minh vẫn tồn tại — một người thầy, một truyền thống, một phương pháp mà người khác đã sử dụng thành công. The Hierophant không đòi hỏi sự tuân thủ mù quáng; mà hỏi liệu bạn có đang học từ những người đi trước thay vì phát minh lại bánh xe. Hãy tìm một người cố vấn, tham gia khóa học, nghiên cứu truyền thống. Điều bạn cần đã được ai đó vạch ra rồi."},
  {name:"Những Người Yêu",kw:["Tình Yêu","Hòa Hợp","Lựa Chọn Ý Nghĩa"],meaning:"Một lựa chọn thực sự đang đứng trước mặt bạn — không phải giữa tốt và xấu, mà giữa hai con đường đều hấp dẫn nhưng đòi hỏi những hy sinh khác nhau. Đây có thể là quyết định tình cảm, ngã rẽ sự nghiệp, hoặc xung đột giá trị. The Lovers không nói bạn nên chọn gì; mà nói rằng sự lựa chọn phải đến từ giá trị sâu nhất của bạn, không phải từ sợ hãi, tiện lợi hay kỳ vọng của người khác. Hãy chọn điều phù hợp với con người bạn đang trở thành, không phải con người bạn đã từng là."},
  {name:"Cỗ Xe",kw:["Chiến Thắng","Ý Chí","Quyết Tâm"],meaning:"Bạn đang đối mặt với những lực lượng đối lập — ưu tiên xung đột, đấu tranh nội tâm giữa điều mình muốn và điều được kỳ vọng, hoặc sự kháng cự từ bên ngoài đối với hướng đi của bạn. The Chariot nói rằng chiến thắng hoàn toàn khả thi, nhưng đòi hỏi bạn nắm chặt cương và lái với quyết tâm tập trung ngay bây giờ. Hãy ngừng thương lượng với sự nghi ngờ. Cam kết hoàn toàn, vượt qua sự kháng cự, và đừng quay lại cho đến khi bạn đã về đích."},
  {name:"Sức Mạnh",kw:["Dũng Cảm","Từ Bi","Sức Mạnh Nội Tâm"],meaning:"Thử thách bạn đang đối mặt không thể giải quyết bằng cách ép buộc — hung hăng, tối hậu thư, hoặc ý chí thô sẽ khiến mọi thứ tệ hơn. Strength xuất hiện khi bạn cần lòng dũng cảm thầm lặng và sự kiên trì nhẹ nhàng: sự kiên nhẫn chịu đựng khó chịu, lòng trắc ẩn để xử lý người khó tính mà không leo thang, hoặc sự tự kiểm soát để kháng cự xung động cảm giác cấp bách nhưng thực ra phá hoại. Sức mạnh mềm mại của bạn mới là sức mạnh thực sự ở đây."},
  {name:"Ẩn Sĩ",kw:["Cô Đơn","Nội Tâm","Ánh Sáng Nội Tâm"],meaning:"Bạn đã tìm kiếm câu trả lời từ người khác — lời khuyên, sự xác nhận, ý kiến của ai đó — trong khi sự rõ ràng bạn cần chỉ có thể đến từ sự cô đơn và tự suy ngẫm. The Hermit kêu gọi bạn lùi lại khỏi tiếng ồn, hủy những cam kết không cần thiết, và dành thời gian thực sự một mình với suy nghĩ. Câu trả lời không nằm ở cuộc trò chuyện tiếp theo; nó nằm trong sự im lặng mà bạn đang né tránh. Hãy viết nhật ký, đi dạo, thiền — cái nhìn sẽ đến."},
  {name:"Bánh Xe Vận Mệnh",kw:["Chu Kỳ","Định Mệnh","Bước Ngoặt"],meaning:"Hoàn cảnh đang thay đổi theo cách bạn không thể kiểm soát hoàn toàn — thay đổi công việc, chuyển tiếp mối quan hệ, cơ hội hoặc thất bại bất ngờ. Wheel of Fortune nhắc bạn rằng mọi chu kỳ đều xoay: cái đang lên sẽ xuống, cái đang xuống sẽ lên. Nếu mọi thứ thuận lợi, hãy chuẩn bị cho giai đoạn tiếp theo. Nếu đang khó khăn, hãy biết rằng dòng thủy triều đang quay. Công việc của bạn không phải ngăn bánh xe — mà là cưỡi nó một cách khéo léo."},
  {name:"Công Lý",kw:["Sự Thật","Công Bằng","Nhân Quả"],meaning:"Một tình huống trong cuộc sống đang đòi hỏi sự trung thực và trách nhiệm — hoặc bạn cần thừa nhận vai trò của mình trong chuyện đã xảy ra, hoặc ai đó khác cần chịu trách nhiệm. Justice không thiên vị. Nếu bạn đã đi tắt, né tránh cuộc trò chuyện khó khăn, hoặc hy vọng vấn đề tự biến mất, lá này nói: hãy đối mặt trực tiếp và công bằng. Hãy đưa ra quyết định mà bạn sẽ tự hào giải thích cho bất kỳ ai. Sự thật sẽ lộ ra dù thế nào."},
  {name:"Người Bị Treo",kw:["Buông Bỏ","Dừng Lại","Góc Nhìn Mới"],meaning:"Bạn đang cố gắng ép buộc qua một tình huống mà ép buộc là cách tiếp cận sai. The Hanged Man xuất hiện khi góc nhìn hiện tại của bạn mới là chướng ngại thực sự — không phải hoàn cảnh. Hãy ngừng lập chiến lược và cho phép bản thân nhìn vấn đề từ một góc hoàn toàn khác. Thay vì hỏi 'Làm sao để thắng?', hãy hỏi 'Tôi đang từ chối nhìn thấy điều gì?' Khoảng dừng bạn kháng cự chính là khoảng dừng bạn cần."},
  {name:"Tử Thần",kw:["Biến Đổi","Kết Thúc","Tái Sinh"],meaning:"Điều gì đó trong cuộc sống đã hết thời — một động lực mối quan hệ, một vai trò công việc, một hình ảnh bản thân, một thói quen, hoặc cả một giai đoạn cuộc đời. Death không có nghĩa là mất mát vật chất; nó có nghĩa là bám víu vào điều đang kết thúc đang gây cho bạn nhiều đau đớn hơn so với việc buông bỏ. Hãy gọi tên thứ bạn biết đã xong nhưng chưa thả ra. Càng sớm thương tiếc nó một cách trung thực và bước qua, chương mới càng sớm bắt đầu. Điều tiếp theo sẽ tốt hơn điều bạn đang giữ."},
  {name:"Điều Độ",kw:["Cân Bằng","Kiên Nhẫn","Dòng Chảy"],meaning:"Bạn đang dao động giữa các thái cực — làm việc quá sức rồi sụp đổ, cho tất cả rồi rút lui hoàn toàn, hoặc chuyển đổi giữa hai lựa chọn mà không cam kết cái nào. Temperance nói: hãy ngừng đung đưa và tìm điểm giữa. Đây không phải về sự thỏa hiệp; mà là về sự tích hợp. Hãy pha trộn những lực đối lập trong cuộc sống thành điều bền vững. Câu trả lời không phải A hay B — mà là sự kết hợp chu đáo của cả hai, áp dụng với sự kiên nhẫn."},
  {name:"Ác Quỷ",kw:["Bóng Tối","Sự Gắn Bó","Giải Phóng"],meaning:"Có một khuôn mẫu, sự gắn bó, hoặc thói quen trong cuộc sống mà bạn biết không phục vụ mình — nhưng bạn cứ quay lại vì nó quen thuộc, dễ chịu, hoặc an toàn. The Devil không đại diện cho cái ác; nó đại diện cho những xiềng xích bạn đã tự rèn cho mình qua sự lặp lại và né tránh. Hãy gọi tên điều cụ thể giữ bạn mắc kẹt: mối quan hệ độc hại bạn cứ quay lại, thói quen tiêu xài bạn biện minh, cơ chế đối phó bạn đã vượt qua. Nhận thức là chìa khóa mở xiềng."},
  {name:"Tháp",kw:["Biến Động","Mặc Khải","Thức Tỉnh"],meaning:"Điều bạn tin là ổn định — một mối quan hệ, sự nghiệp, niềm tin về bản thân, kế hoạch tài chính — đang bị lung lay hoặc đã sụp đổ. The Tower không phải sự trừng phạt; nó là sự tiết lộ. Cấu trúc đã đổ được xây trên những giả định không còn đúng. Công việc của bạn bây giờ không phải xây lại thứ cũ; mà là đứng giữa đống đổ nát, nhìn rõ điều gì là giả, và xây dựng điều thật ở vị trí đó. Mặt đất dưới chân bạn thực ra vững hơn trước rồi."},
  {name:"Ngôi Sao",kw:["Hy Vọng","Đổi Mới","Niềm Tin"],meaning:"Bạn đã trải qua điều thực sự khó khăn — một mất mát, thất bại, hoặc giai đoạn bất định sâu sắc — và The Star xuất hiện để nói rằng phần tồi tệ nhất đã qua. Đây không phải lạc quan ngây thơ; đây là sự chắc chắn yên lặng rằng sự chữa lành đang diễn ra. Bạn có thể chưa cảm thấy hoàn toàn phục hồi, nhưng quá trình là thật. Hãy để mình hy vọng trở lại. Thực hiện một bước nhỏ hướng đến điều bạn muốn, và để ý cách vũ trụ thực sự gặp bạn nửa đường khi bạn di chuyển với sự chân thành."},
  {name:"Mặt Trăng",kw:["Ảo Tưởng","Tiềm Thức","Giấc Mơ"],meaning:"Bạn đang không nhìn rõ tình huống — sợ hãi, phóng chiếu, hoặc mơ tưởng đang bóp méo nhận thức của bạn. The Moon cảnh báo rằng ai đó (có thể là bạn) không hoàn toàn trung thực, hoặc một thông tin quan trọng đang bị giấu. Đừng đưa ra quyết định không thể đảo ngược ngay bây giờ. Thay vào đó, hãy chú ý đến giấc mơ, phản ứng bản năng, và những điều mọi người không nói ra. Sự rõ ràng sẽ đến, nhưng đòi hỏi kiên nhẫn và sẵn sàng nhìn vào sự thật khó chịu."},
  {name:"Mặt Trời",kw:["Niềm Vui","Sinh Lực","Thành Công"],meaning:"Đây là khoảnh khắc thực sự tốt đẹp — không phải vì các vấn đề đã biến mất kỳ diệu, mà vì bạn có sự rõ ràng, năng lượng và tự tin để xử lý bất cứ điều gì đến. The Sun xuất hiện khi đã đến lúc ngừng nghi ngờ bản thân và tận hưởng những gì bạn đã xây dựng. Hãy chia sẻ thành công một cách cởi mở, bày tỏ niềm vui không mặc cảm, và để nhiệt huyết truyền cảm hứng cho người xung quanh. Hạnh phúc không phải thứ bạn cần xin phép — hãy nhận lấy nó."},
  {name:"Phán Xét",kw:["Thức Tỉnh","Sứ Mệnh","Tha Thứ"],meaning:"Một phần cuộc đời bạn đang đòi hỏi một cuộc đánh giá trung thực — không phải để trừng phạt bản thân, mà để nhìn rõ điều gì đã hiệu quả, điều gì không, và điều gì đang gọi bạn làm tiếp theo. Judgement xuất hiện ở những bước ngoặt: chuyển hướng sự nghiệp, cột mốc quan hệ, hoặc khoảnh khắc bạn nhận ra đã sống phiên bản cuộc đời của người khác. Hãy tha thứ điều cần tha thứ (đặc biệt là cho bản thân), học bài học đầy đủ, và trả lời tiếng gọi đã ngày càng to hơn. Bạn biết đó là gì."},
  {name:"Thế Giới",kw:["Hoàn Thành","Tích Hợp","Thành Tựu"],meaning:"Một chương quan trọng trong cuộc đời đang kết thúc tự nhiên — dự án hoàn thành, mục tiêu đạt được, giai đoạn trưởng thành được tích hợp đầy đủ. The World không chỉ ăn mừng điểm đến; nó tôn vinh mọi bước trong hành trình đưa bạn đến đây. Trước khi lao vào điều tiếp theo, hãy dừng lại và thực sự ghi nhận những gì bạn đã đạt được. Hãy để cảm giác trọn vẹn này lấp đầy bạn. Rồi khi sẵn sàng, hãy bước qua cánh cửa vào chu kỳ vĩ đại tiếp theo với mọi thứ đã học."},
  // WANDS
  {name:"Át Gậy",suit:"Gậy",kw:["Cảm Hứng","Tia Sáng Sáng Tạo","Chủ Động"],meaning:"Một cơ hội sáng tạo thực sự đã xuất hiện — ý tưởng kinh doanh, dự án, đam mê khiến bạn hào hứng theo cách lâu rồi chưa có. Ace of Wands không phải cảm giác mơ hồ về cảm hứng; đây là tia sáng cụ thể yêu cầu bạn hành động ngay, trước khi đà biến mất. Hãy viết ra, kể cho ai đó, thực hiện bước cụ thể đầu tiên ngay hôm nay. Hạt giống này có lửa thật — nhưng chỉ khi bạn gieo nó khi nó còn sống."},
  {name:"Hai Gậy",suit:"Gậy",kw:["Lên Kế Hoạch","Tầm Nhìn","Tương Lai"],meaning:"Bạn có tia sáng ban đầu và phần đầu của kế hoạch — nhưng bạn đang đứng ở ngưỡng cửa thay vì bước qua. Two of Wands cho thấy bạn đang cầm thế giới trong tay, nhìn về chân trời, nhưng chưa di chuyển. Đây là lá bài của kế hoạch chiến lược, không phải mơ mộng thụ động. Hãy cụ thể hóa kế hoạch: đặt ngày, đặt tên các cột mốc, và quyết định bạn sẵn sàng hy sinh gì để đến đó."},
